<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Test</title>
<style>body{background:#0f172a;color:#fff;font-family:sans-serif;padding:20px;}</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<script type="text/babel">
function App() {
  const [count, setCount] = React.useState(0);
  return (
    <div>
      <h1>RVU Tracker - Test</h1>
      <p>If you see this, Babel works on GitHub Pages!</p>
      <button style={{padding:"10px 20px",fontSize:16,marginTop:10}} onClick={() => setCount(c => c+1)}>
        Clicked {count} times
      </button>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
