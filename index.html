    let d = new Date(startDate);
    while (d <= endDate) {
      const ds = fmt(d);
      const surgeonsOff = surgeons.filter(s => onVac(s.id, ds, vacations));
      const appsOff = apps.filter(a => onVac(a.id, ds, vacations));

      if (surgeonsOff.length > 4) {
        warnings.push({ date: ds, severity: "error", message: `${surgeonsOff.length} surgeons off on ${ds} (max 4): ${surgeonsOff.map(s=>s.name).join(", ")}` });
      }
      if (appsOff.length > 2) {
        warnings.push({ date: ds, severity: "info", message: `${appsOff.length} APPs off on ${ds} (prefer ≤2): ${appsOff.map(a=>a.name).join(", ")}` });
      }
      d = addD(d, 1);
    }
    return warnings;
  }, [mondays, surgeons, apps, vacations]);

  // ─── Yearly Summary Export ───
  const exportYearlySummary = useCallback(() => {
    const header = ["Surgeon","Svc Wk","Nights","Wknds","1st Call Days","B-Svc Wk","B-Nights","B-Wknds","2nd Call Days","Total"];
    const rows = surgeons.map(s => {
      const cur = stats[s.id] || {};
      const pri = priorCounts[s.id] || {};
      const cumDc = (pri.dc||0) + (cur.dc||0);
      const cumN = (pri.nights||0) + (cur.nights||0);
      const cumW = (pri.wknd||0) + (cur.wknd||0);
      const cumDcB = (pri.dcB||0) + (cur.dcB||0);
      const cumNB = (pri.nightsB||0) + (cur.nightsB||0);
      const cumWB = (pri.wkndB||0) + (cur.wkndB||0);
      const total1 = calcShifts({dc:cumDc,nights:cumN,wknd:cumW,totalDays:(pri.totalDays||0)+(cur.totalDays||0)});
      const total2 = (pri.totalDaysB||0) + (cur.totalDaysB||0);
      return [s.name, cumDc, cumN, cumW, total1, cumDcB, cumNB, cumWB, total2, total1+total2].join(",");
    });
    const csv = [header.join(","), ...rows].join("\n");
    const blob = new Blob([csv], {type:"text/csv"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `call-schedule-summary-${startYear}.csv`; a.click();
    URL.revokeObjectURL(url);
  }, [surgeons, stats, priorCounts, startYear, calcShifts]);

  // ─── Dark Mode Styles ───
  const dk = darkMode;
  const dkBg = dk ? "#1a1a2e" : "#f0f2f5";
  const dkCard = dk ? "#16213e" : "#ffffff";
  const dkCardBorder = dk ? "#2a3a5e" : "#e0e4ea";
  const dkText = dk ? "#e0e0f0" : "#2c3e50";
  const dkSubtext = dk ? "#8a8aaa" : "#7a8a98";
  const dkHdr = dk ? "linear-gradient(180deg,#16213e,#1a1a2e)" : "linear-gradient(180deg,#ffffff,#f8f9fb)";
  const dkInp = dk ? {background:"#0f3460",border:"1px solid #2a3a5e",color:"#e0e0f0"} : {};

  // Calendar data
  const calData = useMemo(() => {
    const d={};
    Object.entries(schedule).forEach(([mStr,wk])=>{
      const mon=parse(mStr);
      const pfx = wk.isBackup ? "B-" : "";
      const cls = wk.isBackup ? "backup" : "primary";
      if(wk.dayCall){
        for(let i=0;i<5;i++){
          const ds=fmt(addD(mon,i));
          d[ds]=[...(d[ds]||[]),{type:pfx+"Svc",surgeon:wk.dayCall,cls}];
        }
        const sat=fmt(addD(mon,5));
        d[sat]=[...(d[sat]||[]),{type:pfx+"Wknd",surgeon:wk.dayCall,cls,note:"Sat 7a–7a"}];
      }
      NIGHT_KEYS.forEach((sk,i)=>{
        const sid=wk.nights?.[sk]; if(!sid) return;
        const ds=fmt(addD(mon,i));
        d[ds]=[...(d[ds]||[]),{type:pfx+"Ngt",surgeon:sid,cls}];
      });
      const wkndS = wk.nights?.wknd;
      if(wkndS){
        const fri=fmt(addD(mon,4));
        d[fri]=[...(d[fri]||[]),{type:pfx+"Wknd",surgeon:wkndS,cls,note:"5p–7a"}];
        const sun=fmt(addD(mon,6));
        d[sun]=[...(d[sun]||[]),{type:pfx+"Wknd",surgeon:wkndS,cls,note:"7a–7a"}];
      }
      if(wk.isBackup){
        for(let i=0;i<7;i++){
          const ds=fmt(addD(mon,i));
          d[ds]=[...(d[ds]||[]),{type:"Fierce",surgeon:null,cls:"fierce"}];
        }
      }
      if(wk.isFierceBackup){
        for(let i=0;i<7;i++){
          const ds=fmt(addD(mon,i));
          d[ds]=[...(d[ds]||[]),{type:"FierceBkp",surgeon:null,cls:"fiercebkp"}];
        }

      if (wk.holidayCoverage) {

      }

    // APP shifts
    Object.entries(appShifts).forEach(([ds,aid])=>{

  // Calendar grid

    return c;

  const todayStr = fmt(new Date());

      if (e.type === "Wknd" || e.type === "B-Wknd") info.weekend = sMap[e.surgeon]?.name || null;
      if (e.type === "APP") info.app = aMap[e.appId]?.name || null;
      if (e.type === "Fierce") info.fierce = true;
      if (e.type === "FierceBkp") info.fierceBkp = true;

    const today = new Date();
    const dayName = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][today.getDay()];
    const mo = today.getMonth()+1;
    const dy = today.getDate();
    let msg = `🏥 DSG Call — ${dayName} ${mo}/${dy}\n\n`;
    if (todayCall.dayCall) msg += `🏥 Service Week: ${todayCall.dayCall}\n`;
    if (todayCall.night) msg += `🌙 Night (5p–7a): ${todayCall.night}\n`;
    if (todayCall.weekend) msg += `🌗 Weekend: ${todayCall.weekend}\n`;
    if (todayCall.app) msg += `👩‍⚕️ APP (5p–7a): ${todayCall.app}\n`;
    if (todayCall.fierce) msg += `⚡ Fierce Primary Week\n`;
    if (todayCall.fierceBkp) msg += `🛡 Fierce Backup Week\n`;
    if (!hasCallToday) msg += `No call assignments found for today.\n`;

            {unreadCount > 0 && (
              <span style={{position:"absolute",top:-4,right:-4,background:"#e04040",color:"#fff",borderRadius:10,fontSize:9,fontWeight:700,minWidth:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{unreadCount}</span>

        </div>

      <div style={{maxWidth:1020,margin:"0 auto",padding:"18px 14px 60px",position:"relative"}}>

        {/* ─── Notification Panel ─── */}
        {showNotifs && (

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>

                {notifications.length > 0 && (
                  <button onClick={clearAllNotifications} style={{background:"none",border:"1px solid #e8c0c0",color:"#904040",borderRadius:5,padding:"2px 8px",fontSize:10,cursor:"pointer",fontFamily:font}}>Clear All</button>
                )}
                <button onClick={()=>setShowNotifs(false)} style={{background:"none",border:"none",fontSize:16,cursor:"pointer",color:"#8a94a0"}}>✕</button>
              </div>

            {notifications.length === 0 ? (

              const tabMap = {vacation_submitted:"requests",vacation_approved:"requests",vacation_denied:"requests",schedule_published:"schedule",schedule_changed:"schedule",trade_submitted:"requests",trade_accepted:"requests",trade_declined:"requests"};

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:12,fontWeight:600,color:"#1a2a3a"}}>{n.title}</span>
                  <span style={{fontSize:10,color:"#a0a8b0"}}>{new Date(n.created_at).toLocaleDateString()}</span>

                    <span key={i} style={{fontFamily:mono,fontSize:11,color:"#5a6a78"}}>
                      {vs} → {ve}
                      <button onClick={()=>rmVac(s.id,i)} style={{background:"none",border:"none",color:"#904040",cursor:"pointer",fontSize:11,marginLeft:3}}>✕</button>
                    </span>
                  ))}
                </div>
              );
            })}
            {apps.map(a=>{
              const v=vacations[a.id]||[]; if(!v.length) return null;
              return (
                <div key={a.id} style={{marginBottom:6,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                  <AppBadge id={a.id}/>
                  {v.map(([vs,ve],i)=>(
                    <span key={i} style={{fontFamily:mono,fontSize:11,color:"#5a6a78"}}>
                      {vs} → {ve}
                      <button onClick={()=>rmVac(a.id,i)} style={{background:"none",border:"none",color:"#904040",cursor:"pointer",fontSize:11,marginLeft:3}}>✕</button>
                    </span>
                  ))}
                </div>
              );
            })}
          </div>

          {/* APP Shift Assignments */}
          <div style={css.card}>
            <div style={css.cardT}>APP Call Shifts <span style={{fontWeight:400,fontSize:11,color:"#7a8a98"}}>— Assign Individually</span></div>
            <p style={{fontSize:12,color:"#7a8a98",margin:"0 0 10px",lineHeight:1.5}}>
              Assign APP night shifts (5p–7a) on specific dates. These are added manually since APP coverage is intermittent.
            </p>
            <div style={{display:"flex",gap:6,alignItems:"end",flexWrap:"wrap",marginBottom:12}}>
              <div>
                <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Date</label>
                <input type="date" value={appDate} onChange={e=>setAppDate(e.target.value)} style={{...css.inp,width:150}}/>
              </div>
              <div>
                <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>APP</label>
                <select value={appPerson} onChange={e=>setAppPerson(e.target.value)} style={{...css.inp,width:120}}>
                  <option value="">Select…</option>
                  {apps.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
                </select>
              </div>
              <button onClick={addAppShift} style={css.btn(true)}>+ Assign</button>
            </div>
            {Object.entries(appShifts).sort(([a],[b])=>a.localeCompare(b)).map(([ds,aid])=>(
              <div key={ds} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                <span style={{fontFamily:mono,fontSize:12,color:"#5a6a78"}}>{ds}</span>
                <span style={{fontSize:11,color:"#5a6a78"}}>{DAY_HDR[parse(ds).getDay()]}</span>
                <AppBadge id={aid}/>
                <span style={{fontSize:10,color:"#7a8a98"}}>5p–7a</span>
                <button onClick={()=>rmAppShift(ds)} style={{background:"none",border:"none",color:"#904040",cursor:"pointer",fontSize:11}}>✕</button>
              </div>
            ))}
          </div>

          {/* Backup Weeks */}
          <div style={css.card}>
            <div style={css.cardT}>Backup Weeks <span style={{fontWeight:400,fontSize:11,color:"#7a8a98"}}>(Fierce = Primary)</span></div>
            <p style={{fontSize:12,color:"#5a6a78",margin:"0 0 10px",lineHeight:1.5}}>
              Fierce weeks are auto-imported from the schedule file above. You can also add them manually below.
            </p>

            <div style={{display:"flex",gap:6,alignItems:"end",flexWrap:"wrap",marginBottom:12}}>
              <div>
                <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Add manually — Week Starting (Monday)</label>
                <input type="date" value={bkMonday} onChange={e=>setBkMonday(e.target.value)} style={{...css.inp,width:160}}/>
              </div>
              <button onClick={()=>{ if(bkMonday){ setBackupMondaySet(p=>{const n=new Set(p);n.add(bkMonday);return n;}); setBkMonday(""); }}} style={css.btn(true)}>+ Mark Backup</button>
            </div>
            {[...backupMondaySet].sort().map(m=>(
              <div key={m} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                <span style={{fontFamily:mono,fontSize:12,color:"#5a6a78"}}>Wk of {m}</span>
                <span style={css.backupBanner}>⚡ BACKUP — Fierce Primary</span>
                <button onClick={()=>setBackupMondaySet(p=>{const n=new Set(p);n.delete(m);return n;})} style={{background:"none",border:"none",color:"#904040",cursor:"pointer",fontSize:12}}>✕</button>
              </div>
            ))}

            {/* Fierce Backup weeks — label only, no schedule change */}
            <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid #e0e4ea"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#6090a8",marginBottom:6}}>Fierce Backup Weeks <span style={{fontWeight:400,color:"#7a8a98"}}>— Regular schedule, Fierce backs up the group</span></div>
              <div style={{display:"flex",gap:6,alignItems:"end",flexWrap:"wrap",marginBottom:10}}>
                <div>
                  <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Week Starting (Monday)</label>
                  <input type="date" value={bkMonday} onChange={e=>setBkMonday(e.target.value)} style={{...css.inp,width:160}}/>
                </div>
                <button onClick={()=>{ if(bkMonday){ setFierceBackupSet(p=>{const n=new Set(p);n.add(bkMonday);return n;}); setBkMonday(""); }}} style={{...css.btn(true),background:"linear-gradient(135deg,#e0ecf8,#d0e0f0)",borderColor:"#a0c0e0",color:"#1a6fa8",padding:"7px 16px",fontSize:12}}>+ Mark Fierce Backup</button>
              </div>
              {[...fierceBackupSet].sort().map(m=>(
                <div key={m} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                  <span style={{fontFamily:mono,fontSize:12,color:"#5a6a78"}}>Wk of {m}</span>
                  <span style={{fontSize:11,color:"#1a6fa8",background:"#e8f0fc",border:"1px solid #a8c8e0",borderRadius:6,padding:"3px 8px",fontWeight:600}}>🛡 Fierce Backup</span>
                  <button onClick={()=>setFierceBackupSet(p=>{const n=new Set(p);n.delete(m);return n;})} style={{background:"none",border:"none",color:"#904040",cursor:"pointer",fontSize:12}}>✕</button>
                </div>
              ))}
            </div>
          </div>

          {/* Holiday Assignments */}
          <div style={css.card}>
            <div style={css.cardT}>🎄 Holiday Call Assignments</div>
            <p style={{fontSize:12,color:"#5a6a78",margin:"0 0 10px",lineHeight:1.5}}>
              Generate yearly holiday assignments. Each holiday gets 2 surgeons who alternate 24h blocks.
              Eves stay on the regular schedule — only the holiday day and days after switch to 24h.
            </p>
            <div style={{fontSize:11,color:"#5a6a78",background:"#fef8f0",border:"1px solid #e8d8c0",borderRadius:6,padding:"8px 12px",marginBottom:12,lineHeight:1.7}}>
              <strong>Pattern:</strong> Surgeon A → Eve + Holiday 24h · Surgeon B → Day After 24h · alternating through Sat<br/>
              <strong>Monday holidays:</strong> Only Monday is 24h, rest of week is normal<br/>
              <strong>Friday holidays:</strong> Fri (A) + Sat (B)<br/>
              <strong>Exception:</strong> FAK always covers Christmas Day<br/>
              <strong style={{color:"#8a4010"}}>Distinct-pair rule:</strong> Within each group (major / minor), every holiday must have a completely different surgeon pair — no surgeon appears on two holidays in the same group.
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:12}}>
              <select value={holidayYear} onChange={e=>setHolidayYear(+e.target.value)} style={{...css.inp,width:90}}>
                {[2025,2026,2027,2028].map(y=><option key={y} value={y}>{y}</option>)}
              </select>
              <button onClick={()=>generateHolidayAssignments(holidayYear)} style={{...css.btn(true),padding:"7px 16px",fontSize:12}}>
                {holidayAssignments[String(holidayYear)] ? "↻ Re-generate" : "Generate"} {holidayYear} Holidays
              </button>
            </div>

            {holidayAssignments[String(holidayYear)] && (()=>{
              const assignments = holidayAssignments[String(holidayYear)];
              const majors = assignments.filter(h=>h.type==="major");
              const minors = assignments.filter(h=>h.type==="minor");

              // Count per surgeon
              const holCounts = {};
              surgeons.forEach(s=>{holCounts[s.id]={major:0,minor:0};});
              assignments.forEach(h=>{
                if(h.surgeonA&&holCounts[h.surgeonA]) holCounts[h.surgeonA][h.type]++;
                if(h.surgeonB&&holCounts[h.surgeonB]) holCounts[h.surgeonB][h.type]++;
              });

              // Build sets of surgeons already used in each group (for dropdown hints)
              const usedInMajor = new Set();
              const usedInMinor = new Set();
              majors.forEach(h => { if(h.surgeonA) usedInMajor.add(h.surgeonA); if(h.surgeonB) usedInMajor.add(h.surgeonB); });
              minors.forEach(h => { if(h.surgeonA) usedInMinor.add(h.surgeonA); if(h.surgeonB) usedInMinor.add(h.surgeonB); });

              const renderCard = (hol, idx) => {
                // Surgeons used in OTHER holidays of the same group (not this one)
                const sameGroup = assignments.filter(h => h.type === hol.type && h.date !== hol.date);
                const usedElsewhere = new Set();
                sameGroup.forEach(h => { if(h.surgeonA) usedElsewhere.add(h.surgeonA); if(h.surgeonB) usedElsewhere.add(h.surgeonB); });

                return (
                <div key={hol.date} style={{background:dk?"#1a2a2e":"#fff",border:`1px solid ${hol.type==="major"?"#e0a868":"#a0c0d8"}`,borderRadius:8,padding:"10px 14px",marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:6}}>
                    <div style={{fontSize:14,fontWeight:700,color:hol.type==="major"?"#c06020":"#2868a8"}}>
                      {hol.emoji} {hol.name}
                      <span style={{fontSize:11,fontWeight:400,color:"#8a94a0",marginLeft:8}}>{hol.date} ({["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][parse(hol.date).getDay()]})</span>
                    </div>
                    <span style={{fontSize:10,fontWeight:600,color:hol.type==="major"?"#c06020":"#2868a8",background:hol.type==="major"?"#fef0e0":"#e0f0ff",padding:"2px 8px",borderRadius:4}}>{hol.type.toUpperCase()}</span>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
                    <div>
                      <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:1}}>Surgeon A (Holiday)</label>
                      <select value={hol.surgeonA||""} onChange={e=>swapHolidaySurgeon(holidayYear,idx,"surgeonA",e.target.value)} style={{...css.inp,padding:"3px 6px",fontSize:11,width:110}}>
                        {surgeons.map(s=><option key={s.id} value={s.id}>{s.name}{usedElsewhere.has(s.id)?" ⚠️":""}</option>)}
                      </select>
                    </div>
                    <div>
                      <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:1}}>Surgeon B (Day After)</label>
                      <select value={hol.surgeonB||""} onChange={e=>swapHolidaySurgeon(holidayYear,idx,"surgeonB",e.target.value)} style={{...css.inp,padding:"3px 6px",fontSize:11,width:110}}>
                        {surgeons.map(s=><option key={s.id} value={s.id}>{s.name}{usedElsewhere.has(s.id)?" ⚠️":""}</option>)}
                      </select>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                    {(hol.coverage||[]).map((c,j)=>{
                      const isEve = c.isEve;
                      // For Eve: look up who actually has the night shift the night before the holiday
                      let eveSurgeon = c.surgeon;
                      let eveLabel = "night before";
                      if (isEve && Object.keys(schedule).length > 0) {
                        const eveDate = parse(c.date);
                        const holDate = parse(hol.date);
                        const holDow = holDate.getDay(); // day of week of the holiday
                        const eveMon = monOf(eveDate);
                        const eveMonStr = fmt(eveMon);
                        const wk = schedule[eveMonStr];
                        if (wk) {
                          // Which night shift covers the night before the holiday?
                          if (holDow === 1) { // Holiday=Mon → night before = prev week's weekend (Sun 7a-Mon 7a)
                            const prevMon = fmt(addD(eveMon, -7));
                            eveSurgeon = schedule[prevMon]?.nights?.wknd || c.surgeon;
                          } else if (holDow === 0) { // Holiday=Sun → night before = Sat night = service week surgeon
                            eveSurgeon = wk.dayCall || c.surgeon;
                          } else if (holDow === 6) { // Holiday=Sat → night before = Fri night = weekend surgeon
                            eveSurgeon = wk.nights?.wknd || c.surgeon;
                          } else { // Holiday=Tue-Fri → night before = Mon-Thu night
                            const nightKeys = ["","mon","tue","wed","thu","fri"];
                            const nk = nightKeys[holDow - 1]; // holDow 2(Tue)→mon, 3(Wed)→tue, etc.
                            eveSurgeon = wk.nights?.[nk] || c.surgeon;
                          }
                        }
                      }
                      const displaySurgeon = isEve ? eveSurgeon : c.surgeon;
                      const isSurgA = !isEve && c.surgeon === hol.surgeonA;
                      return (
                      <div key={j} style={{padding:"4px 10px",borderRadius:5,fontSize:11,fontWeight:600,
                        background: isEve
                          ? (dk?"#2a2420":"#fef8f0")
                          : isSurgA?(dk?"#1a3020":"#e8f8e8"):(dk?"#2a2040":"#f0e8f8"),
                        border:`1px solid ${isEve?"#e0c890":isSurgA?"#a0d0a0":"#c0b0e0"}`,
                        color:isEve?"#8a6820":isSurgA?"#1a6030":"#5030a0",
                        opacity:isEve?0.85:1}}>
                        <span style={{fontWeight:400,marginRight:4}}>{c.day}</span>
                        <Badge id={displaySurgeon} small/>
                        <span style={{fontSize:9,color:isEve?"#b09050":"#8a94a0",marginLeft:4}}>{isEve ? eveLabel : "24h"}</span>
                      </div>
                    )})}
                  </div>
                </div>
              )};

              return <>
                <div style={{fontSize:12,fontWeight:700,color:"#c06020",marginBottom:6}}>⭐ Major Holidays</div>
                {majors.map((h,i)=>renderCard(h, assignments.indexOf(h)))}

                <div style={{fontSize:12,fontWeight:700,color:"#2868a8",marginBottom:6,marginTop:14}}>📌 Minor Holidays</div>
                {minors.map((h,i)=>renderCard(h, assignments.indexOf(h)))}

                {/* Distinct-pair validation */}
                {(()=>{
                  const checkGroup = (group, label) => {
                    const seen = {};
                    const dupes = [];
                    group.forEach(h => {
                      [h.surgeonA, h.surgeonB].forEach(sid => {
                        if (!sid) return;
                        if (seen[sid]) dupes.push({ surgeon: sid, hol1: seen[sid], hol2: h.name });
                        else seen[sid] = h.name;
                      });
                    });
                    return { label, ok: dupes.length === 0, dupes, uniqueCount: Object.keys(seen).length, freeCount: surgeons.length - Object.keys(seen).length };
                  };
                  const majorCheck = checkGroup(majors, "Major");
                  const minorCheck = checkGroup(minors, "Minor");
                  return (
                    <div style={{marginTop:10,display:"flex",gap:8,flexWrap:"wrap"}}>
                      {[majorCheck, minorCheck].map(ck => (
                        <div key={ck.label} style={{flex:1,minWidth:180,padding:"8px 12px",borderRadius:6,fontSize:11,
                          background:ck.ok?"#e8f8e8":"#fce8e8",border:`1px solid ${ck.ok?"#a0d8a0":"#e0a0a0"}`,color:ck.ok?"#1a6030":"#903030"}}>
                          <span style={{fontWeight:700}}>{ck.ok?"✓":"⚠"} {ck.label} group:</span>{" "}
                          {ck.ok
                            ? `All ${ck.uniqueCount} surgeons distinct (${ck.freeCount} free)`
                            : ck.dupes.map(d => `${surgeons.find(s=>s.id===d.surgeon)?.name||d.surgeon} is on both ${d.hol1} & ${d.hol2}`).join("; ")}
                        </div>
                      ))}
                    </div>
                  );
                })()}

                {/* Summary */}
                <div style={{marginTop:14,paddingTop:10,borderTop:"1px solid #e0e4ea"}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#5a6a78",marginBottom:6}}>Holiday Coverage per Surgeon — {holidayYear}</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {surgeons.map(s=>{
                      const mc = holCounts[s.id]?.major||0;
                      const mi = holCounts[s.id]?.minor||0;
                      return (
                        <div key={s.id} style={{...css.badge(sMap[s.id]?.idx||0),padding:"4px 10px",fontSize:11}}>
                          {s.name} <span style={{fontWeight:400}}>— {mc} major, {mi} minor</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </>;
            })()}
          </div>

          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button onClick={()=>doGenerate(true)} style={{...css.btn(false),padding:"13px 24px",fontSize:14,fontWeight:700,borderRadius:9,letterSpacing:0.3,flex:1}}>
              👁 Preview Schedule
            </button>
            <button onClick={doGenerateAndNotify} style={{...css.btn(true),padding:"13px 24px",fontSize:14,fontWeight:700,borderRadius:9,letterSpacing:0.3,flex:1}}>
              Generate & Publish →
            </button>
          </div>

          {/* What-If Preview */}
          {showPreview && previewSchedule && (()=>{
            // Build preview stats
            const pStats = {};
            surgeons.forEach(s => { pStats[s.id] = {dc:0,nights:0,wknd:0,off:0}; });
            Object.values(previewSchedule).forEach(wk => {
              if (wk.dayCall && pStats[wk.dayCall]) pStats[wk.dayCall][wk.isBackup?"dcB":"dc"]++;
              if (wk.off && pStats[wk.off]) pStats[wk.off][wk.isBackup?"offB":"off"]++;
              Object.entries(wk.nights||{}).forEach(([sh,sid]) => {
                if (!sid || !pStats[sid]) return;
                if (sh==="wknd") pStats[sid][wk.isBackup?"wkndB":"wknd"]++;
                else pStats[sid][wk.isBackup?"nightsB":"nights"]++;
              });
            });
            return (
              <div style={{...css.card,marginTop:14,background:dk?"#1a2a1a":"#f0faf0",border:"2px solid #80c080"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
                  <div style={css.cardT}>👁 Schedule Preview</div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>doGenerate(true)} style={{...css.btn(false),padding:"6px 14px",fontSize:12}}>↻ Re-roll</button>
                    <button onClick={acceptPreview} style={{...css.btn(true),padding:"6px 14px",fontSize:12,background:"linear-gradient(135deg,#1a8040,#30a060)",borderColor:"#1a8040"}}>✓ Accept & Publish</button>
                    <button onClick={discardPreview} style={{background:"none",border:"1px solid #e0c0c0",color:"#904040",borderRadius:6,padding:"6px 14px",fontSize:12,cursor:"pointer",fontFamily:font}}>✕ Discard</button>
                  </div>
                </div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead>
                      <tr style={{borderBottom:"2px solid #b0d8b0"}}>
                        <th style={thS2}>Surgeon</th>
                        <th style={thS2}>Svc Wk</th><th style={thS2}>Nights</th><th style={thS2}>Wknds</th><th style={thS2}>Off</th>
                      </tr>
                    </thead>
                    <tbody>
                      {surgeons.map(s => {
                        const ps = pStats[s.id]||{};
                        return (
                          <tr key={s.id} style={{borderBottom:"1px solid #c0e0c0"}}>
                            <td style={{padding:"5px 6px"}}><Badge id={s.id} small/></td>
                            <td style={tdS}>{ps.dc||0}</td>
                            <td style={tdS}>{ps.nights||0}</td>
                            <td style={tdS}>{ps.wknd||0}</td>
                            <td style={tdS}>{ps.off||0}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <p style={{fontSize:11,color:"#5a8a5a",marginTop:8}}>Click "Re-roll" to generate a different version. Click "Accept" to commit this schedule.</p>
              </div>
            );
          })()}

          {/* ─── Settings (collapsed) ─── */}
          <div style={{marginTop:14}}>
            <button onClick={()=>setShowApiKey(p=>!p)}
              style={{background:"none",border:"1px solid #e0e4ea",borderRadius:7,padding:"8px 14px",cursor:"pointer",fontFamily:font,display:"flex",alignItems:"center",gap:8,width:"100%",justifyContent:"space-between"}}>
              <span style={{fontSize:12,color:"#6a7a88",fontWeight:600}}>
                ⚙️ Settings
              </span>
              <span style={{fontSize:11,color:"#7a8a98"}}>{showApiKey ? "▲" : "▼"}</span>
            </button>
            {showApiKey && (
              <div style={{...css.card,marginTop:6,background:"#f4f6f8",border:"1px solid #e0e4ea"}}>

                <div style={{marginBottom:16}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#5a7a90",marginBottom:8}}>🔒 Scheduler Mode</div>
                  {!isScheduler ? (
                    <div>
                      <p style={{fontSize:12,color:"#7a8a98",margin:"0 0 8px",lineHeight:1.5}}>
                        Enter the scheduler PIN to unlock admin features (approve/deny vacation requests, set PIN).
                      </p>
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <input type="password" placeholder="Enter PIN" value={pinInput} onChange={e=>setPinInput(e.target.value)}
                          onKeyDown={e=>e.key==="Enter"&&checkPin()}
                          style={{...css.inp,width:140,fontSize:13,fontFamily:mono}}/>
                        <button onClick={checkPin} style={{...css.btn(true),padding:"6px 14px"}}>Unlock</button>
                        {pinError && <span style={{fontSize:12,color:"#c04040",fontWeight:600}}>{pinError}</span>}
                      </div>
                      {!schedulerPin && <p style={{fontSize:11,color:"#a0a8b0",margin:"6px 0 0"}}>No PIN set yet. The first person to set a PIN becomes the scheduler admin.</p>}
                    </div>
                  ) : (
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                        <span style={{fontSize:12,color:"#1a8040",fontWeight:600}}>✓ Scheduler mode active</span>
                        <button onClick={()=>setIsScheduler(false)} style={{background:"none",border:"1px solid #d0d8e0",color:"#6a7a88",borderRadius:5,padding:"3px 10px",fontSize:11,cursor:"pointer",fontFamily:font}}>Lock</button>
                      </div>
                      <div>
                        <label style={{fontSize:11,color:"#7a8a98",display:"block",marginBottom:2}}>Set or change scheduler PIN</label>
                        <div style={{display:"flex",gap:6,alignItems:"center"}}>
                          <input type="password" placeholder="New PIN" value={pinInput} onChange={e=>setPinInput(e.target.value)}
                            style={{...css.inp,width:140,fontSize:13,fontFamily:mono}}/>
                          <button onClick={()=>{if(pinInput.length>=4){setSchedulerPin(pinInput);setPinInput("");alert("PIN updated!");}else{alert("PIN must be at least 4 characters");}}} style={{...css.btn(true),padding:"6px 14px"}}>Save PIN</button>
                        </div>
                        {schedulerPin && <p style={{fontSize:11,color:"#8a94a0",margin:"4px 0 0"}}>Current PIN: {schedulerPin.replace(/./g,"•")}</p>}
                      </div>
                    </div>

              <button onClick={()=>{if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else setCalMonth(m=>m+1);}} style={css.btn(false)}>▶</button>

              <button onClick={()=>setView("setup")} style={css.btn(false)}>← Setup</button>
              <button onClick={()=>doGenerate(false)} style={css.btn(true)}>↻ Regenerate</button>
              <button onClick={clearSchedule} style={{...css.btn(false),color:"#c04040",borderColor:"#e0a0a0"}}>✕ Clear</button>
            </div>
          </div>

          {/* Calendar Filters */}
          <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap",marginBottom:10,padding:"8px 12px",background:dk?"#16213e":"#fff",border:`1px solid ${dkCardBorder}`,borderRadius:8}}>
            <span style={{fontSize:11,fontWeight:600,color:dkSubtext,marginRight:4}}>Show:</span>
            {[
              {key:"svc",label:"Service Wk",color:"#3080a8",icon:"S"},
              {key:"night",label:"Nights",color:"#6850a0",icon:"N"},
              {key:"wknd",label:"Weekends",color:"#908050",icon:"W"},

              {key:"fierce",label:"Fierce",color:"#8a6a10",icon:"⚡"},

            ].map(f=>(
              <button key={f.key} onClick={()=>toggleFilter(f.key)}
                style={{background:calFilters[f.key]?f.color+"18":"transparent",border:`1px solid ${calFilters[f.key]?f.color:dk?"#3a4a6e":"#d0d8e0"}`,color:calFilters[f.key]?f.color:dkSubtext,borderRadius:5,padding:"3px 8px",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:font,opacity:calFilters[f.key]?1:0.5}}>
                {f.icon} {f.label}
              </button>
            ))}
            <span style={{margin:"0 4px",color:dkSubtext}}>|</span>
            <select value={calSurgeonFilter} onChange={e=>setCalSurgeonFilter(e.target.value)}
              style={{...css.inp,padding:"3px 6px",fontSize:10,width:100,...dkInp}}>
              <option value="">All Surgeons</option>
              {surgeons.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
            {(Object.values(calFilters).some(v=>!v) || calSurgeonFilter) && (
              <button onClick={()=>{setCalFilters({svc:true,night:true,wknd:true,app:true,fierce:true,vac:true});setCalSurgeonFilter("");}}
                style={{background:"none",border:"1px solid #d0d8e0",color:"#8a94a0",borderRadius:5,padding:"3px 8px",fontSize:10,cursor:"pointer",fontFamily:font}}>
                Reset
              </button>
            )}
          </div>

          {/* Conflict Warnings */}
          {(conflicts.length > 0 || vacOverlapWarnings.length > 0) && (
            <div style={{...css.card,marginBottom:14,background:dk?"#2a1a1a":"#fef8f0",border:"1px solid #e8c0a0"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:13,fontWeight:700,color:"#c06020"}}>⚠️ Schedule Warnings — {conflicts.length + vacOverlapWarnings.length}</div>
              </div>
              {conflicts.slice(0,10).map((c,i) => (
                <div key={`c${i}`} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 8px",marginBottom:3,fontSize:12,color:c.severity==="error"?"#c04040":c.severity==="warning"?"#a06020":"#5a6a78",background:c.severity==="error"?(dk?"#2a0a0a":"#fce8e8"):dk?"#2a1a0a":"#fef8e8",borderRadius:4,border:`1px solid ${c.severity==="error"?"#e0b0b0":"#e8d0b0"}`}}>
                  <span style={{fontWeight:700}}>{c.severity==="error"?"🔴":c.severity==="warning"?"🟡":"🔵"}</span>
                  <span style={{fontFamily:mono,fontSize:11,color:dkSubtext}}>{c.week}</span>
                  <span>{c.message}</span>
                </div>
              ))}
              {vacOverlapWarnings.slice(0,10).map((w,i) => (
                <div key={`v${i}`} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 8px",marginBottom:3,fontSize:12,color:w.severity==="error"?"#c04040":"#5a6a78",background:w.severity==="error"?(dk?"#2a0a0a":"#fce8e8"):dk?"#1a1a2a":"#f0f8ff",borderRadius:4,border:`1px solid ${w.severity==="error"?"#e0b0b0":"#c0d8f0"}`}}>
                  <span style={{fontWeight:700}}>{w.severity==="error"?"🔴":"🔵"}</span>
                  <span>{w.message}</span>
                </div>
              ))}
              {(conflicts.length + vacOverlapWarnings.length) > 20 && <p style={{fontSize:11,color:"#8a94a0",marginTop:4}}>+ more…</p>}
            </div>
          )}

          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,marginBottom:1}}>
            {DAY_HDR.map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,color:"#8a94a0",padding:"5px 0",letterSpacing:1}}>{d}</div>)}
          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1}}>
            {calGrid.map((day,i)=>{
              if(!day) return <div key={`e${i}`} style={{background:"#f8f9fb",minHeight:82}}/>;
              const ds=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
              const entries=calData[ds]||[];
              const isWknd=[0,6].includes(new Date(calYear,calMonth,day).getDay());
              const hasFierce = entries.some(e=>e.type==="Fierce");
              const hasFierceBkp = entries.some(e=>e.type==="FierceBkp");
              const hasApp = entries.some(e=>e.type==="APP");
              const onVacList = [...surgeons, ...apps].filter(s=>onVac(s.id,ds,vacations));

              // Apply surgeon filter
              const sf = calSurgeonFilter;

              return (
                <div key={ds} style={{
                  background: hasFierce&&calFilters.fierce?"#faf8f0":hasFierceBkp&&calFilters.fierce?"#f8f9fb":isWknd?"#edf0f4":"#f8f9fb",
                  border: hasFierce&&calFilters.fierce?"1px solid #2a2810":hasFierceBkp&&calFilters.fierce?"1px solid #d0d8e4":"1px solid #e8ecf0",
                  minHeight:82, padding:"3px 4px", borderRadius:2,
                }}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                    <span style={{fontSize:11,fontWeight:600,color:isWknd?"#5a7090":"#4a5868",fontFamily:mono}}>{day}</span>
                    {calFilters.fierce && hasFierce && <span style={{fontSize:8,fontWeight:700,color:"#8a6a10",background:"#fef8e8",borderRadius:3,padding:"0 4px",letterSpacing:0.5}}>BKP</span>}
                    {calFilters.fierce && hasFierceBkp && !hasFierce && <span style={{fontSize:8,fontWeight:700,color:"#1a6fa8",background:"#e8f0fc",borderRadius:3,padding:"0 4px",letterSpacing:0.5}}>F·BKP</span>}
                  </div>

                  {entries.filter(e=>{
                    if(e.type==="Fierce"||e.type==="FierceBkp"||e.type==="APP"||e.type==="Holiday") return false;
                    const isD = e.type.includes("Svc");
                    const isW = e.type.includes("Wknd");
                    if(isD && !calFilters.svc) return false;
                    if(isW && !calFilters.wknd) return false;
                    if(!isD && !isW && !calFilters.night) return false;
                    if(sf && e.surgeon !== sf) return false;
                    return true;
                  }).map((e,j)=>{
                    const isB = e.cls==="backup";
                    const isD = e.type.includes("Svc");
                    const isW = e.type.includes("Wknd");
                    const label = isD?"S":isW?"W":"N";
                    const color = isD?"#3080a8":isW?"#908050":"#6850a0";
                    const highlighted = sf && e.surgeon === sf;
                    return (
                      <div key={j} style={{marginBottom:1,padding:"1px 3px",borderRadius:3,fontSize:10,
                        background:highlighted?"#e0f0ff":isB?"#fef8e8":isD?"#f8f9fb":isW?"#faf8f0":"#f4f0f8",
                        border:`1px solid ${highlighted?"#80b8e0":isB?"#d8c880":isD?"#d0dce8":isW?"#faf0d8":"#141028"}`,
                        opacity:isB?0.85:1,
                      }}>
                        {isB&&<span style={{color:"#8a6a10",fontWeight:700,fontSize:8,marginRight:2}}>B</span>}
                        <span style={{color,fontWeight:700}}>{label}</span>
                        {" "}
                        <span style={{color:PAL[sMap[e.surgeon]?.idx%7]?.tx||"#4a5868",fontWeight:highlighted?700:400}}>{sMap[e.surgeon]?.name||"?"}</span>
                      </div>
                    );
                  })}

                  {/* Holiday coverage entries */}
                  {entries.filter(e=>e.type==="Holiday").filter(e=>!sf||e.surgeon===sf).map((e,j)=>(
                    <div key={"hol"+j} style={{marginBottom:1,padding:"1px 3px",borderRadius:3,fontSize:10,
                      background:"#fef0e8",border:"1px solid #e0a868",fontWeight:600}}>
                      <span style={{color:"#c06020",fontWeight:700}}>🎄</span>
                      {" "}
                      <span style={{color:PAL[sMap[e.surgeon]?.idx%7]?.tx||"#4a5868"}}>{sMap[e.surgeon]?.name||"?"}</span>
                      <span style={{color:"#a07030",fontSize:8,marginLeft:2}}>{e.hours}</span>
                    </div>
                  ))}

                  {/* APP entries */}
                  {calFilters.app && entries.filter(e=>e.type==="APP").map((e,j)=>(
                    <div key={"app"+j} style={{marginBottom:1,padding:"1px 3px",borderRadius:3,fontSize:10,
                      background:"#fcf4f0",border:"1px solid #281818"}}>
                      <span style={{color:"#c08050",fontWeight:700}}>A</span>
                      {" "}
                      <span style={{color:APP_PAL[aMap[e.appId]?.idx%4]?.tx||"#5a6878"}}>{aMap[e.appId]?.name||"?"}</span>
                      <span style={{color:"#8a94a0",fontSize:8,marginLeft:2}}>5p–7a</span>
                    </div>
                  ))}

                  {calFilters.fierce && hasFierce && <div style={{fontSize:8,color:"#8a6a10",marginTop:1,fontWeight:600}}>⚡ Fierce Primary</div>}
                  {calFilters.fierce && hasFierceBkp && !hasFierce && <div style={{fontSize:8,color:"#1a6fa8",marginTop:1,fontWeight:600}}>🛡 Fierce Backup</div>}
                  {calFilters.vac && onVacList.map(s=>(
                    <div key={s.id} style={{fontSize:8,color:"#c04848",marginTop:1}}>🏖 {s.name}</div>
                  ))}
                </div>
              );
            })}
          </div>

          <div style={{marginTop:10,display:"flex",gap:12,fontSize:10,color:"#8a94a0",flexWrap:"wrap"}}>
            <span><span style={{color:"#3080a8",fontWeight:700}}>S</span> Service Wk</span>
            <span><span style={{color:"#6030a0",fontWeight:700}}>N</span> Night</span>
            <span><span style={{color:"#908050",fontWeight:700}}>W</span> Weekend</span>
            <span><span style={{color:"#c08050",fontWeight:700}}>A</span> APP</span>
            <span><span style={{color:"#8a6a10",fontWeight:700}}>B</span> Backup</span>
            <span><span style={{color:"#8a6a10"}}>⚡</span> Fierce Primary</span>
            <span><span style={{color:"#1a6fa8"}}>🛡</span> Fierce Backup</span>
            <span>🏖 Vacation</span>
            <span><span style={{color:"#c06020"}}>🎄</span> Holiday Coverage</span>
          </div>

          {/* ─── Shift Swap Tool ─── */}
          {Object.keys(schedule).length > 0 && (
            <div style={{...css.card,marginTop:14,background:"linear-gradient(135deg,#f8f0ff,#f4f0f8)",border:"1px solid #d0c0e4"}}>
              <div style={css.cardT}>🔄 Shift Swap Tool</div>
              <p style={{fontSize:12,color:"#5a6a78",margin:"0 0 12px",lineHeight:1.5}}>
                Need to change a shift? All swaps must be <strong>two-way</strong> — the other surgeon takes your shift and you take one of theirs.
                One-way swaps are only permitted for emergencies (illness, family emergency) and require scheduler approval.
              </p>
              <div style={{display:"flex",gap:6,alignItems:"end",flexWrap:"wrap",marginBottom:10}}>
                <div>
                  <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Week</label>
                  <select value={swapTarget?.mondayStr||""} onChange={e=>{setSwapTarget(prev=>({...(prev||{}),mondayStr:e.target.value}));setSwapSuggestions(null);}} style={{...css.inp,width:160}}>
                    <option value="">Select week…</option>
                    {Object.keys(schedule).sort().map(m=><option key={m} value={m}>Wk of {m}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Shift</label>
                  <select value={swapTarget?.shift||""} onChange={e=>{setSwapTarget(prev=>({...(prev||{}),shift:e.target.value}));setSwapSuggestions(null);}} style={{...css.inp,width:140}}>
                    <option value="">Select shift…</option>
                    {ALL_SHIFT_KEYS.map(sk=><option key={sk} value={sk}>{SHIFT_LABELS[sk]}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Current Surgeon</label>
                  {(()=>{
                    const m = swapTarget?.mondayStr;
                    const sh = swapTarget?.shift;
                    const wk = m ? schedule[m] : null;
                    let currentId = null;
                    if (wk && sh) {
                      currentId = sh === "dayCall" ? wk.dayCall : wk.nights?.[sh];
                    }
                    return currentId ? (
                      <div style={{padding:"6px 10px"}}><Badge id={currentId}/></div>
                    ) : (
                      <div style={{padding:"6px 10px",fontSize:12,color:"#8a94a0"}}>—</div>
                    );
                  })()}
                </div>
                <button onClick={()=>{
                  const m = swapTarget?.mondayStr;
                  const sh = swapTarget?.shift;
                  const wk = m ? schedule[m] : null;
                  if (!wk || !sh) return;
                  const currentId = sh === "dayCall" ? wk.dayCall : wk.nights?.[sh];
                  if (!currentId) return;
                  findSwapSuggestions(m, sh, currentId);
                }} disabled={!swapTarget?.mondayStr || !swapTarget?.shift}
                  style={{...css.btn(true),padding:"7px 16px",opacity:(!swapTarget?.mondayStr || !swapTarget?.shift)?0.5:1,background:"linear-gradient(135deg,#6030a0,#8050c0)",borderColor:"#6030a0"}}>
                  Find Swap Options
                </button>
              </div>

              {/* Swap Suggestions */}
              {swapSuggestions && (
                <div style={{marginTop:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#6030a0",marginBottom:8}}>
                    Swap options for <Badge id={swapTarget.surgeonId}/> — {SHIFT_LABELS[swapTarget.shift]} (wk of {swapTarget.mondayStr})
                  </div>
                  {swapSuggestions.length === 0 ? (
                    <p style={{color:"#8a94a0",fontSize:13,padding:10}}>No eligible swap candidates found. All surgeons are either on vacation or have conflicts.</p>
                  ) : swapSuggestions.map((s,i) => (
                    <div key={s.candidateId} style={{background:i===0?"#f0f8f0":"#f8f9fb",border:`1px solid ${i===0?"#b0d8b0":"#e0e4ea"}`,borderRadius:8,padding:"10px 14px",marginBottom:6}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:4}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          {i===0 && <span style={{fontSize:10,fontWeight:700,color:"#1a8040",background:"#e0f8e0",padding:"1px 6px",borderRadius:4}}>BEST</span>}
                          <Badge id={s.candidateId}/>
                          <span style={{fontSize:12,color:s.countDiff>0?"#1a8040":s.countDiff===0?"#5a6a78":"#c09030",fontWeight:600}}>
                            {s.countDiff>0?"▲ Fewer shifts":s.countDiff===0?"= Equal":"▼ More shifts"}
                          </span>
                        </div>
                      </div>
                      <div style={{fontSize:11,color:"#5a6a78",lineHeight:1.6,marginBottom:4}}>
                        {s.reasons.map((r,j)=><div key={j}>• {r}</div>)}
                      </div>
                      {s.returnSwaps.length > 0 ? (
                        <div style={{marginTop:6,paddingTop:6,borderTop:"1px solid #e8ecf0"}}>
                          <div style={{fontSize:10,fontWeight:700,color:"#6030a0",marginBottom:4}}>↔ Two-way swap — {s.candidateName} takes this shift, {swapTarget.surgeonName} takes one of theirs:</div>
                          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                            {s.returnSwaps.slice(0,8).map((rs,k) => (
                              <button key={k} onClick={()=>executeTwoWaySwap(swapTarget.mondayStr, swapTarget.shift, swapTarget.surgeonId, s.candidateId, rs.mondayStr, rs.shift)}
                                style={{background:"#f0e8fc",border:"1px solid #c8b0e0",color:"#6030a0",borderRadius:5,padding:"4px 12px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:font}}>
                                ↔ {rs.label}
                              </button>
                            ))}
                          </div>
                        </div>
                      ) : (
                        <div style={{fontSize:11,color:"#a08040",background:"#fef8e8",border:"1px solid #e8d8a0",borderRadius:5,padding:"6px 10px",marginTop:4}}>
                          No return swap available — {s.candidateName} doesn't have a matching shift {swapTarget.surgeonName} could take back.
                        </div>
                      )}
                      {/* Emergency one-way swap — scheduler only */}
                      {isScheduler && (
                        <div style={{marginTop:6,paddingTop:6,borderTop:"1px dashed #e0d0c0"}}>
                          <button onClick={()=>{
                            if (!confirm(`⚠️ Emergency one-way swap\n\nThis will reassign ${SHIFT_LABELS[swapTarget.shift]} to ${s.candidateName} WITHOUT a return swap.\n\nOne-way swaps should only be used for illness, family emergency, or other acute circumstances.\n\nProceed?`)) return;
                            swapShift(swapTarget.mondayStr, swapTarget.shift, s.candidateId);
                          }}
                            style={{background:"none",border:"1px solid #e0c0a0",color:"#a08040",borderRadius:5,padding:"3px 10px",fontSize:10,cursor:"pointer",fontFamily:font}}>
                            ⚠ Emergency one-way (scheduler only)
                          </button>
                        </div>
                      )}
                    </div>
                  ))}
                  <button onClick={()=>{setSwapSuggestions(null);setSwapTarget(null);}} style={{...css.btn(false),padding:"5px 12px",fontSize:11,marginTop:6}}>Close</button>
                </div>
              )}
            </div>
          )}

          {/* Export & Share */}
          {Object.keys(schedule).length > 0 && (
            <div style={{...css.card,marginTop:14,background:"linear-gradient(135deg,#f8f9fb,#f0f2f5)",border:"1px solid #d0d8e4"}}>
              <div style={css.cardT}>📤 Export & Share</div>
              <p style={{fontSize:12,color:"#5a6a78",margin:"0 0 12px",lineHeight:1.5}}>
                Download .ics files for any calendar app, or share a read-only calendar with the group.
              </p>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
                {surgeons.map(s => (
                  <button key={s.id} onClick={() => {
                    const events = buildICSEvents(schedule, s.id, s.name, appShifts, aMap);
                    const ics = generateICS(events, `Call Schedule — ${s.name}`);
                    downloadICS(ics, `call-schedule-${s.name.toLowerCase()}.ics`);
                  }} style={{...css.badge(sMap[s.id]?.idx||0),cursor:"pointer",padding:"5px 12px",fontSize:12}}>
                    ⬇ {s.name}
                  </button>
                ))}
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
                <button onClick={() => {
                  const allEvents = [];
                  surgeons.forEach(s => { allEvents.push(...buildICSEvents(schedule, s.id, s.name, appShifts, aMap)); });
                  Object.entries(appShifts).forEach(([ds, aid]) => {
                    const d = parse(ds); const next = addD(d, 1); const appName = aMap?.[aid]?.name || aid;
                    allEvents.push({ start: icsDate(d.getFullYear(),d.getMonth()+1,d.getDate(),17), end: icsDate(next.getFullYear(),next.getMonth()+1,next.getDate(),7), summary: `APP Call — ${appName}`, desc: `APP Night Call 5:00 PM – 7:00 AM` });
                  });
                  const ics = generateICS(allEvents, "Full Call Schedule");
                  downloadICS(ics, "call-schedule-full.ics");
                }} style={{...css.btn(true),padding:"6px 16px"}}>
                  ⬇ Full Schedule (All Surgeons + APPs)
                </button>
                <button onClick={generateShareHTML} style={{...css.btn(true),padding:"6px 16px"}}>
                  ⬇ Shareable Calendar (HTML)
                </button>
                <button onClick={()=>window.print()} style={{...css.btn(false),padding:"6px 16px"}}>
                  🖨 Print Calendar
                </button>
              </div>

              {/* Calendar Sync - Subscribable URLs */}
              <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid #d0d8e4"}}>
                <div style={{fontSize:13,fontWeight:700,color:"#1a6fa8",marginBottom:6}}>📅 Subscribe to Live Calendar</div>
                <p style={{fontSize:12,color:"#5a6a78",margin:"0 0 10px",lineHeight:1.5}}>
                  Subscribe to these URLs in Google Calendar, Outlook, or Apple Calendar. The calendar auto-updates when the schedule changes — no need to re-download.
                </p>
                <div style={{fontSize:11,color:"#7a8a98",marginBottom:6}}>
                  <strong>How to subscribe:</strong> In Google Calendar: Other calendars (+) → From URL → paste the link below.
                </div>
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:11,fontWeight:600,color:"#5a6a78",marginBottom:4}}>Full Schedule:</div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>

          {/* Monthly Call Summary (for stipends) */}
          {Object.keys(schedule).length > 0 && (()=>{
            // Compute monthly breakdown
            const monthlyData = {};
            const allMonths = new Set();
            Object.entries(schedule).forEach(([mStr, wk]) => {
              const mon = parse(mStr);
              // Each day of the week maps to a calendar month
              for (let i = 0; i < 7; i++) {
                const d = addD(mon, i);
                const moKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
                allMonths.add(moKey);
                if (!monthlyData[moKey]) monthlyData[moKey] = {};
                surgeons.forEach(s => { if (!monthlyData[moKey][s.id]) monthlyData[moKey][s.id] = { total1st: 0, total2nd: 0 }; });
              }
              const isB = wk.isBackup;
              const countKey = isB ? "total2nd" : "total1st";

              // Service Week: M-F = 5 days + Sat = 2 days = 7 total
              if (wk.dayCall) {
                for (let i = 0; i < 5; i++) {
                  const d = addD(mon, i);
                  const moKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
                  if (monthlyData[moKey]?.[wk.dayCall]) monthlyData[moKey][wk.dayCall][countKey]++;
                }
                // Saturday = 2 call days (7a–7a, 24hr)
                const sat = addD(mon, 5);
                const satMo = `${sat.getFullYear()}-${String(sat.getMonth()+1).padStart(2,"0")}`;
                if (monthlyData[satMo]?.[wk.dayCall]) monthlyData[satMo][wk.dayCall][countKey] += 2;
              }

              // Night shifts (Mon-Thu): 1 call day each (5p–7a)
              NIGHT_KEYS.forEach((sk, i) => {
                const sid = wk.nights?.[sk];
                if (!sid) return;
                const d = addD(mon, i);
                const moKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
                if (monthlyData[moKey]?.[sid]) monthlyData[moKey][sid][countKey]++;
              });

              // Weekend: Fri night (5p–7a) = 1 + Sun (7a–7a) = 2 = 3 total
              const wkndSid = wk.nights?.wknd;
              if (wkndSid) {
                const fri = addD(mon, 4);
                const sun = addD(mon, 6);
                const friMo = `${fri.getFullYear()}-${String(fri.getMonth()+1).padStart(2,"0")}`;
                const sunMo = `${sun.getFullYear()}-${String(sun.getMonth()+1).padStart(2,"0")}`;
                if (monthlyData[friMo]?.[wkndSid]) monthlyData[friMo][wkndSid][countKey] += 1;
                if (monthlyData[sunMo]?.[wkndSid]) monthlyData[sunMo][wkndSid][countKey] += 2;
              }
            });

            const sortedMonths = [...allMonths].sort();
            const moLabels = sortedMonths.map(m => { const [y,mo] = m.split("-"); return MO[parseInt(mo)-1].slice(0,3) + " " + y.slice(2); });

                      const m1 = sortedMonths.map(m => monthlyData[m]?.[s.id]?.total1st || 0);
                      const m2 = sortedMonths.map(m => monthlyData[m]?.[s.id]?.total2nd || 0);
                      const t1 = m1.reduce((a,b)=>a+b,0);
                      const t2 = m2.reduce((a,b)=>a+b,0);
                      return [s.name, ...m1, t1, ...m2, t2, t1+t2].join(",");

                    const csv = [header.join(","), ...rows].join("\n");
                    const blob = new Blob([csv], {type:"text/csv"});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a"); a.href=url; a.download=`monthly-call-summary-${startYear}.csv`; a.click();

                            <td style={{padding:"4px 6px",position:"sticky",left:0,background:dk?"#16213e":"#fff",zIndex:1}}><Badge id={s.id} small/></td>
                            {vals.map((v,i)=><td key={i} style={{...tdS,textAlign:"center",fontSize:12,padding:"4px 3px",color:v===0?"#c0c8d0":undefined}}>{v||"–"}</td>)}
                            <td style={{...tdS,textAlign:"center",fontSize:13,fontWeight:700,color:"#1a8040"}}>{total}</td>

                        {moLabels.map(m=><th key={m} style={{...thS2,textAlign:"center",minWidth:40}}>{m}</th>)}
                        <th style={{...thS2,textAlign:"center",fontWeight:700,color:"#8a6a10"}}>Total</th>
                      </tr>
                    </thead>
                    <tbody>
                      {surgeons.map(s=>{

                        const total = vals.reduce((a,b)=>a+b,0);
                        return (
                          <tr key={s.id} style={{borderBottom:"1px solid #e8ecf0"}}>

                            {vals.map((v,i)=><td key={i} style={{...tdS,textAlign:"center",fontSize:12,padding:"4px 3px",color:v===0?"#c0c8d0":undefined}}>{v||"–"}</td>)}
                            <td style={{...tdS,textAlign:"center",fontSize:13,fontWeight:700,color:"#8a6a10"}}>{total}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <div style={{fontSize:11,color:"#7a8a98",lineHeight:1.5,marginTop:10}}>
                  <strong style={{color:"#2c5a80"}}>Call Day Counting:</strong> Service Week M–F = 5 days (7a–5p) · Saturday = 2 days (7a–7a) · Night = 1 day (5p–7a) · Weekend = 3 days (Fri 5p–Sat 7a = 1 + Sun 7a–Mon 7a = 2)

          {/* APP stats */}

                const tSp = sp(totalArr);
                const tOk = tSp <= 5;
                return <>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,padding:"8px 12px",background:tOk?"#e8f8e8":"#fef8e8",border:`1px solid ${tOk?"#b0d8b0":"#302810"}`,borderRadius:7}}>
                    <span style={{fontSize:16}}>{tOk?"✅":"⚠️"}</span>
                    <span style={{fontSize:13,fontWeight:700,color:tOk?"#60e0a0":"#e0a060"}}>
                      Total Call Days (1yr): spread {tSp} (min {Math.min(...totalArr)}, max {Math.max(...totalArr)}) — {tOk?"Fair":"Review recommended"}
                    </span>

                  {[

                        <span style={{fontSize:12,color:ok?"#50b070":"#b09040"}}>
                          {label}: spread {s} (min {Math.min(...arr)}, max {Math.max(...arr)}) — {ok?"Fair":"Review"}
                        </span>
                      </div>
                    );
                  })}
                </>;
              })()}
            </div>
          )}

          {/* Running Totals — 1yr, 2yr, multi-year */}
          {Object.values(stats).some(s=>s.dc>0) && (
            <div style={css.card}>
              <div style={css.cardT}>Running Totals <span style={{fontWeight:400,fontSize:11,color:"#7a8a98"}}>— Prior + This Period</span></div>

              {[

                {label:"2-Year", color:"#8a6a10", data:cum2yr},
                {label:"Multi-Year", color:"#7030a8", data:cumStats},
              ].map(tier=>(

                  <div style={{overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>

                        <tr style={{borderBottom:"1px solid #d0d8e0"}}>

                          <th style={thS2}>Day</th><th style={thS2}>Nights</th><th style={thS2}>Wknds</th><th style={thS2}>Off</th>
                          <th style={{...thS2,borderLeft:"1px solid #d8c880"}}>B-Day</th><th style={thS2}>B-Ngt</th><th style={thS2}>B-Wknd</th><th style={thS2}>B-Off</th>
                        </tr>
                      </thead>
                      <tbody>
                        {surgeons.map(s=>{
                          const c=tier.data[s.id]||{};
                          const total = calcShifts(c);

                                <td key={i} style={{...tdS,fontWeight:600}}>{v||0}</td>

                                <td key={"b"+i} style={{...tdS,fontWeight:600,...(i===0?{borderLeft:"1px solid #d8c880"}:{})}}>{v||0}</td>
                              )}

              <div style={{fontSize:11,color:"#7a8a98",lineHeight:1.5}}>

        {/* ════════════════ MY SCHEDULE ════════════════ */}
        {view==="myschedule"&&<>
          <div style={css.card}>
            <div style={css.cardT}>My Call Schedule</div>
            <p style={{fontSize:13,color:"#5a6a78",margin:"0 0 12px",lineHeight:1.5}}>
              Select your name to see only your shifts and vacations. Your choice is remembered on this device.
            </p>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:16}}>
              <select value={mySurgeon} onChange={e=>setMySurgeon(e.target.value)} style={{...css.inp,width:180,fontSize:14}}>

                {surgeons.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
