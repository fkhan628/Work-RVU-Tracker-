                  📅 Download My Calendar (.ics)
                </button>
              )}
            </div>
          </div>

          {mySurgeon && Object.keys(schedule).length > 0 && (() => {
            const myId = mySurgeon;
            const myName = sMap[myId]?.name || "?";
            const myVacs = vacations[myId] || [];

            // Build my shifts
            const myShifts = [];
            Object.entries(schedule).forEach(([mStr, wk]) => {
              const mon = parse(mStr);
              const endStr = fmt(addD(mon, 6));
              const roles = [];
              if (wk.dayCall === myId) roles.push({type: "Service Week (incl. Sat)", icon: "🏥", detail: "M–F 7a–5p + Sat 7a–Sun 7a", color: "#1a6fa8", shiftKey: "dayCall"});
              NIGHT_KEYS.forEach((sk, i) => {
                if (wk.nights?.[sk] === myId) roles.push({type: SHIFT_LABELS[sk], icon: "🌙", detail: SHIFT_TIMES[sk], color: "#6030a0", shiftKey: sk});
              });
              if (wk.nights?.wknd === myId) roles.push({type: "Weekend", icon: "🌗", detail: SHIFT_TIMES.wknd, color: "#7a6030", shiftKey: "wknd"});
              if (wk.off === myId) roles.push({type: "OFF", icon: "✅", detail: "No call this week", color: "#2a7a40", shiftKey: null});
              if (roles.length > 0) {
                myShifts.push({ mStr, endStr, roles, isBackup: wk.isBackup, isFierceBackup: wk.isFierceBackup });
              }
            });

            return (
              <>
                <div style={{fontSize:15,fontWeight:700,color:"#1a2a3a",marginBottom:12}}>
                  <Badge id={myId}/> <span style={{marginLeft:8}}>{MO[startMonth]} – {MO[endMoIdx]} {startYear}</span>
                </div>

                {/* My Vacations */}
                {myVacs.length > 0 && (
                  <div style={{...css.card,background:"#fef8f0",border:"1px solid #e8d8c0"}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#8a6a10",marginBottom:6}}>🏖 My Vacations</div>
                    {myVacs.map(([vs,ve],i) => (
                      <div key={i} style={{fontSize:13,color:"#5a5030",marginBottom:3}}>{vs} → {ve}</div>
                    ))}
                  </div>
                )}

                {/* My Shifts */}
                {myShifts.map(wk => (
                  <div key={wk.mStr} style={{...css.card,padding:12,marginBottom:8,border:wk.isBackup?"1px solid #e8d090":"1px solid #e0e4ea"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:4}}>
                      <span style={{fontFamily:mono,fontSize:13,color:wk.isBackup?"#8a6a10":"#1a6fa8",fontWeight:600}}>{wk.mStr} → {wk.endStr}</span>
                      {wk.isBackup && <span style={css.backupBanner}>⚡ BACKUP</span>}
                      {wk.isFierceBackup && <span style={{fontSize:11,color:"#1a6fa8",background:"#e8f0fc",border:"1px solid #a8c8e0",borderRadius:6,padding:"2px 8px",fontWeight:600}}>🛡 Fierce Backup</span>}
                    </div>
                    {wk.roles.map((r,i) => (
                      <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 10px",background:"#f8f9fb",borderRadius:5,border:"1px solid #e8ecf0",marginBottom:3}}>
                        <span style={{fontSize:14}}>{r.icon}</span>
                        <span style={{fontSize:13,fontWeight:600,color:r.color}}>{r.type}</span>
                        <span style={{fontSize:11,color:"#8a94a0",fontFamily:mono}}>{r.detail}</span>
                        {r.shiftKey && (
                          <button onClick={()=>{findSwapSuggestions(wk.mStr, r.shiftKey, myId); setView("calendar");}}
                            style={{marginLeft:"auto",background:"#f0e8fc",border:"1px solid #c8b0e0",color:"#6030a0",borderRadius:5,padding:"2px 10px",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:font}}>
                            🔄 Find Swap
                          </button>
                        )}
                      </div>
                    ))}
                  </div>
                ))}

                {myShifts.length === 0 && (
                  <div style={{...css.card,textAlign:"center",color:"#8a94a0",padding:30}}>No shifts assigned yet. Generate a schedule first.</div>
                )}
              </>
            );
          })()}

          {!mySurgeon && (
            <div style={{...css.card,textAlign:"center",color:"#8a94a0",padding:30}}>Select your name above to view your schedule.</div>
          )}
        </>}

        {/* ════════════════ REQUESTS ════════════════ */}
        {view==="requests"&&<>
          {/* Submit Vacation Request */}
          <div style={css.card}>
            <div style={css.cardT}>🏖 Request Vacation</div>
            <p style={{fontSize:13,color:"#5a6a78",margin:"0 0 12px",lineHeight:1.5}}>
              Submit a vacation request. It will be reviewed at the regular Friday meeting.
            </p>
            <div style={{display:"flex",gap:6,alignItems:"end",flexWrap:"wrap",marginBottom:8}}>
              <div>
                <label style={{fontSize:11,color:"#7a8a98",display:"block",marginBottom:2}}>Person</label>
                <select value={vacReqSurgeon} onChange={e=>setVacReqSurgeon(e.target.value)} style={{...css.inp,width:140}}>
                  <option value="">Select…</option>
                  <optgroup label="Surgeons">
                    {surgeons.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                  </optgroup>
                  <optgroup label="APPs">
                    {apps.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
                  </optgroup>
                </select>
              </div>
              <div>
                <label style={{fontSize:11,color:"#7a8a98",display:"block",marginBottom:2}}>Start Date</label>
                <input type="date" value={vacReqStart} onChange={e=>setVacReqStart(e.target.value)} style={{...css.inp,width:150}}/>
              </div>
              <div>
                <label style={{fontSize:11,color:"#7a8a98",display:"block",marginBottom:2}}>End Date</label>
                <input type="date" value={vacReqEnd} onChange={e=>setVacReqEnd(e.target.value)} style={{...css.inp,width:150}}/>
              </div>
              <button onClick={submitVacRequest} style={{...css.btn(true),padding:"7px 18px"}}>Submit Request</button>
            </div>
            <div>
              <label style={{fontSize:11,color:"#7a8a98",display:"block",marginBottom:2}}>Reason (optional)</label>
              <input value={vacReqReason} onChange={e=>setVacReqReason(e.target.value)} placeholder="Conference, personal, etc."
                style={{...css.inp,width:"100%",maxWidth:400}}/>
            </div>
          </div>

          {/* Pending Requests */}
          {(()=>{
            const pending = vacRequests.filter(r => r.status === "pending");
            const reviewed = vacRequests.filter(r => r.status !== "pending");
            return <>
              <div style={css.card}>
                <div style={css.cardT}>⏳ Pending Requests <span style={{fontWeight:400,fontSize:12,color:"#8a94a0"}}>— {pending.length}</span></div>
                {pending.length === 0 ? (
                  <p style={{color:"#8a94a0",fontSize:13}}>No pending requests.</p>
                ) : pending.map(r => (
                  <div key={r.id} style={{padding:"10px 12px",marginBottom:6,background:"#fef8f0",border:"1px solid #e8d8c0",borderRadius:8}}>
                    {editingVacReq?.id === r.id ? (
                      <div style={{display:"flex",gap:6,alignItems:"end",flexWrap:"wrap"}}>
                        {sMap[r.surgeon_id] ? <Badge id={r.surgeon_id}/> : <AppBadge id={r.surgeon_id}/>}
                        <div>
                          <label style={{fontSize:10,color:"#7a8a98",display:"block"}}>Start</label>
                          <input type="date" value={editingVacReq.start_date} onChange={e=>setEditingVacReq(p=>({...p,start_date:e.target.value}))} style={{...css.inp,width:140,fontSize:12}}/>
                        </div>
                        <div>
                          <label style={{fontSize:10,color:"#7a8a98",display:"block"}}>End</label>
                          <input type="date" value={editingVacReq.end_date} onChange={e=>setEditingVacReq(p=>({...p,end_date:e.target.value}))} style={{...css.inp,width:140,fontSize:12}}/>
                        </div>
                        <div>
                          <label style={{fontSize:10,color:"#7a8a98",display:"block"}}>Reason</label>
                          <input value={editingVacReq.reason||""} onChange={e=>setEditingVacReq(p=>({...p,reason:e.target.value}))} style={{...css.inp,width:140,fontSize:12}}/>
                        </div>
                        <button onClick={saveVacRequestEdit} style={{...css.btn(true),padding:"5px 12px",fontSize:11}}>Save</button>
                        <button onClick={()=>setEditingVacReq(null)} style={{...css.btn(false),padding:"5px 12px",fontSize:11}}>Cancel</button>
                      </div>
                    ) : (
                      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                        {sMap[r.surgeon_id] ? <Badge id={r.surgeon_id}/> : <AppBadge id={r.surgeon_id}/>}
                        <span style={{fontFamily:mono,fontSize:13,color:"#2c3e50"}}>{r.start_date} → {r.end_date}</span>
                        {r.reason && <span style={{fontSize:12,color:"#7a8a98",fontStyle:"italic"}}>"{r.reason}"</span>}
                        <span style={{fontSize:11,color:"#a0a8b0"}}>Submitted {new Date(r.submitted_at).toLocaleDateString()}</span>
                        {isScheduler && (
                          <div style={{marginLeft:"auto",display:"flex",gap:6}}>
                            <button onClick={()=>approveVacRequest(r)} style={{background:"#e8f8e8",border:"1px solid #a0d8a0",color:"#1a8040",borderRadius:6,padding:"4px 12px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:font}}>✓ Approve</button>
                            <button onClick={()=>{const note=prompt("Reason for denial (optional):"); if(note!==null) denyVacRequest(r,note);}} style={{background:"#fce8e8",border:"1px solid #e0b0b0",color:"#c04040",borderRadius:6,padding:"4px 12px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:font}}>✕ Deny</button>
                          </div>
                        )}
                        {!isScheduler && <span style={{marginLeft:"auto",fontSize:11,color:"#c09030",fontWeight:600,background:"#fef8e8",padding:"2px 8px",borderRadius:4,border:"1px solid #e8d090"}}>Pending review</span>}
                        <button onClick={()=>setEditingVacReq({id:r.id,start_date:r.start_date,end_date:r.end_date,reason:r.reason||""})} style={{background:"none",border:"1px solid #d0d8e0",color:"#5a6a78",borderRadius:5,padding:"2px 8px",fontSize:10,cursor:"pointer",fontFamily:font}}>✎ Edit</button>
                        <button onClick={()=>deleteVacRequest(r.id)} style={{background:"none",border:"1px solid #e0c0c0",color:"#904040",borderRadius:5,padding:"2px 8px",fontSize:10,cursor:"pointer",fontFamily:font}}>Withdraw</button>
                      </div>
                    )}
                  </div>
                ))}
                {pending.length > 0 && !isScheduler && (
                  <p style={{fontSize:12,color:"#8a94a0",margin:"10px 0 0",lineHeight:1.5}}>
                    Only the scheduler can approve or deny requests. Enter the scheduler PIN in ⚙️ Settings to unlock.
                  </p>
                )}
              </div>

              {reviewed.length > 0 && (
                <div style={css.card}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div style={css.cardT}>📋 Reviewed <span style={{fontWeight:400,fontSize:12,color:"#8a94a0"}}>— {reviewed.length}</span></div>
                    {isScheduler && reviewed.length > 0 && (
                      <button onClick={clearReviewedRequests} style={{background:"none",border:"1px solid #e8c0c0",color:"#904040",borderRadius:5,padding:"3px 10px",fontSize:10,cursor:"pointer",fontFamily:font}}>Clear All Reviewed</button>
                    )}
                  </div>
                  {reviewed.slice(0, 20).map(r => (
                    <div key={r.id} style={{padding:"8px 12px",marginBottom:4,background:r.status==="approved"?"#f0faf0":r.status==="revoked"?"#f8f8f0":"#faf0f0",border:`1px solid ${r.status==="approved"?"#c0e0c0":r.status==="revoked"?"#d8d8c0":"#e0c0c0"}`,borderRadius:6}}>
                      {editingVacReq?.id === r.id ? (
                        <div style={{display:"flex",gap:6,alignItems:"end",flexWrap:"wrap"}}>
                          {sMap[r.surgeon_id] ? <Badge id={r.surgeon_id}/> : <AppBadge id={r.surgeon_id}/>}
                          <div>
                            <label style={{fontSize:10,color:"#7a8a98",display:"block"}}>Start</label>
                            <input type="date" value={editingVacReq.start_date} onChange={e=>setEditingVacReq(p=>({...p,start_date:e.target.value}))} style={{...css.inp,width:140,fontSize:12}}/>
                          </div>
                          <div>
                            <label style={{fontSize:10,color:"#7a8a98",display:"block"}}>End</label>
                            <input type="date" value={editingVacReq.end_date} onChange={e=>setEditingVacReq(p=>({...p,end_date:e.target.value}))} style={{...css.inp,width:140,fontSize:12}}/>
                          </div>
                          <button onClick={saveVacRequestEdit} style={{...css.btn(true),padding:"4px 10px",fontSize:11}}>Save</button>
                          <button onClick={()=>setEditingVacReq(null)} style={{...css.btn(false),padding:"4px 10px",fontSize:11}}>Cancel</button>
                        </div>
                      ) : (
                        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                          <span style={{fontSize:13,fontWeight:700,color:r.status==="approved"?"#1a8040":r.status==="revoked"?"#8a8a40":"#c04040"}}>{r.status==="approved"?"✓":r.status==="revoked"?"↩":"✕"}</span>
                          {sMap[r.surgeon_id] ? <Badge id={r.surgeon_id}/> : <AppBadge id={r.surgeon_id}/>}
                          <span style={{fontFamily:mono,fontSize:12,color:"#2c3e50"}}>{r.start_date} → {r.end_date}</span>
                          {r.reason && <span style={{fontSize:11,color:"#8a94a0"}}>"{r.reason}"</span>}
                          {r.review_note && <span style={{fontSize:11,color:"#c04040"}}>Note: {r.review_note}</span>}
                          {r.status==="revoked" && <span style={{fontSize:10,color:"#8a8a40",fontWeight:600}}>Revoked</span>}
                          <span style={{fontSize:11,color:"#a0a8b0",marginLeft:"auto"}}>{r.reviewed_at ? new Date(r.reviewed_at).toLocaleDateString() : ""}</span>
                          {isScheduler && r.status==="approved" && (
                            <>
                              <button onClick={()=>setEditingVacReq({id:r.id,start_date:r.start_date,end_date:r.end_date,reason:r.reason||""})} style={{background:"none",border:"1px solid #d0d8e0",color:"#5a6a78",borderRadius:5,padding:"2px 8px",fontSize:10,cursor:"pointer",fontFamily:font}}>✎ Edit</button>
                              <button onClick={()=>revokeApprovedVac(r)} style={{background:"none",border:"1px solid #e0c0c0",color:"#904040",borderRadius:5,padding:"2px 8px",fontSize:10,cursor:"pointer",fontFamily:font}}>↩ Revoke</button>
                            </>
                          )}
                          {isScheduler && (
                            <button onClick={()=>deleteVacRequest(r.id)} style={{background:"none",border:"none",color:"#c04040",cursor:"pointer",fontSize:12,padding:"0 4px"}}>✕</button>
                          )}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </>;
          })()}

          {/* ─── Shift Trade Requests ─── */}
          <div style={css.card}>
            <div style={css.cardT}>🔄 Propose a Shift Trade</div>
            <p style={{fontSize:13,color:"#5a6a78",margin:"0 0 12px",lineHeight:1.5}}>
              Propose a two-way trade with another surgeon — you take one of their shifts in return. They'll be notified and can accept or decline.
            </p>
            <div style={{display:"flex",gap:6,alignItems:"end",flexWrap:"wrap",marginBottom:8}}>
              <div>
                <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>From</label>
                <select value={tradeFrom} onChange={e=>setTradeFrom(e.target.value)} style={{...css.inp,width:100}}>
                  <option value="">Who…</option>
                  {surgeons.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              </div>
              <div>
                <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Trade with</label>
                <select value={tradeTo} onChange={e=>setTradeTo(e.target.value)} style={{...css.inp,width:100}}>
                  <option value="">Who…</option>
                  {surgeons.filter(s=>s.id!==tradeFrom).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              </div>
              <div>
                <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Week</label>
                <select value={tradeWeek} onChange={e=>setTradeWeek(e.target.value)} style={{...css.inp,width:140}}>
                  <option value="">Select…</option>
                  {Object.keys(schedule).sort().map(m=><option key={m} value={m}>{m}</option>)}
                </select>
              </div>
              <div>
                <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Shift to give</label>
                <select value={tradeShift} onChange={e=>setTradeShift(e.target.value)} style={{...css.inp,width:130}}>
                  <option value="">Select…</option>
                  {ALL_SHIFT_KEYS.map(sk=><option key={sk} value={sk}>{SHIFT_LABELS[sk]}</option>)}
                </select>
              </div>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"end",flexWrap:"wrap",marginBottom:10}}>
              <div>
                <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Return week</label>
                <select value={tradeReturnWeek} onChange={e=>setTradeReturnWeek(e.target.value)} style={{...css.inp,width:140}}>
                  <option value="">Select…</option>
                  {Object.keys(schedule).sort().map(m=><option key={m} value={m}>{m}</option>)}
                </select>
              </div>
              <div>
                <label style={{fontSize:10,color:"#7a8a98",display:"block",marginBottom:2}}>Return shift</label>
                <select value={tradeReturnShift} onChange={e=>setTradeReturnShift(e.target.value)} style={{...css.inp,width:130}}>
                  <option value="">Select…</option>
                  {ALL_SHIFT_KEYS.map(sk=><option key={sk} value={sk}>{SHIFT_LABELS[sk]}</option>)}
                </select>
              </div>
              <button onClick={submitTradeRequest} style={{...css.btn(true),padding:"7px 18px",background:"linear-gradient(135deg,#6030a0,#8050c0)",borderColor:"#6030a0"}}>Propose Trade</button>
            </div>
          </div>

          {/* Pending Trades */}
          {(()=>{
            const pendingTrades = tradeRequests.filter(r => r.status === "pending");
            const reviewedTrades = tradeRequests.filter(r => r.status !== "pending");
            return <>
              {pendingTrades.length > 0 && (
                <div style={css.card}>
                  <div style={css.cardT}>⏳ Pending Trades <span style={{fontWeight:400,fontSize:12,color:"#8a94a0"}}>— {pendingTrades.length}</span></div>
                  {pendingTrades.map(r => (
                    <div key={r.id} style={{padding:"10px 12px",marginBottom:6,background:"#f8f0ff",border:"1px solid #d0c0e8",borderRadius:8,flexWrap:"wrap"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                        <Badge id={r.from_surgeon_id}/>
                        <span style={{fontSize:12,color:"#6030a0",fontWeight:600}}>→</span>
                        <Badge id={r.to_surgeon_id}/>
                        <span style={{fontFamily:mono,fontSize:12,color:"#2c3e50"}}>{r.shift_label} ({r.week_monday})</span>
                        {r.return_shift_label && <span style={{fontSize:11,color:"#8a94a0"}}>↔ {r.return_shift_label} ({r.return_week})</span>}
                      </div>
                      <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                        <span style={{fontSize:10,color:"#a0a8b0"}}>Proposed {new Date(r.submitted_at).toLocaleDateString()}</span>
                        {(mySurgeon === r.to_surgeon_id || isScheduler) && (
                          <>
                            <button onClick={()=>acceptTradeRequest(r)} style={{background:"#e8f8e8",border:"1px solid #a0d8a0",color:"#1a8040",borderRadius:6,padding:"3px 10px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:font}}>✓ Accept</button>
                            <button onClick={()=>declineTradeRequest(r)} style={{background:"#fce8e8",border:"1px solid #e0b0b0",color:"#c04040",borderRadius:6,padding:"3px 10px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:font}}>✕ Decline</button>
                          </>
                        )}
                        {mySurgeon === r.from_surgeon_id && <button onClick={()=>deleteTradeRequest(r.id)} style={{background:"none",border:"1px solid #d0d8e0",color:"#8a94a0",borderRadius:5,padding:"2px 8px",fontSize:10,cursor:"pointer",fontFamily:font}}>Withdraw</button>}
                        {mySurgeon !== r.to_surgeon_id && mySurgeon !== r.from_surgeon_id && !isScheduler && (
                          <span style={{fontSize:10,color:"#8a6a10",fontWeight:600}}>Awaiting {r.to_surgeon_name}'s response</span>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {reviewedTrades.length > 0 && (
                <div style={css.card}>
                  <div style={css.cardT}>📋 Completed Trades <span style={{fontWeight:400,fontSize:12,color:"#8a94a0"}}>— {reviewedTrades.length}</span></div>
                  {reviewedTrades.slice(0,15).map(r => (
                    <div key={r.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",marginBottom:3,background:r.status==="accepted"?"#f0faf0":"#faf0f0",border:`1px solid ${r.status==="accepted"?"#c0e0c0":"#e0c0c0"}`,borderRadius:5,flexWrap:"wrap"}}>
                      <span style={{fontSize:12,fontWeight:700,color:r.status==="accepted"?"#1a8040":"#c04040"}}>{r.status==="accepted"?"✓":"✕"}</span>
                      <Badge id={r.from_surgeon_id} small/><span style={{fontSize:10,color:"#6030a0"}}>↔</span><Badge id={r.to_surgeon_id} small/>
                      <span style={{fontFamily:mono,fontSize:11,color:"#5a6a78"}}>{r.shift_label} ({r.week_monday})</span>
                      {isScheduler && <button onClick={()=>deleteTradeRequest(r.id)} style={{background:"none",border:"none",color:"#c04040",cursor:"pointer",fontSize:11,marginLeft:"auto"}}>✕</button>}
                    </div>
                  ))}
                </div>
              )}
            </>;
          })()}
        </>}
      </div>
    </div>
  );
}

const thS = {textAlign:"left",padding:"7px 8px",color:"#5a6a78",fontWeight:600,fontSize:10,textTransform:"uppercase",letterSpacing:0.5};
const thS2 = {textAlign:"left",padding:"4px 8px",color:"#7a8a98",fontWeight:500,fontSize:10,textTransform:"uppercase",letterSpacing:0.3};
const tdS = {padding:"7px 8px",fontFamily:"'JetBrains Mono',monospace",color:"#4a5a68",fontSize:13};

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(CallSchedule));
  </script>
</body>
</html>
