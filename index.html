// Lightweight Supabase REST client (no SDK dependency needed)
const dbHeaders = { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`, "Content-Type": "application/json" };
const supabase = {
  from: (table) => ({
    select: (cols) => ({
      eq: (col, val) => ({
        single: async () => {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=${cols}&${col}=eq.${val}`, { headers: dbHeaders });
          const rows = await res.json();
          return { data: rows?.[0] || null, error: rows?.error || null };
        }
      })
    }),
    upsert: async (row) => {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
        method: "POST", headers: { ...dbHeaders, Prefer: "resolution=merge-duplicates" },
        body: JSON.stringify(row),
      });
      return { error: res.ok ? null : await res.text() };
    },
  }),
};

// Extended DB helpers for new tables
const db = {
  async query(table, { eq, order, limit, select } = {}) {
    let url = `${SUPABASE_URL}/rest/v1/${table}?select=${select || "*"}`;
    if (eq) Object.entries(eq).forEach(([k, v]) => { url += `&${k}=eq.${v}`; });
    if (order) url += `&order=${order}`;
    if (limit) url += `&limit=${limit}`;
    const res = await fetch(url, { headers: dbHeaders });
    return res.ok ? await res.json() : [];
  },
  async insert(table, row) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: "POST", headers: { ...dbHeaders, Prefer: "return=representation" },
      body: JSON.stringify(row),
    });
    const data = await res.json();
    return { data: Array.isArray(data) ? data[0] : data, error: res.ok ? null : data };
  },
  async update(table, id, data) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: "PATCH", headers: { ...dbHeaders, Prefer: "return=representation" },
      body: JSON.stringify(data),
    });
    return { error: res.ok ? null : await res.text() };
  },
  async upsert(table, row) {
    return supabase.from(table).upsert(row);
  },
};

/* ═══ Date helpers ═══ */
const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const parse = s => { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
const addD = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const monOf = d => { const r=new Date(d); r.setDate(r.getDate()-((r.getDay()+6)%7)); return r; };

function getMondays(yr,mo,numWeeks) {
  const ms=[], s=new Date(yr,mo,1);
  let d=monOf(s); if(d<s) d=addD(d,7);
  while(ms.length<numWeeks){ ms.push(new Date(d)); d=addD(d,7); }
  return ms;
}

function onVac(id,ds,v){ return (v[id]||[]).some(([a,b])=>ds>=a&&ds<=b); }

/* ═══ ICS Calendar Generation ═══ */
function icsDate(y,m,d,h,min) {
  return `${y}${String(m).padStart(2,"0")}${String(d).padStart(2,"0")}T${String(h).padStart(2,"0")}${String(min||0).padStart(2,"0")}00`;
}

function buildICSEvents(schedule, surgeonId, surgeonName, appShifts, aMap) {
  const events = [];
  const uid = () => `${Date.now()}-${Math.random().toString(36).slice(2,9)}@callsched`;

  Object.entries(schedule).forEach(([mondayStr, wk]) => {
    const mon = parse(mondayStr);
    const bkLabel = wk.isBackup ? " [BACKUP]" : "";

    // Day Call
    if (wk.dayCall === surgeonId) {
      // Mon-Fri 7a-5p
      for (let i = 0; i < 5; i++) {
        const d = addD(mon, i);
        const y=d.getFullYear(), m=d.getMonth()+1, day=d.getDate();
        events.push({
          start: icsDate(y,m,day,7), end: icsDate(y,m,day,17),
          summary: `Service Week${bkLabel} — ${surgeonName}`,
          desc: `Service Week 7:00 AM – 5:00 PM${bkLabel}`
        });
      }
      // Sat 7a - Sun 7a (24h)
      const sat = addD(mon, 5);
      const sunD = addD(mon, 6);
      events.push({
        start: icsDate(sat.getFullYear(),sat.getMonth()+1,sat.getDate(),7),
        end: icsDate(sunD.getFullYear(),sunD.getMonth()+1,sunD.getDate(),7),
        summary: `Weekend Saturday 24h${bkLabel} — ${surgeonName}`,
        desc: `Weekend Saturday 7:00 AM – Sunday 7:00 AM${bkLabel}`
      });
    }

    // Night shifts (Mon-Thu)
    const nightKeys = ["mon","tue","wed","thu"];
    nightKeys.forEach((sk, i) => {
      if (wk.nights?.[sk] === surgeonId) {
        const d = addD(mon, i);
        const next = addD(mon, i + 1);
        events.push({
          start: icsDate(d.getFullYear(),d.getMonth()+1,d.getDate(),17),
          end: icsDate(next.getFullYear(),next.getMonth()+1,next.getDate(),7),
          summary: `Night Call${bkLabel} — ${surgeonName}`,
          desc: `${SHIFT_LABELS[sk]} 5:00 PM – 7:00 AM${bkLabel}`
        });
      }
    });

    // Weekend (Fri night + Sunday)
    if (wk.nights?.wknd === surgeonId) {
      // Fri 5p - Sat 7a
      const fri = addD(mon, 4);
      const sat = addD(mon, 5);
      events.push({
        start: icsDate(fri.getFullYear(),fri.getMonth()+1,fri.getDate(),17),
        end: icsDate(sat.getFullYear(),sat.getMonth()+1,sat.getDate(),7),
        summary: `Weekend Call (Fri Night)${bkLabel} — ${surgeonName}`,
        desc: `Friday 5:00 PM – Saturday 7:00 AM${bkLabel}`
      });
      // Sun 7a - Mon 7a
      const sunD = addD(mon, 6);
      const nextMon = addD(mon, 7);
      events.push({
        start: icsDate(sunD.getFullYear(),sunD.getMonth()+1,sunD.getDate(),7),
        end: icsDate(nextMon.getFullYear(),nextMon.getMonth()+1,nextMon.getDate(),7),
        summary: `Weekend Call (Sunday 24h)${bkLabel} — ${surgeonName}`,
        desc: `Sunday 7:00 AM – Monday 7:00 AM${bkLabel}`
      });
    }
  });

  // APP shifts (only if surgeonId is null = export all, or for APP-specific export)
  if (!surgeonId) {
    Object.entries(appShifts).forEach(([ds, aid]) => {
      const d = parse(ds);
      const next = addD(d, 1);
      const appName = aMap?.[aid]?.name || aid;
      events.push({
        start: icsDate(d.getFullYear(),d.getMonth()+1,d.getDate(),17),
        end: icsDate(next.getFullYear(),next.getMonth()+1,next.getDate(),7),
        summary: `APP Call — ${appName}`,
        desc: `APP Night Call 5:00 PM – 7:00 AM`
      });
    });
  }

  return events;
}

function generateICS(events, calName) {
  const uid = () => `${Date.now()}-${Math.random().toString(36).slice(2,9)}@callsched`;
  let ics = `BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//DSG Call Schedule//EN\r\nCALSCALE:GREGORIAN\r\nX-WR-CALNAME:${calName}\r\n`;
  events.forEach(e => {
    ics += `BEGIN:VEVENT\r\nUID:${uid()}\r\nDTSTART:${e.start}\r\nDTEND:${e.end}\r\nSUMMARY:${e.summary}\r\nDESCRIPTION:${e.desc}\r\nEND:VEVENT\r\n`;
  });
  ics += `END:VCALENDAR\r\n`;
  return ics;
}

function downloadICS(content, filename) {
  const blob = new Blob([content], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// Holiday definitions — returns holidays for a given year
function getHolidays(year) {
  // Thanksgiving = 4th Thursday of November
  const nov1 = new Date(year, 10, 1);
  let thxDay = 1 + ((4 - nov1.getDay() + 7) % 7);
  thxDay += 21;
  const thx = fmt(new Date(year, 10, thxDay));
  // Memorial Day = last Monday of May
  const may31 = new Date(year, 4, 31);
  let memDay = 31 - ((may31.getDay() - 1 + 7) % 7);
  const mem = fmt(new Date(year, 4, memDay));
  // Labor Day = first Monday of September
  const sep1 = new Date(year, 8, 1);
  let labDay = 1 + ((1 - sep1.getDay() + 7) % 7);
  const lab = fmt(new Date(year, 8, labDay));

  return {
    major: [
      { name: "New Year's", date: fmt(new Date(year, 11, 31)), emoji: "🎆", startDate: fmt(new Date(year, 11, 31)), endDate: fmt(new Date(year+1, 0, 1)) },
      { name: "Thanksgiving", date: thx, emoji: "🦃" },
      { name: "Christmas Day", date: fmt(new Date(year, 11, 25)), emoji: "🎄" },
    ],
    minor: [
      { name: "Memorial Day", date: mem, emoji: "🇺🇸" },
      { name: "July 4th", date: fmt(new Date(year, 6, 4)), emoji: "🎆" },
      { name: "Labor Day", date: lab, emoji: "🇺🇸" },
    ]
  };
}

function generate(surgeons, mondays, vac, backupMondays, priorCounts, preferences, fierceBackupMondays, holAssignments) {
  const sched = {};
  const ids = surgeons.map(s=>s.id);
  const nameMap = {}; surgeons.forEach(s => nameMap[s.id] = s.name);

  // Build holiday coverage map from pre-computed coverage arrays
  // { "YYYY-MM-DD": { surgeonId, role, name, type } }
  const holCoverage = {};
  const holByDate = {}; // { "YYYY-MM-DD": { surgeonA, surgeonB, name, type } }
  if (holAssignments) {
    Object.values(holAssignments).forEach(yearArr => {
      if (!Array.isArray(yearArr)) return;
      yearArr.forEach(h => {
        // Store the holiday metadata by date
        holByDate[h.date] = { surgeonA: h.surgeonA, surgeonB: h.surgeonB, name: h.name, type: h.type };
        // Store each coverage day (skip Eve entries — those are display-only, not schedule overrides)
        if (h.coverage && Array.isArray(h.coverage)) {
          h.coverage.forEach(c => {
            if (c.isEve) return; // Eve is informational only — regular schedule stays
            holCoverage[c.date] = { surgeonId: c.surgeon, role: "holiday_24h", hours: "7a–7a", name: c.label, type: h.type };
          });
        }
      });
    });
  }

  // Running counters seeded from prior totals
  const dcCt={}; const nCt={}; const wkndCt={}; const offCt={}; const lastPos={};
  const burden = {};
  // Track last DC week index per surgeon for spacing
  const lastDcWeek = {};
  // Track consecutive night assignments
  const prevNightSurgeon = {}; // { surgeonId: lastNightDate }
  ids.forEach(id=>{
    const p = priorCounts[id] || {};
    dcCt[id] = (p.dc||0) + (p.dcB||0);
    nCt[id] = (p.nights||0) + (p.nightsB||0);
    wkndCt[id] = (p.wknd||0) + (p.wkndB||0);
    offCt[id] = (p.off||0) + (p.offB||0);
    burden[id] = dcCt[id]*7 + nCt[id] + wkndCt[id]*3;
    lastDcWeek[id] = -99;
  });
  let prevWkndSurgeon = null;
  let prevDcSurgeon = null;

  const prefs = preferences || {};

  // Build holiday lookup for all years in the schedule
  const holidayMap = {}; // { "YYYY-MM-DD": { name, type:"major"|"minor" } }
  const years = new Set(mondays.map(m => m.getFullYear()));
  // Include next year for Dec→Jan overlap (build a separate array to avoid mutating Set during iteration)
  [...years].forEach(y => { years.add(y+1); });
  years.forEach(y => {
    const h = getHolidays(y);
    h.major.forEach(hol => { 
      holidayMap[hol.date] = { ...hol, type: "major" }; 
      if (hol.endDate && hol.endDate !== hol.date) holidayMap[hol.endDate] = { ...hol, date: hol.endDate, name: hol.name + " (Day 2)", type: "major" };
    });
    h.minor.forEach(hol => { holidayMap[hol.date] = { ...hol, type: "minor" }; });
  });

  // Find FAK's ID for Christmas exception
  const fakId = ids.find(id => (nameMap[id]||"").toUpperCase() === "FAK") || null;

  // Track holiday assignments this period for fairness
  const holidayCt = {}; // { surgeonId: { major: count, minor: count } }
  ids.forEach(id => { holidayCt[id] = { major: 0, minor: 0 }; });

  for (let wkIdx = 0; wkIdx < mondays.length; wkIdx++) {
    const monday = mondays[wkIdx];
    const mStr = fmt(monday);
    const isBackup = backupMondays.has(mStr);
    const isFierceBackup = (fierceBackupMondays||new Set()).has(mStr);

    // Check for holidays this week
    const weekDates = [];
    for (let i = 0; i < 7; i++) weekDates.push(fmt(addD(monday, i)));
    const weekHolidays = weekDates.map(ds => holidayMap[ds] ? { ...holidayMap[ds], ds } : null).filter(Boolean);
    const hasHoliday = weekHolidays.length > 0;
    const hasMajorHoliday = weekHolidays.some(h => h.type === "major");
    const isChristmasWeek = weekHolidays.some(h => h.name === "Christmas Day");
    const christmasDate = weekHolidays.find(h => h.name === "Christmas Day")?.ds;

    // ═══ DAY CALL ═══
    const availDC = ids.filter(id => {
      for(let i=0;i<6;i++) if(onVac(id, fmt(addD(monday,i)), vac)) return false;
      return true;
    });

    let dc = null;
    if (availDC.length) {
      // Check for pre-assigned holiday surgeonA for DC this week
      const weekdayHoliday = weekHolidays.find(h => {
        const dow = parse(h.ds).getDay();
        return dow >= 1 && dow <= 5; // M-F holiday
      });
      const holDcSurgeon = weekdayHoliday && holByDate[weekdayHoliday.ds]?.surgeonA;

      // Christmas exception: FAK takes Christmas, so prefer FAK for DC that week
      if (isChristmasWeek && fakId && availDC.includes(fakId)) {
        dc = fakId;
      } else if (holDcSurgeon && availDC.includes(holDcSurgeon)) {
        dc = holDcSurgeon; // Pre-assigned holiday surgeon gets DC
      } else {
        availDC.sort((a,b) => {
          const d = dcCt[a]-dcCt[b]; if(d) return d;
          const bd = burden[a]-burden[b]; if(bd) return bd;
          // Day Call spacing: prefer surgeons who haven't had DC recently
          const spacingA = wkIdx - lastDcWeek[a];
          const spacingB = wkIdx - lastDcWeek[b];
          if (spacingA !== spacingB) return spacingB - spacingA; // larger gap = better
          // Avoid weekend→DC
          if(a===prevWkndSurgeon) return 1;
          if(b===prevWkndSurgeon) return -1;
          return Math.random() - 0.5;
        });
        dc = availDC[0];
      }
      dcCt[dc]++; burden[dc]+=7; lastDcWeek[dc] = wkIdx;

      // Holiday tracking for DC surgeon
      weekHolidays.forEach(h => {
        holidayCt[dc][h.type]++;
      });
    }

    const rem = ids.filter(id=>id!==dc);
    const nights = {};
    const used = new Set();

    // ═══ WEEKEND SHIFT ═══
    const friDate = fmt(addD(monday,4));
    const sunDate = fmt(addD(monday,6));
    const nextMonDate = fmt(addD(monday,7));

    let availWknd = rem.filter(id => !onVac(id,friDate,vac) && !onVac(id,sunDate,vac));
    availWknd = availWknd.filter(id => !onVac(id, nextMonDate, vac));

    // Check if Friday or Sunday is a holiday — special handling
    const friHoliday = holidayMap[friDate];
    const sunHoliday = holidayMap[sunDate];

    const prefWknd = availWknd.filter(id => id !== prevWkndSurgeon);
    const wkndPool = prefWknd.length > 0 ? prefWknd : availWknd;

    if (wkndPool.length) {
      wkndPool.sort((a,b) => {
        const d = wkndCt[a]-wkndCt[b]; if(d) return d;
        // Holiday fairness: if weekend includes a holiday, prefer surgeon with fewer holiday shifts
        if (friHoliday || sunHoliday) {
          const hType = (friHoliday || sunHoliday).type;
          const ha = holidayCt[a][hType] || 0;
          const hb = holidayCt[b][hType] || 0;
          if (ha !== hb) return ha - hb;
        }
        const bd = burden[a]-burden[b]; if(bd) return bd;
        if(lastPos[a]==="wknd"&&lastPos[b]!=="wknd") return 1;
        if(lastPos[b]==="wknd"&&lastPos[a]!=="wknd") return -1;
        return Math.random() - 0.5;
      });
      nights.wknd = wkndPool[0]; used.add(wkndPool[0]); wkndCt[wkndPool[0]]++; burden[wkndPool[0]]+=3;
      if (friHoliday) holidayCt[wkndPool[0]][friHoliday.type]++;
      if (sunHoliday) holidayCt[wkndPool[0]][sunHoliday.type]++;
    } else {
      const fb=rem.filter(id=>!used.has(id));
      if(fb.length){nights.wknd=fb[0];used.add(fb[0]);} else nights.wknd=null;
    }

    // ═══ WEEKNIGHT SHIFTS ═══

    // Shuffle night keys to prevent positional bias
    const shuffledNightKeys = [...NIGHT_KEYS];
    for(let i=shuffledNightKeys.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [shuffledNightKeys[i],shuffledNightKeys[j]]=[shuffledNightKeys[j],shuffledNightKeys[i]];
    }

    const nightAssignments = {};
    const nightUsed = new Set();

    // Pre-assign nights that are covered by holiday 24h shifts
    const holidayNightOverrides = {};
    NIGHT_KEYS.forEach((sk, i) => {
      const dayOffset = {mon:0,tue:1,wed:2,thu:3}[sk];
      const nightDate = fmt(addD(monday, dayOffset));
      // If this date has holiday 24h coverage, that surgeon covers the night too
      // BUT only if they're not already the DC surgeon this week
      const cov = holCoverage[nightDate];
      if (cov && cov.role === "holiday_24h" && cov.surgeonId !== dc) {
        holidayNightOverrides[sk] = cov.surgeonId;
      }
    });

    // Also check weekend for holiday coverage
    const holFriDate = fmt(addD(monday, 4));
    const holSunDate = fmt(addD(monday, 6));
    const friCov = holCoverage[holFriDate];
    const sunCov = holCoverage[holSunDate];
    let holidayWkndOverride = null;
    if (friCov && friCov.role === "holiday_24h" && friCov.surgeonId !== dc) {
      holidayWkndOverride = friCov.surgeonId;
    } else if (sunCov && sunCov.role === "holiday_24h" && sunCov.surgeonId !== dc) {
      holidayWkndOverride = sunCov.surgeonId;
    }

    // If weekend has holiday override, use it instead of normal weekend assignment
    if (holidayWkndOverride && nights.wknd) {
      // Undo the normal weekend assignment counts
      if (nights.wknd) { wkndCt[nights.wknd]--; burden[nights.wknd]-=3; used.delete(nights.wknd); }
      nights.wknd = holidayWkndOverride;
      used.add(holidayWkndOverride);
      wkndCt[holidayWkndOverride] = (wkndCt[holidayWkndOverride]||0) + 1;
      burden[holidayWkndOverride] = (burden[holidayWkndOverride]||0) + 3;
    }

    for (const sk of shuffledNightKeys) {
      // If this night is overridden by holiday coverage, use the holiday surgeon
      if (holidayNightOverrides[sk]) {
        nightAssignments[sk] = holidayNightOverrides[sk];
        nightUsed.add(holidayNightOverrides[sk]);
        nCt[holidayNightOverrides[sk]]++; burden[holidayNightOverrides[sk]]++;
        continue;
      }
      const dayOffset = {mon:0,tue:1,wed:2,thu:3}[sk];
      const sd = fmt(addD(monday, dayOffset));
      const nextDayStr = fmt(addD(monday, dayOffset + 1));
      const nightHoliday = holidayMap[sd]; // is this night a holiday?
      const nextDayHoliday = holidayMap[nextDayStr]; // is tomorrow a holiday?

      let avail = rem.filter(id => !used.has(id) && !nightUsed.has(id) && !onVac(id,sd,vac));
      avail = avail.filter(id => !onVac(id, nextDayStr, vac));

      // HARD RULE: Weekend surgeon cannot take Monday night the following week
      if (sk === "mon" && prevWkndSurgeon) {
        const nonWknd = avail.filter(id => id !== prevWkndSurgeon);
        if (nonWknd.length > 0) avail = nonWknd;
      }

      // HARD RULE: Service week surgeon cannot take Monday night the following week
      if (sk === "mon" && prevDcSurgeon) {
        const nonDc = avail.filter(id => id !== prevDcSurgeon);
        if (nonDc.length > 0) avail = nonDc;
      }

      // HARD RULE: No back-to-back nights — filter out anyone who had a night yesterday
      const yesterdayStr = fmt(addD(monday, dayOffset - 1));
      const nonConsec = avail.filter(id => prevNightSurgeon[id] !== yesterdayStr);
      if (nonConsec.length > 0) avail = nonConsec;

      // Fallback layers
      if(!avail.length) avail = rem.filter(id => !used.has(id) && !nightUsed.has(id) && !onVac(id,sd,vac));
      if(!avail.length) avail = rem.filter(id => !used.has(id) && !nightUsed.has(id));
      if(!avail.length){ nightAssignments[sk]=null; continue; }

      avail.sort((a,b) => {
        // HOLIDAY ASSIGNMENT: prefer pre-assigned surgeonB for this night
        const holNight = holByDate[sd] || holByDate[nextDayStr];
        const holSurgeonB = holNight?.surgeonB;
        if (holSurgeonB) {
          if (a === holSurgeonB && b !== holSurgeonB) return -1;
          if (b === holSurgeonB && a !== holSurgeonB) return 1;
        }

        // Holiday fairness: if this night is a holiday or eve of holiday
        if (nextDayHoliday) {
          const hType = nextDayHoliday.type;
          const ha = holidayCt[a]?.[hType] || 0;
          const hb = holidayCt[b]?.[hType] || 0;
          if (ha !== hb) return ha - hb; // fewer holiday shifts → gets this one
        }

        const d=nCt[a]-nCt[b]; if(d) return d;
        const bd = burden[a]-burden[b]; if(bd) return bd;

        // Preferences
        const aPref = prefs[a]; const bPref = prefs[b];
        const aBonus = (aPref?.preferShift===sk ? -10 : 0) + (aPref?.avoidShift===sk ? 10 : 0);
        const bBonus = (bPref?.preferShift===sk ? -10 : 0) + (bPref?.avoidShift===sk ? 10 : 0);
        if(aBonus !== bBonus) return aBonus - bBonus;

        if(lastPos[a]===sk&&lastPos[b]!==sk) return 1;
        if(lastPos[b]===sk&&lastPos[a]!==sk) return -1;
        return Math.random() - 0.5;
      });

      const chosen = avail[0];
      nightAssignments[sk] = chosen;
      nightUsed.add(chosen);
      nCt[chosen]++; burden[chosen]++; lastPos[chosen] = sk;
      prevNightSurgeon[chosen] = sd; // track for consecutive night detection

      // Track holiday assignments
      if (nextDayHoliday) holidayCt[chosen][nextDayHoliday.type]++;
    }

    for (const sk of NIGHT_KEYS) nights[sk] = nightAssignments[sk] || null;

    if(nights.wknd) lastPos[nights.wknd] = "wknd";
    prevWkndSurgeon = nights.wknd || null;
    prevDcSurgeon = dc || null;

    const assigned = new Set([dc, ...Object.values(nights)].filter(Boolean));
    const off = ids.find(id => !assigned.has(id)) || null;
    if(off) offCt[off]++;

    // Collect holiday coverage for this week
    const weekHolCoverage = {};
    for (let i = 0; i < 7; i++) {
      const ds = fmt(addD(monday, i));
      if (holCoverage[ds]) weekHolCoverage[ds] = holCoverage[ds];
    }

    sched[mStr] = { dayCall:dc, nights, off, isBackup, isFierceBackup, holidayCoverage: Object.keys(weekHolCoverage).length > 0 ? weekHolCoverage : null };
  }

  // ═══ POST-OPTIMIZATION PASS ═══
  const mondayStrs = mondays.map(m => fmt(m));
  const calcSpread = (ct) => { const vals = Object.values(ct); return Math.max(...vals)-Math.min(...vals); };

  for (let pass = 0; pass < 50; pass++) {
    let improved = false;

    // Try swapping weekend assignments to reduce spread
    for (let i = 0; i < mondayStrs.length && !improved; i++) {
      for (let j = i+1; j < mondayStrs.length && !improved; j++) {
        const wkA = sched[mondayStrs[i]];
        const wkB = sched[mondayStrs[j]];
        const a = wkA.nights?.wknd, b = wkB.nights?.wknd;
        if (!a || !b || a === b) continue;

        const monA = parse(mondayStrs[i]), monB = parse(mondayStrs[j]);
        const friA = fmt(addD(monA,4)), sunA = fmt(addD(monA,6)), nMonA = fmt(addD(monA,7));
        const friB = fmt(addD(monB,4)), sunB = fmt(addD(monB,6)), nMonB = fmt(addD(monB,7));

        const bCanDoA = !onVac(b,friA,vac) && !onVac(b,sunA,vac) && !onVac(b,nMonA,vac) && b !== wkA.dayCall;
        const aCanDoB = !onVac(a,friB,vac) && !onVac(a,sunB,vac) && !onVac(a,nMonB,vac) && a !== wkB.dayCall;
        if (!bCanDoA || !aCanDoB) continue;

        // Check weekend→Monday night conflict: new weekend surgeon shouldn't be Monday night next week
        const nextWkA = i + 1 < mondayStrs.length ? sched[mondayStrs[i + 1]] : null;
        const nextWkB = j + 1 < mondayStrs.length ? sched[mondayStrs[j + 1]] : null;
        if (nextWkA?.nights?.mon === b) continue; // b doing weekend in A would conflict with Mon night
        if (nextWkB?.nights?.mon === a) continue; // a doing weekend in B would conflict with Mon night

        if (wkndCt[a] > wkndCt[b] + 1) {
          wkndCt[a]--; wkndCt[b]++;
          burden[a]-=3; burden[b]+=3;
          wkA.nights.wknd = b; wkB.nights.wknd = a;
          const fixOff = (wk) => {
            const assigned = new Set([wk.dayCall, ...Object.values(wk.nights)].filter(Boolean));
            wk.off = ids.find(id => !assigned.has(id)) || null;
          };
          fixOff(wkA); fixOff(wkB);
          improved = true;
        } else if (wkndCt[b] > wkndCt[a] + 1) {
          wkndCt[b]--; wkndCt[a]++;
          burden[b]-=3; burden[a]+=3;
          wkA.nights.wknd = b; wkB.nights.wknd = a;
          const fixOff = (wk) => {
            const assigned = new Set([wk.dayCall, ...Object.values(wk.nights)].filter(Boolean));
            wk.off = ids.find(id => !assigned.has(id)) || null;
          };
          fixOff(wkA); fixOff(wkB);
          improved = true;
        }
      }
    }

    if (!improved) break;
  }

  // ═══ VALIDATION PASS — fix any remaining hard-rule violations via swaps ═══
  for (let pass = 0; pass < 3; pass++) {
    for (let i = 0; i < mondayStrs.length; i++) {
      const wk = sched[mondayStrs[i]];
      const recalcOff = (w) => {
        const a = new Set([w.dayCall, ...Object.values(w.nights)].filter(Boolean));
        w.off = ids.find(id => !a.has(id)) || null;
      };

      // Fix: DC surgeon should not also have a night in same week
      if (wk.dayCall) {
        NIGHT_KEYS.forEach(sk => {
          if (wk.nights?.[sk] === wk.dayCall && wk.off) {
            // Swap the conflicting night with the off surgeon
            wk.nights[sk] = wk.off;
            recalcOff(wk);
          }
        });
        // Fix: DC surgeon should not have weekend in same week
        if (wk.nights?.wknd === wk.dayCall && wk.off) {
          wk.nights.wknd = wk.off;
          recalcOff(wk);
        }
      }

      // Fix: Weekend surgeon should not have Monday night next week
      if (i < mondayStrs.length - 1 && wk.nights?.wknd) {
        const nextWk = sched[mondayStrs[i + 1]];
        if (nextWk?.nights?.mon === wk.nights.wknd) {
          // Try swapping Monday night with off surgeon of next week
          if (nextWk.off && nextWk.off !== nextWk.dayCall) {
            nextWk.nights.mon = nextWk.off;
            recalcOff(nextWk);
          } else {
            // Try swapping Monday night with another night surgeon in next week
            const otherNight = NIGHT_KEYS.find(sk => sk !== "mon" && nextWk.nights?.[sk] && nextWk.nights[sk] !== nextWk.dayCall && nextWk.nights[sk] !== wk.nights.wknd);
            if (otherNight) {
              const temp = nextWk.nights.mon;
              nextWk.nights.mon = nextWk.nights[otherNight];
              nextWk.nights[otherNight] = temp;
            }
          }
        }
      }

      // Fix: Service week surgeon should not have Monday night next week
      if (i < mondayStrs.length - 1 && wk.dayCall) {
        const nextWk = sched[mondayStrs[i + 1]];
        if (nextWk?.nights?.mon === wk.dayCall) {
          if (nextWk.off && nextWk.off !== nextWk.dayCall && nextWk.off !== sched[mondayStrs[i]]?.nights?.wknd) {
            nextWk.nights.mon = nextWk.off;
            recalcOff(nextWk);
          } else {
            const otherNight = NIGHT_KEYS.find(sk => sk !== "mon" && nextWk.nights?.[sk] && nextWk.nights[sk] !== nextWk.dayCall && nextWk.nights[sk] !== wk.dayCall);
            if (otherNight) {
              const temp = nextWk.nights.mon;
              nextWk.nights.mon = nextWk.nights[otherNight];
              nextWk.nights[otherNight] = temp;
            }
          }
        }
      }
      // Fix: No back-to-back nights within the same week
      const nightOrder = ["mon","tue","wed","thu"];
      for (let ni = 0; ni < nightOrder.length - 1; ni++) {
        const sk1 = nightOrder[ni], sk2 = nightOrder[ni + 1];
        const s1 = wk.nights?.[sk1], s2 = wk.nights?.[sk2];
        if (s1 && s1 === s2) {
          // Try swapping sk2 with another night that doesn't create a new consecutive pair
          const swapCandidate = nightOrder.find(sk => sk !== sk1 && sk !== sk2 && wk.nights?.[sk] && wk.nights[sk] !== s1 && wk.nights[sk] !== wk.dayCall);
          if (swapCandidate) {
            const temp = wk.nights[sk2];
            wk.nights[sk2] = wk.nights[swapCandidate];
            wk.nights[swapCandidate] = temp;
            recalcOff(wk);
          } else if (wk.off && wk.off !== wk.dayCall) {
            wk.nights[sk2] = wk.off;
            recalcOff(wk);
          }
        }
      }
    }
  }

  return sched;
}

  });
  const unreadCount = useMemo(() => notifications.filter(n => n.created_at > notifLastSeen).length, [notifications, notifLastSeen]);

  // ─── Browser Push & Email Notification Preferences ───
  const [pushPermission, setPushPermission] = useState(() => {

  });
  const [notifPrefs, setNotifPrefs] = useState({}); // { surgeonId: { email, browser_push, email_notifs, schedule_changes, vacation_updates, shift_reminders } }
  const notifPrefsRef = useRef(notifPrefs);
  useEffect(() => { notifPrefsRef.current = notifPrefs; }, [notifPrefs]);
  const [notifPrefsLoaded, setNotifPrefsLoaded] = useState(false);
  const [notifPrefsSaving, setNotifPrefsSaving] = useState(false);
  const [notifTestSent, setNotifTestSent] = useState("");
  const lastNotifCountRef = useRef(null); // track notification count for browser push on new ones
  const [edgeFunctionUrl, setEdgeFunctionUrl] = useState(""); // Supabase Edge Function URL for email

  // ─── My Schedule ───
  const [mySurgeon, setMySurgeon] = useState(() => {
    try { return localStorage.getItem("dsg-my-surgeon") || ""; } catch(e) { return ""; }
  });

  // Save My Surgeon choice to localStorage
  useEffect(() => {
    try { if(mySurgeon) localStorage.setItem("dsg-my-surgeon", mySurgeon); } catch(e) {}
  }, [mySurgeon]);

  // ─── Supabase: Load on mount + real-time sync ───
  useEffect(() => {
    (async () => {
      try {
        const { data: row } = await supabase
          .from("call_schedule_data")
          .select("data")
          .eq("id", "main")
          .single();
        if (row?.data) {
          const d = typeof row.data === "string" ? JSON.parse(row.data) : row.data;
          if (d.surgeons) setSurgeons(d.surgeons);
          if (d.apps) setApps(d.apps);
          if (d.vacations) setVacations(d.vacations);
          if (d.backupMondays) setBackupMondaySet(new Set(d.backupMondays));
          if (d.fierceBackup) setFierceBackupSet(new Set(d.fierceBackup));
          if (d.schedule) setSchedule(d.schedule);
          if (d.appShifts) setAppShifts(d.appShifts);
          if (d.priorCounts && Object.values(d.priorCounts).some(c => Object.values(c).some(v => v > 0))) setPriorCounts(d.priorCounts);
          if (d.year1Counts && Object.values(d.year1Counts).some(c => Object.values(c).some(v => v > 0))) setYear1Counts(d.year1Counts);
          if (d.year2Counts && Object.values(d.year2Counts).some(c => Object.values(c).some(v => v > 0))) setYear2Counts(d.year2Counts);
          if (d.startMonth !== undefined) setStartMonth(d.startMonth);
          if (d.startYear !== undefined) setStartYear(d.startYear);
          if (d.holidayAssignments) setHolidayAssignments(d.holidayAssignments);
        }
        const { data: cfgRow } = await supabase
          .from("call_schedule_config")
          .select("scheduler_pin,edge_function_url")
          .eq("id", "config")
          .single();
        if (cfgRow?.scheduler_pin) setSchedulerPin(cfgRow.scheduler_pin);
        if (cfgRow?.edge_function_url) setEdgeFunctionUrl(cfgRow.edge_function_url);
        // Load OneSignal API key from localStorage (not in DB for security)
        try { const osKey = localStorage.getItem("dsg-onesignal-key"); if (osKey) setOneSignalApiKey(osKey); } catch(e) {}

        // Load vacation requests
        try {
          const reqs = await db.query("vacation_requests", { order: "submitted_at.desc", limit: 100 });
          if (Array.isArray(reqs)) setVacRequests(reqs);
        } catch(e) {}

        // Load shift trade requests
        try {
          const trades = await db.query("shift_trade_requests", { order: "submitted_at.desc", limit: 100 });
          if (Array.isArray(trades)) setTradeRequests(trades);
        } catch(e) {}

        // Load recent notifications
        try {
          const notifs = await db.query("notifications", { order: "created_at.desc", limit: 50 });
          if (Array.isArray(notifs)) setNotifications(notifs);
        } catch(e) {}
      } catch (e) {
        console.error("Supabase load error:", e);
      }
      setLoaded(true);
    })();

    // Poll for changes from other users every 15 seconds
    const pollInterval = setInterval(async () => {
      try {
        const { data: row } = await supabase.from("call_schedule_data").select("data,updated_at").eq("id", "main").single();
        if (row?.data) {
          const d = typeof row.data === "string" ? JSON.parse(row.data) : row.data;
          // Only update if data actually changed (compare updated_at)
          if (row.updated_at !== lastSyncRef.current) {
            lastSyncRef.current = row.updated_at;
            if (d.surgeons) setSurgeons(d.surgeons);
            if (d.apps) setApps(d.apps);
            if (d.vacations) setVacations(d.vacations);
            if (d.backupMondays) setBackupMondaySet(new Set(d.backupMondays));
            if (d.fierceBackup) setFierceBackupSet(new Set(d.fierceBackup));
            if (d.schedule) setSchedule(d.schedule);
            if (d.appShifts) setAppShifts(d.appShifts);
            if (d.priorCounts && Object.values(d.priorCounts).some(c => Object.values(c).some(v => v > 0))) setPriorCounts(d.priorCounts);
            if (d.year1Counts && Object.values(d.year1Counts).some(c => Object.values(c).some(v => v > 0))) setYear1Counts(d.year1Counts);
            if (d.year2Counts && Object.values(d.year2Counts).some(c => Object.values(c).some(v => v > 0))) setYear2Counts(d.year2Counts);
            if (d.startMonth !== undefined) setStartMonth(d.startMonth);
            if (d.startYear !== undefined) setStartYear(d.startYear);
            if (d.holidayAssignments) setHolidayAssignments(d.holidayAssignments);
          }
        }
        const { data: cfgRow2 } = await supabase.from("call_schedule_config").select("scheduler_pin,edge_function_url").eq("id", "config").single();
        if (cfgRow2?.scheduler_pin !== undefined) setSchedulerPin(prev => cfgRow2.scheduler_pin !== prev ? cfgRow2.scheduler_pin : prev);
        if (cfgRow2?.edge_function_url !== undefined) setEdgeFunctionUrl(prev => cfgRow2.edge_function_url !== prev ? cfgRow2.edge_function_url : prev);

        // Refresh vacation requests and notifications
        try {
          const reqs = await db.query("vacation_requests", { order: "submitted_at.desc", limit: 100 });
          if (Array.isArray(reqs)) setVacRequests(reqs);
        } catch(e) {}
        try {
          const trades = await db.query("shift_trade_requests", { order: "submitted_at.desc", limit: 100 });
          if (Array.isArray(trades)) setTradeRequests(trades);
        } catch(e) {}
        try {
          const notifs = await db.query("notifications", { order: "created_at.desc", limit: 50 });
          if (Array.isArray(notifs)) setNotifications(notifs);
        } catch(e) {}
      } catch(e) {}
    }, 15000);

    return () => clearInterval(pollInterval);
  }, []);

  // ─── Supabase: Auto-save on changes ───
  useEffect(() => {
    if (!loaded) return;
    const timer = setTimeout(async () => {
      try {
        const payload = {
          surgeons, apps, vacations,
          backupMondays: [...backupMondaySet],
          fierceBackup: [...fierceBackupSet],
          schedule, appShifts, priorCounts, year1Counts, year2Counts,
          startMonth, startYear, holidayAssignments,
        };
        const ts = new Date().toISOString();
        await supabase
          .from("call_schedule_data")
          .upsert({ id: "main", data: payload, updated_at: ts });
        lastSyncRef.current = ts;
        setSaveStatus("Saved");
        setTimeout(() => setSaveStatus(""), 2000);
      } catch (e) {
        console.error("Save failed:", e);
      }
    }, 800);
    return () => clearTimeout(timer);
  }, [loaded, surgeons, apps, vacations, backupMondaySet, fierceBackupSet, schedule, appShifts, priorCounts, year1Counts, year2Counts, startMonth, startYear, holidayAssignments]);

  // ─── Supabase: Save scheduler PIN + edge function URL ───
  useEffect(() => {
    if (!loaded) return;
    const timer = setTimeout(async () => {
      try {
        await supabase
          .from("call_schedule_config")
          .upsert({ id: "config", scheduler_pin: schedulerPin || "", edge_function_url: edgeFunctionUrl || "", updated_at: new Date().toISOString() });
      } catch(e) {}
    }, 500);
    return () => clearTimeout(timer);
  }, [loaded, schedulerPin, edgeFunctionUrl]);

  // ─── Reset all data ───
  const resetAllData = async () => {
    if (!confirm("Clear all saved data and reset to defaults? This cannot be undone.")) return;
    try {
      await supabase.from("call_schedule_data").upsert({ id: "main", data: {}, updated_at: new Date().toISOString() });
    } catch(e) {}
    setSurgeons(INIT_SURGEONS);
    setApps(INIT_APPS);
    setVacations({});
    setBackupMondaySet(new Set());
    setFierceBackupSet(new Set());
    setSchedule({});
    setAppShifts({});
    setPriorCounts({});
    setYear1Counts({});
    setYear2Counts({});
    setStartMonth(4);
    setStartYear(2026);
    setSaveStatus("Reset complete");
    setTimeout(() => setSaveStatus(""), 2000);
  };

  // ─── Add Notification ───
  const addNotification = useCallback(async (type, title, message, data = {}) => {
    try {
      const notif = { type, title, message, data, created_at: new Date().toISOString() };
      const { data: inserted } = await db.insert("notifications", notif);
      if (inserted) setNotifications(prev => [inserted, ...prev].slice(0, 50));
      // Also send as device push via OneSignal
      sendPushNotif(title, message);
    } catch(e) { console.error("Notification error:", e); }
  }, [sendPushNotif]);

  // ─── Email Notifications via Supabase Edge Function ───
  const sendEmailNotif = useCallback(async (type, data) => {
    if (!edgeFunctionUrl) return;
    try {
      const currentPrefs = notifPrefsRef.current || {};
      const recipients = [];
      Object.entries(currentPrefs).forEach(([sid, prefs]) => {
        if (!prefs.email || !prefs.email_notifs) return;
        if (type === "test") { /* send to all email-enabled */ }
        else if ((type === "schedule_published" || type === "schedule_changed" || type === "trade_submitted" || type === "trade_accepted" || type === "trade_declined") && !prefs.schedule_changes) return;
        else if ((type === "vacation_approved" || type === "vacation_denied" || type === "vacation_submitted") && !prefs.vacation_updates) return;
        else if (type === "shift_reminder" && !prefs.shift_reminders) return;
        recipients.push({ email: prefs.email, surgeon_id: sid, name: surgeons.find(s => s.id === sid)?.name || sid });
      });
      if (recipients.length === 0) return;
      await fetch(edgeFunctionUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${SUPABASE_ANON_KEY}` },
        body: JSON.stringify({ type, data, recipients }),
      });
    } catch(e) { console.error("Email notification error:", e); }
  }, [edgeFunctionUrl, surgeons]);

  // ─── OneSignal Push — send to all subscribed devices ───
  const [oneSignalApiKey, setOneSignalApiKey] = useState("");
  const sendPushNotif = useCallback(async (title, message) => {
    if (!oneSignalApiKey) return;
    try {
      await fetch("https://onesignal.com/api/v1/notifications", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: `Basic ${oneSignalApiKey}` },
        body: JSON.stringify({
          app_id: "9ca5c08f-6fb3-4ee5-b564-09aafc1c1901",
          included_segments: ["Subscribed Users"],
          headings: { en: title },
          contents: { en: message },
          url: "https://fkhan628.github.io/Call-Schedule-App/",
        }),
      });
    } catch(e) { console.error("OneSignal push error:", e); }
  }, [oneSignalApiKey]);

  // ─── Vacation Request: Submit ───
  const submitVacRequest = useCallback(async () => {
    if (!vacReqSurgeon || !vacReqStart || !vacReqEnd) return;
    const surgeonName = surgeons.find(s => s.id === vacReqSurgeon)?.name || apps.find(a => a.id === vacReqSurgeon)?.name || vacReqSurgeon;
    try {
      const req = {
        surgeon_id: vacReqSurgeon, surgeon_name: surgeonName,
        start_date: vacReqStart, end_date: vacReqEnd,
        reason: vacReqReason, status: "pending",
        submitted_at: new Date().toISOString(),
      };
      const { data: inserted } = await db.insert("vacation_requests", req);
      if (inserted) {
        setVacRequests(prev => [inserted, ...prev]);
        await addNotification("vacation_submitted", "Vacation Request",
          `${surgeonName} requested ${vacReqStart} to ${vacReqEnd}`, { surgeon_id: vacReqSurgeon });
        sendEmailNotif("vacation_submitted", { surgeon_name: surgeonName, surgeon_id: vacReqSurgeon, start_date: vacReqStart, end_date: vacReqEnd, reason: vacReqReason });
      }
      setVacReqStart(""); setVacReqEnd(""); setVacReqReason("");
    } catch(e) { console.error("Submit vacation error:", e); }
  }, [vacReqSurgeon, vacReqStart, vacReqEnd, vacReqReason, surgeons, addNotification]);

  // ─── Vacation Request: Approve ───
  const approveVacRequest = useCallback(async (req) => {
    // Check if approving would exceed 4 surgeons off
    const reqStart = parse(req.start_date);
    const reqEnd = parse(req.end_date);
    let d = new Date(reqStart);
    let maxOff = 0;
    while (d <= reqEnd) {
      const ds = fmt(d);
      const alreadyOff = surgeons.filter(s => s.id !== req.surgeon_id && onVac(s.id, ds, vacations)).length + 1; // +1 for this request
      if (alreadyOff > maxOff) maxOff = alreadyOff;
      d = addD(d, 1);
    }
    if (maxOff > 4) {
      if (!confirm(`Warning: Approving this would put ${maxOff} surgeons off at the same time (max 4). Approve anyway?`)) return;
    }
    try {
      await db.update("vacation_requests", req.id, {
        status: "approved", reviewed_at: new Date().toISOString(), reviewed_by: "Scheduler"
      });
      setVacRequests(prev => prev.map(r => r.id === req.id ? { ...r, status: "approved" } : r));
      // Auto-add to vacations
      setVacations(prev => ({
        ...prev,
        [req.surgeon_id]: [...(prev[req.surgeon_id] || []), [req.start_date, req.end_date]]
      }));
      await addNotification("vacation_approved", "Vacation Approved",
        `${req.surgeon_name}'s vacation ${req.start_date} to ${req.end_date} was approved`,
        { surgeon_id: req.surgeon_id });
      sendEmailNotif("vacation_approved", { surgeon_name: req.surgeon_name, surgeon_id: req.surgeon_id, start_date: req.start_date, end_date: req.end_date });
    } catch(e) { console.error("Approve error:", e); }
  }, [addNotification]);

  // ─── Vacation Request: Deny ───
  const denyVacRequest = useCallback(async (req, note = "") => {
    try {
      await db.update("vacation_requests", req.id, {
        status: "denied", reviewed_at: new Date().toISOString(), reviewed_by: "Scheduler", review_note: note
      });
      setVacRequests(prev => prev.map(r => r.id === req.id ? { ...r, status: "denied", review_note: note } : r));
      await addNotification("vacation_denied", "Vacation Denied",
        `${req.surgeon_name}'s vacation ${req.start_date} to ${req.end_date} was denied${note ? ": " + note : ""}`,
        { surgeon_id: req.surgeon_id });
      sendEmailNotif("vacation_denied", { surgeon_name: req.surgeon_name, surgeon_id: req.surgeon_id, start_date: req.start_date, end_date: req.end_date, note });
    } catch(e) { console.error("Deny error:", e); }
  }, [addNotification]);

  // ─── Shift Trade Request: Submit ───
  const submitTradeRequest = useCallback(async () => {
    if (!tradeFrom || !tradeTo || !tradeWeek || !tradeShift) return;
    // Two-way swap required unless scheduler emergency override
    if (!tradeReturnWeek || !tradeReturnShift) {
      if (!isScheduler) {
        alert("A return swap is required. All trades must be two-way — select the week and shift you'll take in return.");
        return;
      }
      if (!confirm("⚠️ No return swap specified.\n\nOne-way trades should only be used for emergencies (illness, family emergency).\n\nSubmit anyway?")) return;
    }
    const fromName = surgeons.find(s => s.id === tradeFrom)?.name || tradeFrom;
    const toName = surgeons.find(s => s.id === tradeTo)?.name || tradeTo;
    const shiftLabel = SHIFT_LABELS[tradeShift] || tradeShift;
    try {
      const req = {
        from_surgeon_id: tradeFrom, from_surgeon_name: fromName,
        to_surgeon_id: tradeTo, to_surgeon_name: toName,
        week_monday: tradeWeek, shift_key: tradeShift, shift_label: shiftLabel,
        return_week: tradeReturnWeek || null, return_shift: tradeReturnShift || null,
        return_shift_label: tradeReturnShift ? (SHIFT_LABELS[tradeReturnShift]||tradeReturnShift) : null,
        status: "pending", submitted_at: new Date().toISOString(),
      };
      const { data: inserted } = await db.insert("shift_trade_requests", req);
      if (inserted) {
        setTradeRequests(prev => [inserted, ...prev]);
        await addNotification("trade_submitted", "Shift Trade Proposed",
          `${fromName} wants to trade ${shiftLabel} (${tradeWeek}) with ${toName}`);
        sendEmailNotif("trade_submitted", { from_name: fromName, to_name: toName, shift: shiftLabel, week: tradeWeek });
      }
      setTradeWeek(""); setTradeShift(""); setTradeReturnWeek(""); setTradeReturnShift("");
    } catch(e) { console.error("Submit trade error:", e); }
  }, [tradeFrom, tradeTo, tradeWeek, tradeShift, tradeReturnWeek, tradeReturnShift, surgeons, addNotification, sendEmailNotif, isScheduler]);

  // ─── Shift Trade Request: Accept ───
  const acceptTradeRequest = useCallback(async (req) => {
    try {
      await db.update("shift_trade_requests", req.id, { status: "accepted", reviewed_at: new Date().toISOString() });
      setTradeRequests(prev => prev.map(r => r.id === req.id ? { ...r, status: "accepted" } : r));
      pushUndo(schedule);
      setSchedule(p => {
        const n = { ...p };
        const wk1 = { ...n[req.week_monday] };
        if (req.shift_key === "dayCall") wk1.dayCall = req.to_surgeon_id;
        else wk1.nights = { ...wk1.nights, [req.shift_key]: req.to_surgeon_id };
        let a1 = new Set([wk1.dayCall, ...Object.values(wk1.nights)].filter(Boolean));
        wk1.off = surgeons.map(s => s.id).find(id => !a1.has(id)) || null;
        n[req.week_monday] = wk1;
        if (req.return_week && req.return_shift) {
          const wk2 = { ...n[req.return_week] };
          if (req.return_shift === "dayCall") wk2.dayCall = req.from_surgeon_id;
          else wk2.nights = { ...wk2.nights, [req.return_shift]: req.from_surgeon_id };
          let a2 = new Set([wk2.dayCall, ...Object.values(wk2.nights)].filter(Boolean));
          wk2.off = surgeons.map(s => s.id).find(id => !a2.has(id)) || null;
          n[req.return_week] = wk2;
        }
        return n;
      });
      await addNotification("trade_accepted", "Shift Trade Accepted",
        `${req.to_surgeon_name} accepted: ${req.shift_label} (${req.week_monday}) with ${req.from_surgeon_name}`);
      sendEmailNotif("trade_accepted", { from_name: req.from_surgeon_name, to_name: req.to_surgeon_name, shift: req.shift_label, week: req.week_monday });
    } catch(e) { console.error("Accept trade error:", e); }
  }, [schedule, surgeons, pushUndo, addNotification, sendEmailNotif]);

  // ─── Shift Trade Request: Decline ───
  const declineTradeRequest = useCallback(async (req) => {
    try {
      await db.update("shift_trade_requests", req.id, { status: "declined", reviewed_at: new Date().toISOString() });
      setTradeRequests(prev => prev.map(r => r.id === req.id ? { ...r, status: "declined" } : r));
      await addNotification("trade_declined", "Shift Trade Declined",
        `${req.to_surgeon_name} declined: ${req.shift_label} (${req.week_monday})`);
    } catch(e) { console.error("Decline trade error:", e); }
  }, [addNotification]);

  // ─── Delete Trade Request ───
  const deleteTradeRequest = useCallback(async (reqId) => {
    if (!confirm("Delete this trade request?")) return;
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/shift_trade_requests?id=eq.${reqId}`, { method: "DELETE", headers: { ...dbHeaders, Prefer: "return=minimal" } });
      setTradeRequests(prev => prev.filter(r => r.id !== reqId));
    } catch(e) {}
  }, []);

  // ─── Scheduler PIN Check ───
  const checkPin = () => {
    if (pinInput === schedulerPin) { setIsScheduler(true); setPinError(""); setPinInput(""); }
    else { setPinError("Incorrect PIN"); setTimeout(() => setPinError(""), 2000); }
  };

  // ─── Mark Notifications as Seen ───
  const markNotifsSeen = () => {
    const now = new Date().toISOString();
    setNotifLastSeen(now);
    try { localStorage.setItem("dsg-notif-seen", now); } catch(e) {}
  };

  // ─── Clear All Notifications ───
  const clearAllNotifications = useCallback(async () => {
    if (!confirm("Clear all notifications? This cannot be undone.")) return;
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/notifications`, { method: "DELETE", headers: { ...dbHeaders, Prefer: "return=minimal" } });
      setNotifications([]);
    } catch(e) { console.error("Clear notifications error:", e); }
  }, []);

  // ─── Delete a Single Vacation Request ───
  const deleteVacRequest = useCallback(async (reqId) => {
    if (!confirm("Delete this request?")) return;
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/vacation_requests?id=eq.${reqId}`, { method: "DELETE", headers: { ...dbHeaders, Prefer: "return=minimal" } });
      setVacRequests(prev => prev.filter(r => r.id !== reqId));
    } catch(e) { console.error("Delete vacation request error:", e); }
  }, []);

  // ─── Edit Vacation Request ───
  const [editingVacReq, setEditingVacReq] = useState(null); // { id, start_date, end_date, reason }

  const saveVacRequestEdit = useCallback(async () => {
    if (!editingVacReq) return;
    try {
      const updates = { start_date: editingVacReq.start_date, end_date: editingVacReq.end_date, reason: editingVacReq.reason };
      await db.update("vacation_requests", editingVacReq.id, updates);
      setVacRequests(prev => prev.map(r => r.id === editingVacReq.id ? { ...r, ...updates } : r));
      // If approved, also update the vacations object
      const req = vacRequests.find(r => r.id === editingVacReq.id);
      if (req?.status === "approved") {
        setVacations(prev => {
          const n = { ...prev };
          const sid = req.surgeon_id;
          const ranges = n[sid] || [];
          // Find and update the matching vacation range
          const idx = ranges.findIndex(([s, e]) => s === req.start_date && e === req.end_date);
          if (idx >= 0) {
            n[sid] = [...ranges];
            n[sid][idx] = [editingVacReq.start_date, editingVacReq.end_date];
          }
          return n;
        });
      }
      setEditingVacReq(null);
    } catch(e) { console.error("Edit vacation error:", e); }
  }, [editingVacReq, vacRequests]);

  // ─── Revoke Approved Vacation (scheduler only) ───
  const revokeApprovedVac = useCallback(async (req) => {
    if (!confirm(`Revoke ${req.surgeon_name}'s approved vacation ${req.start_date} → ${req.end_date}? This will remove it from the schedule.`)) return;
    try {
      await db.update("vacation_requests", req.id, { status: "revoked", reviewed_at: new Date().toISOString() });
      setVacRequests(prev => prev.map(r => r.id === req.id ? { ...r, status: "revoked" } : r));
      // Remove from vacations
      setVacations(prev => {
        const n = { ...prev };
        const sid = req.surgeon_id;
        n[sid] = (n[sid] || []).filter(([s, e]) => !(s === req.start_date && e === req.end_date));
        return n;
      });
      await addNotification("vacation_revoked", "Vacation Revoked",
        `${req.surgeon_name}'s vacation ${req.start_date} → ${req.end_date} was revoked`);
    } catch(e) { console.error("Revoke error:", e); }
  }, [addNotification]);

  // ─── Clear All Reviewed Vacation Requests ───
  const clearReviewedRequests = useCallback(async () => {
    if (!confirm("Clear all reviewed (approved/denied) requests? Pending requests will be kept.")) return;
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/vacation_requests?status=neq.pending`, { method: "DELETE", headers: { ...dbHeaders, Prefer: "return=minimal" } });
      setVacRequests(prev => prev.filter(r => r.status === "pending"));
    } catch(e) { console.error("Clear reviewed requests error:", e); }
  }, []);

          result.fierce_weeks.forEach(e => {
            const mStr = e.monday ? fmt(monOf(parse(e.monday))) : null;
            if (!mStr) return;
            fileFierce++;
            if (e.type === "backup") { backupDates.push(mStr); totalBackup++; }
            else { primaryDates.push(mStr); totalPrimary++; }
          });
          if (primaryDates.length > 0) {
            setBackupMondaySet(prev => { const n = new Set(prev); primaryDates.forEach(m => n.add(m)); return n; });
          }
          if (backupDates.length > 0) {
            setFierceBackupSet(prev => { const n = new Set(prev); backupDates.forEach(m => n.add(m)); return n; });
          }
        }

        const fileParts = [];
        if (fileVac > 0) fileParts.push(`${fileVac} vac`);
        if (fileFierce > 0) fileParts.push(`${fileFierce} Fierce`);
        allParts.push(`${file.name}: ${fileParts.length > 0 ? fileParts.join(", ") : "nothing found"}`);

      } catch (err) {
        console.error(`Schedule scan error (${file.name}):`, err);
        allParts.push(`${file.name}: error`);
      }
    }

    // Summary
    const summary = [];
    if (totalVac > 0) summary.push(`${totalVac} vacation${totalVac>1?"s":""}`);
    if (totalPrimary > 0) summary.push(`${totalPrimary} Fierce Primary week${totalPrimary>1?"s":""}`);
    if (totalBackup > 0) summary.push(`${totalBackup} Fierce Backup week${totalBackup>1?"s":""}`);

    if (summary.length > 0) {
      setSchedScanMsg(`Found ${summary.join(", ")} across ${files.length} file${files.length>1?"s":""}. ${allParts.join(" · ")}`);
    } else {
      setSchedScanMsg(`No vacations or Fierce weeks found in ${files.length} file${files.length>1?"s":""}. ${allParts.join(" · ")}`);
    }

    setSchedScanning(false);
    if (schedFileRef.current) schedFileRef.current.value = "";
  }, [surgeons, callApi]);

  const sMap = useMemo(() => { const m={}; surgeons.forEach((s,i)=>m[s.id]={...s,idx:i}); return m; }, [surgeons]);
  const aMap = useMemo(() => { const m={}; apps.forEach((a,i)=>m[a.id]={...a,idx:i}); return m; }, [apps]);
  const mondays = useMemo(() => getMondays(startYear, startMonth, 14), [startYear, startMonth]);
  const endDate = mondays.length > 0 ? addD(mondays[mondays.length-1], 6) : null;
  const endMoIdx = endDate ? endDate.getMonth() : (startMonth+2)%12;
  const endYr = endDate ? endDate.getFullYear() : startYear;

  const rename = (id,name) => setSurgeons(p=>p.map(s=>s.id===id?{...s,name}:s));
  const renameApp = (id,name) => setApps(p=>p.map(a=>a.id===id?{...a,name}:a));

  const addSurgeon = () => {
    const id = "s" + Date.now();
    setSurgeons(p => [...p, { id, name: "NEW" }]);
  };
  const removeSurgeon = (id) => {
    const s = surgeons.find(x => x.id === id);
    if (!s) return;
    if (!confirm(`Remove surgeon ${s.name}? This will not remove their past data from totals.`)) return;
    setSurgeons(p => p.filter(x => x.id !== id));
  };
  const addApp = () => {
    const id = "a" + Date.now();
    setApps(p => [...p, { id, name: "NEW" }]);
  };
  const removeApp = (id) => {
    const a = apps.find(x => x.id === id);
    if (!a) return;
    if (!confirm(`Remove APP ${a.name}?`)) return;
    setApps(p => p.filter(x => x.id !== id));
  };

  const addVac = () => {
    if(!vacSurgeon||!vacStart||!vacEnd) return;
    setVacations(p=>({...p,[vacSurgeon]:[...(p[vacSurgeon]||[]),[vacStart,vacEnd]]}));
    setVacStart(""); setVacEnd("");
  };
  const rmVac = (sid,idx) => setVacations(p=>({...p,[sid]:(p[sid]||[]).filter((_,i)=>i!==idx)}));

  const addAppShift = () => {
    if(!appDate||!appPerson) return;
    setAppShifts(p=>({...p,[appDate]:appPerson}));
    setAppDate("");
  };
  const rmAppShift = (ds) => setAppShifts(p=>{const n={...p};delete n[ds];return n;});

  // Build surgeon preferences map by matching names
  const buildPrefs = () => {
    const p = {};
    surgeons.forEach(s => {
      const n = s.name.toUpperCase();
      if (n === "MCC") p[s.id] = { preferShift:"tue", avoidShift:null };
      else if (n === "DJA") p[s.id] = { preferShift:null, avoidShift:"thu" };
    });
    return p;
  };

  const doGenerate = (preview) => {
    const prefs = buildPrefs();
    const result = generate(surgeons, mondays, vacations, backupMondaySet, priorCounts, prefs, fierceBackupSet, holidayAssignments);
    if (preview) {
      setPreviewSchedule(result);
      setShowPreview(true);
    } else {
      if (Object.keys(schedule).length > 0) pushUndo(schedule);
      setSchedule(result);
      setPreviewSchedule(null); setShowPreview(false);
      setSaveStatus("Regenerated!");
      setTimeout(() => setSaveStatus(""), 2000);
      // Immediately save to Supabase to prevent polling race condition
      (async () => {
        try {
          const ts = new Date().toISOString();
          lastSyncRef.current = ts; // block poll from overwriting
          const payload = {
            surgeons, apps, vacations,
            backupMondays: [...backupMondaySet],
            fierceBackup: [...fierceBackupSet],
            schedule: result, appShifts, priorCounts, year1Counts, year2Counts,
            startMonth, startYear, holidayAssignments,
          };
          await supabase.from("call_schedule_data").upsert({ id: "main", data: payload, updated_at: ts });
        } catch(e) { console.error("Immediate save failed:", e); }
      })();
    }
  };

  // ─── Clear / Reset Schedule ───
  const clearSchedule = () => {
    if (!confirm("Clear the entire generated schedule? Holiday assignments and setup data will be kept.\n\nThis cannot be undone.")) return;
    if (Object.keys(schedule).length > 0) pushUndo(schedule);
    setSchedule({});
    setSaveStatus("Schedule cleared");
    setTimeout(() => setSaveStatus(""), 2000);
    // Immediately save to prevent polling race condition
    (async () => {
      try {
        const ts = new Date().toISOString();
        lastSyncRef.current = ts;
        const payload = {
          surgeons, apps, vacations,
          backupMondays: [...backupMondaySet],
          fierceBackup: [...fierceBackupSet],
          schedule: {}, appShifts, priorCounts, year1Counts, year2Counts,
          startMonth, startYear, holidayAssignments,
        };
        await supabase.from("call_schedule_data").upsert({ id: "main", data: payload, updated_at: ts });
      } catch(e) { console.error("Immediate save failed:", e); }
    })();
  };

  const acceptPreview = () => {
    if (previewSchedule) {
      if (Object.keys(schedule).length > 0) pushUndo(schedule);
      setSchedule(previewSchedule);
      setPreviewSchedule(null); setShowPreview(false);
      setCalMonth(startMonth);
      setCalYear(startYear);
      setView("calendar");
    }
  };

  const discardPreview = () => {
    setPreviewSchedule(null); setShowPreview(false);
  };

  // ─── Holiday Assignment Generator ───
  // RULE: Each holiday within a group (major / minor) must have a DISTINCT
  // surgeon pair — no surgeon appears on more than one holiday in the same group.
  // Major = Christmas, Thanksgiving, New Year's  (3 holidays × 2 = 6 of 7 surgeons)
  // Minor = Memorial Day, July 4th, Labor Day    (3 holidays × 2 = 6 of 7 surgeons)
  // FAK is always locked to Christmas.
  const generateHolidayAssignments = useCallback((year) => {
    const holidays = getHolidays(year);
    const ids = surgeons.map(s => s.id);
    const nameMap = {}; surgeons.forEach(s => nameMap[s.id] = s.name);
    const DAYNAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

    // Load prior year assignments to avoid same surgeon on same holiday 2 years running
    const priorYear = holidayAssignments[String(year - 1)] || [];
    const priorByName = {}; // { "Christmas Day": { surgeonA, surgeonB }, ... }
    priorYear.forEach(h => { priorByName[h.name] = { surgeonA: h.surgeonA, surgeonB: h.surgeonB }; });

    // Lifetime holiday counts across all stored years for overall fairness
    const lifetimeCt = {};
    ids.forEach(id => { lifetimeCt[id] = { major: 0, minor: 0 }; });
    Object.entries(holidayAssignments).forEach(([yr, arr]) => {
      if (String(yr) === String(year)) return; // skip current year (we're regenerating it)
      if (!Array.isArray(arr)) return;
      arr.forEach(h => {
        if (h.surgeonA && lifetimeCt[h.surgeonA]) lifetimeCt[h.surgeonA][h.type]++;
        if (h.surgeonB && lifetimeCt[h.surgeonB]) lifetimeCt[h.surgeonB][h.type]++;
      });
    });

    const fakId = ids.find(id => (nameMap[id] || "").toUpperCase() === "FAK") || null;

    // Helper: build coverage days from a holiday + assigned pair
    // Always includes: Night Before (B) → Holiday Day (A) → Day After (B) (minimum 3 days)
    // Night-before defaults to Surgeon B; at display time it's replaced by the actual night-shift person from the schedule
    const buildCoverage = (hol, sA, sB) => {
      const holDate = parse(hol.date);
      const holDow = holDate.getDay();
      const coverage = [];

      // Night before — defaults to Surgeon B (replaced at display time by actual night-shift person)
      const evDate = addD(holDate, -1);
      coverage.push({ date: fmt(evDate), surgeon: sB, label: hol.name + " Night Before", day: DAYNAMES[evDate.getDay()], isEve: true });

      // Holiday day — Surgeon A
      coverage.push({ date: hol.date, surgeon: sA, label: hol.name + " 24h", day: DAYNAMES[holDow] });

      if (hol.endDate && hol.endDate !== hol.date) {
        // New Year's: Dec 31 (A) + Jan 1 (B), then continue alternating
        coverage.push({ date: hol.endDate, surgeon: sB, label: "New Year's Day 24h", day: DAYNAMES[parse(hol.endDate).getDay()] });
        let next = addD(parse(hol.endDate), 1);
        let toggle = true;
        while (next.getDay() !== 0 && next.getDay() !== 1) {
          coverage.push({ date: fmt(next), surgeon: toggle ? sA : sB, label: DAYNAMES[next.getDay()] + " 24h", day: DAYNAMES[next.getDay()] });
          toggle = !toggle;
          next = addD(next, 1);
        }
      } else if (holDow === 1) {
        // Monday holiday: Eve (Sun) already added, Holiday (Mon) = A, Day After (Tue) = B
        const dayAfter = addD(holDate, 1);
        coverage.push({ date: fmt(dayAfter), surgeon: sB, label: DAYNAMES[dayAfter.getDay()] + " 24h", day: DAYNAMES[dayAfter.getDay()] });
      } else if (holDow === 5) {
        // Friday holiday: Eve (Thu), Fri (A), Sat (B)
        coverage.push({ date: fmt(addD(holDate, 1)), surgeon: sB, label: "Sat 24h", day: "Sat" });
      } else if (holDow === 6) {
        // Saturday holiday: Eve (Fri), Sat (A), Sun (B)
        coverage.push({ date: fmt(addD(holDate, 1)), surgeon: sB, label: "Sun 24h", day: "Sun" });
      } else if (holDow === 0) {
        // Sunday holiday: Eve (Sat), Sun (A), Mon (B)
        const dayAfter = addD(holDate, 1);
        coverage.push({ date: fmt(dayAfter), surgeon: sB, label: DAYNAMES[dayAfter.getDay()] + " 24h", day: DAYNAMES[dayAfter.getDay()] });
      } else {
        // Mid-week (Tue-Thu): Eve already added, holiday (A), then alternate B, A through Sat
        let next = addD(holDate, 1);
        let toggle = false; // false=B, true=A
        while (next.getDay() !== 0 && next.getDay() !== 1) {
          coverage.push({ date: fmt(next), surgeon: toggle ? sA : sB, label: DAYNAMES[next.getDay()] + " 24h", day: DAYNAMES[next.getDay()] });
          toggle = !toggle;
          next = addD(next, 1);
        }
      }
      return coverage;
    };

    // Helper: pick best pair from a pool, considering vacation + fairness
    const pickPair = (hol, pool) => {
      const holDate = parse(hol.date);
      const dayAfterStr = fmt(addD(holDate, 1));
      const type = hol.type;

      // Filter by vacation availability; fall back to full pool if too few
      let avail = pool.filter(id => !onVac(id, hol.date, vacations) && !onVac(id, dayAfterStr, vacations));
      if (avail.length < 2) avail = [...pool];

      // Sort by fairness: lifetime holiday count → avoid repeat from prior year → random
      const prior = priorByName[hol.name] || {};
      avail.sort((a, b) => {
        // Prefer surgeons with fewer lifetime assignments of this type
        const la = (lifetimeCt[a]?.[type] || 0);
        const lb = (lifetimeCt[b]?.[type] || 0);
        if (la !== lb) return la - lb;
        // Avoid repeating the same holiday as last year
        const aRepeat = (a === prior.surgeonA || a === prior.surgeonB) ? 1 : 0;
        const bRepeat = (b === prior.surgeonA || b === prior.surgeonB) ? 1 : 0;
        if (aRepeat !== bRepeat) return aRepeat - bRepeat;
        return Math.random() - 0.5;
      });

      return { sA: avail[0], sB: avail[1] || avail[0] };
    };

    // ─── Process each group independently with distinct-pair constraint ───
    const majorHols = holidays.major.map(h => ({ ...h, type: "major" }));
    const minorHols = holidays.minor.map(h => ({ ...h, type: "minor" }));
    const assignments = [];

    [majorHols, minorHols].forEach(group => {
      const type = group[0]?.type;
      const usedInGroup = new Set(); // surgeons already assigned in this group

      // Sort: Christmas first (FAK locked), then by date
      group.sort((a, b) => {
        if (a.name === "Christmas Day") return -1;
        if (b.name === "Christmas Day") return 1;
        return a.date.localeCompare(b.date);
      });

      group.forEach(hol => {
        // Build available pool: all surgeons NOT yet used in this group
        let pool = ids.filter(id => !usedInGroup.has(id));

        // FAK locked to Christmas
        if (hol.name === "Christmas Day" && fakId) {
          const sA = fakId;
          const remaining = pool.filter(id => id !== fakId);
          // Pick best partner from remaining pool
          const holDate = parse(hol.date);
          const dayAfterStr = fmt(addD(holDate, 1));
          let partnerPool = remaining.filter(id => !onVac(id, hol.date, vacations) && !onVac(id, dayAfterStr, vacations));
          if (partnerPool.length === 0) partnerPool = remaining;
          const prior = priorByName["Christmas Day"] || {};
          partnerPool.sort((a, b) => {
            const la = (lifetimeCt[a]?.[type] || 0) - (lifetimeCt[b]?.[type] || 0);
            if (la) return la;
            const aR = (a === prior.surgeonB) ? 1 : 0;
            const bR = (b === prior.surgeonB) ? 1 : 0;
            if (aR !== bR) return aR - bR;
            return Math.random() - 0.5;
          });
          const sB = partnerPool[0] || remaining[0];
          usedInGroup.add(sA); usedInGroup.add(sB);
          assignments.push({
            name: hol.name, date: hol.date, type, emoji: hol.emoji || "📅",
            surgeonA: sA, surgeonB: sB, coverage: buildCoverage(hol, sA, sB),
          });
          return;
        }

        // If pool is too small (shouldn't happen with 7 surgeons & 3 holidays),
        // fall back to full list
        if (pool.length < 2) pool = [...ids];

        const { sA, sB } = pickPair(hol, pool);
        usedInGroup.add(sA); usedInGroup.add(sB);

        assignments.push({
          name: hol.name, date: hol.date, type, emoji: hol.emoji || "📅",
          surgeonA: sA, surgeonB: sB, coverage: buildCoverage(hol, sA, sB),
        });
      });
    });

    // Sort final assignments by date for display
    assignments.sort((a, b) => a.date.localeCompare(b.date));
    setHolidayAssignments(prev => ({ ...prev, [String(year)]: assignments }));
  }, [surgeons, vacations, holidayAssignments]);

  // ─── Swap a holiday surgeon ───
  const swapHolidaySurgeon = useCallback((year, holidayIdx, slot, newSurgeonId) => {
    // Check distinct-pair constraint: is this surgeon already assigned to another holiday in the same group?
    const arr = holidayAssignments[String(year)] || [];
    const targetHol = arr[holidayIdx];
    if (targetHol) {
      const sameGroup = arr.filter((h, i) => i !== holidayIdx && h.type === targetHol.type);
      const usedInGroup = new Set();
      sameGroup.forEach(h => { usedInGroup.add(h.surgeonA); usedInGroup.add(h.surgeonB); });
      if (usedInGroup.has(newSurgeonId)) {
        const conflictHol = sameGroup.find(h => h.surgeonA === newSurgeonId || h.surgeonB === newSurgeonId);
        const surgeonName = surgeons.find(s => s.id === newSurgeonId)?.name || newSurgeonId;
        if (!confirm(`⚠️ ${surgeonName} is already assigned to ${conflictHol?.name} (${targetHol.type} group).\n\nThis violates the distinct-pairs rule. Assign anyway?`)) return;
      }
    }
    setHolidayAssignments(prev => {
      const n = { ...prev };
      const arr = [...(n[String(year)] || [])];
      const hol = { ...arr[holidayIdx] };
      const sA = slot === "surgeonA" ? newSurgeonId : hol.surgeonA;
      const sB = slot === "surgeonB" ? newSurgeonId : hol.surgeonB;
      hol.surgeonA = sA;
      hol.surgeonB = sB;
      let nonEveIdx = 0;
      hol.coverage = hol.coverage.map((c) => {
        if (c.isEve) return { ...c, surgeon: sB };
        const surgeon = nonEveIdx % 2 === 0 ? sA : sB;
        nonEveIdx++;
        return { ...c, surgeon };
      });
      arr[holidayIdx] = hol;
      n[String(year)] = arr;
      return n;
    });
  }, [holidayAssignments, surgeons]);

  const swapShift = (mStr, shift, newId) => {
    const oldId = shift === "dayCall" ? schedule[mStr]?.dayCall : schedule[mStr]?.nights?.[shift];
    pushUndo(schedule);
    setSchedule(p => {
      const wk = {...p[mStr]};
      if(shift==="dayCall") wk.dayCall=newId;
      else wk.nights={...wk.nights,[shift]:newId};
      const assigned = new Set([wk.dayCall,...Object.values(wk.nights)].filter(Boolean));
      wk.off = surgeons.map(s=>s.id).find(id=>!assigned.has(id))||null;
      return {...p,[mStr]:wk};
    });
    setEditShift(null); setEditingWeek(null);
    setSwapSuggestions(null); setSwapTarget(null);
    // Notify about the change
    const oldName = sMap[oldId]?.name || "—";
    const newName = sMap[newId]?.name || "—";
    const shiftLabel = SHIFT_LABELS[shift] || shift;
    addNotification("schedule_changed", "Schedule Changed",
      `${shiftLabel} (wk of ${mStr}): ${oldName} → ${newName}`);
    sendEmailNotif("schedule_changed", { shift: shiftLabel, week: mStr, old_surgeon: oldName, new_surgeon: newName });
  };

  // ─── Smart Swap Suggestions ───
  const [swapTarget, setSwapTarget] = useState(null); // { mondayStr, shift, surgeonId }
  const [swapSuggestions, setSwapSuggestions] = useState(null); // [{ candidateId, score, reasons, returnSwaps }]

  const findSwapSuggestions = useCallback((mondayStr, shift, currentSurgeonId) => {
    if (!schedule[mondayStr]) return;
    const currentName = sMap[currentSurgeonId]?.name || "?";
    const mon = parse(mondayStr);
    const ids = surgeons.map(s => s.id).filter(id => id !== currentSurgeonId);

    // Current shift counts from schedule
    const sCounts = {};
    surgeons.forEach(s => { sCounts[s.id] = { dc: 0, nights: 0, wknd: 0 }; });
    Object.values(schedule).forEach(wk => {
      if (wk.dayCall && sCounts[wk.dayCall]) sCounts[wk.dayCall].dc++;
      Object.entries(wk.nights || {}).forEach(([sk, sid]) => {
        if (!sid || !sCounts[sid]) return;
        if (sk === "wknd") sCounts[sid].wknd++;
        else sCounts[sid].nights++;
      });
    });

    // Determine shift type for counting
    const shiftType = shift === "dayCall" ? "dc" : shift === "wknd" ? "wknd" : "nights";

    // Check each candidate
    const candidates = [];
    ids.forEach(candId => {
      const candName = sMap[candId]?.name || "?";
      const reasons = [];
      let eligible = true;

      // 1. Check vacation conflict
      const dayOffset = { dayCall: 0, mon: 0, tue: 1, wed: 2, thu: 3, wknd: 4 }[shift] || 0;
      const shiftDate = fmt(addD(mon, dayOffset));
      if (shift === "dayCall") {
        for (let i = 0; i < 6; i++) {
          if (onVac(candId, fmt(addD(mon, i)), vacations)) { eligible = false; break; }
        }
      } else if (shift === "wknd") {
        const friDate = fmt(addD(mon, 4));
        const sunDate = fmt(addD(mon, 6));
        const nextMonDate = fmt(addD(mon, 7));
        if (onVac(candId, friDate, vacations) || onVac(candId, sunDate, vacations) || onVac(candId, nextMonDate, vacations)) eligible = false;
      } else {
        const nextDay = fmt(addD(mon, dayOffset + 1));
        if (onVac(candId, shiftDate, vacations) || onVac(candId, nextDay, vacations)) eligible = false;
      }
      if (!eligible) return;

      // 2. Check if candidate is already assigned DC that week (can't do night + DC)
      const wk = schedule[mondayStr];
      if (shift !== "dayCall" && wk.dayCall === candId) {
        reasons.push("Already on service week");
        return; // can't take a night/weekend if on DC
      }

      // 3. Check if candidate already has a shift that week they'd need to keep
      const candShiftsThisWeek = [];
      if (wk.dayCall === candId) candShiftsThisWeek.push("Service Week");
      Object.entries(wk.nights || {}).forEach(([sk, sid]) => {
        if (sid === candId) candShiftsThisWeek.push(SHIFT_LABELS[sk]);
      });

      // 4. Calculate fairness score — lower is better (candidate has fewer of this type)
      const currentCount = sCounts[currentSurgeonId]?.[shiftType] || 0;
      const candCount = sCounts[candId]?.[shiftType] || 0;
      const countDiff = currentCount - candCount; // positive = current has more → good swap

      // Include prior counts for total fairness
      const priorCurr = priorCounts[currentSurgeonId] || {};
      const priorCand = priorCounts[candId] || {};
      const totalCurrType = (priorCurr[shiftType === "dc" ? "dc" : shiftType === "wknd" ? "wknd" : "nights"] || 0) + (sCounts[currentSurgeonId]?.[shiftType] || 0);
      const totalCandType = (priorCand[shiftType === "dc" ? "dc" : shiftType === "wknd" ? "wknd" : "nights"] || 0) + (sCounts[candId]?.[shiftType] || 0);
      const totalDiff = totalCurrType - totalCandType;

      if (countDiff > 0) reasons.push(`${candName} has ${countDiff} fewer ${shiftType === "dc" ? "service weeks" : shiftType === "wknd" ? "weekends" : "nights"} this period`);
      else if (countDiff === 0) reasons.push(`Equal ${shiftType === "dc" ? "service weeks" : shiftType === "wknd" ? "weekends" : "nights"} this period`);
      else reasons.push(`${candName} has ${Math.abs(countDiff)} more ${shiftType === "dc" ? "service weeks" : shiftType === "wknd" ? "weekends" : "nights"} — less ideal`);

      if (totalDiff > 1) reasons.push(`${totalDiff} fewer overall (good for balance)`);

      if (candShiftsThisWeek.length > 0) reasons.push(`Already assigned: ${candShiftsThisWeek.join(", ")}`);

      // 5. Find possible return swaps — shifts the current surgeon could take from the candidate in another week
      const returnSwaps = [];
      Object.entries(schedule).forEach(([otherMon, otherWk]) => {
        if (otherMon === mondayStr) return;
        // Check if candidate has a shift of the same type in another week
        if (shiftType === "dc" && otherWk.dayCall === candId) {
          // Check current surgeon can do DC that week
          const otherMonDate = parse(otherMon);
          let canDo = true;
          for (let i = 0; i < 6; i++) { if (onVac(currentSurgeonId, fmt(addD(otherMonDate, i)), vacations)) { canDo = false; break; } }
          if (canDo) returnSwaps.push({ mondayStr: otherMon, shift: "dayCall", label: `Svc Wk (${otherMon})` });
        }
        if (shiftType === "nights") {
          NIGHT_KEYS.forEach((sk, i) => {
            if (otherWk.nights?.[sk] === candId && otherWk.dayCall !== currentSurgeonId) {
              const otherMonDate = parse(otherMon);
              const sd = fmt(addD(otherMonDate, i));
              const nd = fmt(addD(otherMonDate, i + 1));
