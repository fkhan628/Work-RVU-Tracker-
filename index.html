<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RVU Tracker">
  <meta name="theme-color" content="#0f172a">
  <title>RVU Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #0f172a; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-family: -apple-system, sans-serif; font-size: 16px; }
    input, textarea, select, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root">Loading RVU Tracker...</div>
  
  <!-- CMS CY2026 PFS: 7,278 CPT codes (plain JS, loads instantly) -->
  <script src="cpt-data.js"></script>
  
  <!-- React -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  
  <!-- App: fetched and compiled separately so Babel only handles 46KB -->
  <script>
    fetch("app.js?v=" + Date.now())
      .then(function(r) { return r.text(); })
      .then(function(jsx) {
        var js = Babel.transform(jsx, { presets: ["react"] }).code;
        var s = document.createElement("script");
        s.textContent = js;
        document.body.appendChild(s);
      })
      .catch(function(err) {
        document.getElementById("root").innerHTML = 
          '<div style="color:#f87171;padding:20px;font-family:monospace;">Error: ' + err.message + '</div>';
      });
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function() {
        navigator.serviceWorker.register("./sw.js").catch(function(){});
      });
    }
  </script>
</body>
</html>
