<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RVU Tracker">
  <meta name="theme-color" content="#0f172a">
  <title>RVU Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #0f172a; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }
    input, textarea, select, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    if("serviceWorker" in navigator){navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(x){x.unregister()})});}
    if(!window.CMS_RAW) window.CMS_RAW=[];
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo } = React;

const CPT_DATABASE_DEFAULT=CMS_RAW.map(r=>({code:r[0],desc:r[1],wRVU:r[2],category:r[3]}));
const buildCPTMap = (db) => { const m = {}; db.forEach(c => { m[c.code] = c; }); return m; };
const buildCategories = (db) => [...new Set(db.map(c => c.category))].sort();

const MODIFIERS = [
  { code: "-22", label: "Increased Complexity", factor: 1.2, desc: "~20% increase" },
  { code: "-50", label: "Bilateral Procedure", factor: 1.5, desc: "150% of base" },
  { code: "-51", label: "Multiple Procedures", factor: 0.5, desc: "50% (2nd+ proc)" },
  { code: "-62", label: "Co-Surgeon", factor: 0.625, desc: "62.5% of base" },
  { code: "-80", label: "Assistant Surgeon", factor: 0.16, desc: "16% of base" },
  { code: "-AS", label: "PA/NP Assistant", factor: 0.135, desc: "13.5% of base" },
  { code: "-59", label: "Distinct Procedural Service", factor: 1.0, desc: "100% (unbundle)" },
  { code: "-78", label: "Return to OR, Related", factor: 0.7, desc: "70% of base" },
  { code: "-79", label: "Unrelated Proc, Postop", factor: 1.0, desc: "100% of base" },
  { code: "-76", label: "Repeat Procedure, Same MD", factor: 1.0, desc: "100% of base" },
  { code: "-77", label: "Repeat Procedure, Diff MD", factor: 1.0, desc: "100% of base" },
];
const MOD_MAP = {}; MODIFIERS.forEach(m => { MOD_MAP[m.code] = m; });

// ─── Helpers ───
const fontLink = document.createElement("link");
fontLink.href = "https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap";
fontLink.rel = "stylesheet";
document.head.appendChild(fontLink);

const fmt = d => new Date(d).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
const fmtShort = d => new Date(d).toLocaleDateString("en-US", { month: "short", day: "numeric" });
const defSettings = () => ({ ratePerRVU: 55, annualGoal: 6000, yearStart: new Date().getFullYear() + "-01-01" });
const defState = () => ({ entries: [], settings: defSettings(), rvuOverrides: {}, dataVersion: DATA_VERSION });
const SK = "rvu-tracker-data";

function loadData() { try { const s = JSON.parse(localStorage.getItem(SK)); return { entries: s.entries || [], settings: { ...defSettings(), ...s.settings }, rvuOverrides: s.rvuOverrides || {}, dataVersion: s.dataVersion || DATA_VERSION }; } catch { return defState(); } }
function saveData(d) { try { localStorage.setItem(SK, JSON.stringify(d)); } catch {} }
async function loadPersistent() { try { const r = await window.storage.get("rvu-tracker-all"); if (r && r.value) { const p = JSON.parse(r.value); return { entries: p.entries || [], settings: { ...defSettings(), ...p.settings }, rvuOverrides: p.rvuOverrides || {}, dataVersion: p.dataVersion || DATA_VERSION }; } } catch {} return null; }
async function savePersistent(d) { try { await window.storage.set("rvu-tracker-all", JSON.stringify(d)); } catch {} }

// Apply user overrides to CPT database and include CMS imported codes
function getDB(overrides) {
  let db = [...CPT_DATABASE_DEFAULT];

  if (overrides && Object.keys(overrides).length > 0) {
    db = db.map(c => overrides[c.code] ? { ...c, wRVU: overrides[c.code] } : c);
  }
  return db;
}

function calcAdj(base, mods) {
  if (!mods || mods.length === 0) return base;
  if (mods.length === 1) { const m = MOD_MAP[mods[0]]; return m ? base * m.factor : base; }
  let r = base; mods.forEach(mc => { const m = MOD_MAP[mc]; if (m) r *= m.factor; }); return r;
}

// ─── CSV Parse (same as before) ───
function parseLine(line) { const r = []; let cur = "", inQ = false; for (let i = 0; i < line.length; i++) { const c = line[i]; if (c === '"') inQ = !inQ; else if ((c === ',' || c === '\t') && !inQ) { r.push(cur.trim()); cur = ""; } else cur += c; } r.push(cur.trim()); return r; }
function normH(h) { return h.toLowerCase().replace(/[^a-z0-9]/g, ''); }
function detectCols(headers) {
  const m = { date: -1, cpt: -1, desc: -1, rvu: -1, modifier: -1, notes: -1 };
  const maps = { date: ['date','dos','servicedate','proceduredate','dateofservice','dosdate'], cpt: ['cpt','cptcode','code','procedure','proccode','procedurecode','cptcd'], desc: ['description','desc','proceduredesc','proceduredescription','name','procedurename'], rvu: ['rvu','wrvu','wrvus','rvuvalue','workrvu','totalrvu','totalwrvu','wrvuvalue','rvus'], modifier: ['modifier','modifiers','mod','mods'], notes: ['notes','note','comments','comment','memo'] };
  headers.forEach((h, i) => { const n = normH(h); Object.entries(maps).forEach(([k, vals]) => { if (m[k] === -1 && vals.includes(n)) m[k] = i; }); });
  return m;
}
function parseDate2(val) { if (!val) return new Date().toISOString().slice(0, 10); const c = val.trim(); let x = c.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/); if (x) { const y = x[3].length === 2 ? '20' + x[3] : x[3]; return `${y}-${x[1].padStart(2,'0')}-${x[2].padStart(2,'0')}`; } x = c.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/); if (x) return `${x[1]}-${x[2].padStart(2,'0')}-${x[3].padStart(2,'0')}`; const d = new Date(c); if (!isNaN(d.getTime())) return d.toISOString().slice(0, 10); return new Date().toISOString().slice(0, 10); }
function extractCPT(val) { if (!val) return null; const x = val.replace(/[^0-9]/g, ' ').trim().match(/\b(\d{5})\b/); return x ? x[1] : null; }
function extractMods(val) { if (!val) return []; const known = MODIFIERS.map(m => m.code); const mods = []; (val.match(/[-]?\d{2}/g) || []).forEach(raw => { const c = raw.startsWith('-') ? raw : '-' + raw; if (known.includes(c)) mods.push(c); }); if (/AS/i.test(val)) mods.push('-AS'); return [...new Set(mods)]; }

function parseImport(text, cptMap) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) return { entries: [], errors: ['Not enough data rows'], mapping: null, headers: [] };
  const headers = parseLine(lines[0]);
  const mapping = detectCols(headers);
  if (mapping.cpt === -1) { const first = parseLine(lines[1]); first.forEach((v, i) => { if (mapping.cpt === -1 && /^\d{5}$/.test(v.trim())) mapping.cpt = i; }); }
  if (mapping.cpt === -1) return { entries: [], errors: ['Could not detect CPT code column.'], mapping, headers };
  const entries = [], errors = []; let unmatched = 0;
  for (let i = 1; i < lines.length; i++) {
    const cols = parseLine(lines[i]); if (cols.length < 2) continue;
    const code = extractCPT(mapping.cpt >= 0 ? cols[mapping.cpt] : '');
    if (!code) { errors.push(`Row ${i + 1}: No valid CPT code`); continue; }
    const date = mapping.date >= 0 ? parseDate2(cols[mapping.date]) : new Date().toISOString().slice(0, 10);
    const mods = mapping.modifier >= 0 ? extractMods(cols[mapping.modifier]) : [];
    const notes = mapping.notes >= 0 ? (cols[mapping.notes] || '') : '';
    const info = cptMap[code]; let desc = mapping.desc >= 0 ? (cols[mapping.desc] || '') : ''; let base;
    if (info) { desc = desc || info.desc; base = (mapping.rvu >= 0 && cols[mapping.rvu]) ? (parseFloat(cols[mapping.rvu]) || info.wRVU) : info.wRVU; }
    else { unmatched++; desc = desc || `CPT ${code}`; base = (mapping.rvu >= 0 && cols[mapping.rvu]) ? (parseFloat(cols[mapping.rvu]) || 0) : 0; }
    entries.push({ id: Date.now().toString() + '-' + i, date, cptCode: code, description: desc, category: info ? info.category : 'Imported', baseRVU: base, modifiers: mods, adjustedRVU: calcAdj(base, mods), notes, imported: true });
  }
  if (unmatched > 0) errors.push(`${unmatched} CPT code(s) not in database`);
  return { entries, errors, mapping, headers };
}

// ═══════════════════════════════════════
// APP
// ═══════════════════════════════════════
function App() {
  const [data, setData] = useState(defState);
  const [view, setView] = useState("dashboard");
  const [loaded, setLoaded] = useState(false);

  const db = useMemo(() => getDB(data.rvuOverrides), [data.rvuOverrides]);
  const cptMap = useMemo(() => buildCPTMap(db), [db]);
  const categories = useMemo(() => buildCategories(db), [db]);

  useEffect(() => { (async () => { const p = await loadPersistent(); setData(p && p.entries.length > 0 ? p : loadData()); setLoaded(true); })(); }, []);
  useEffect(() => { if (!loaded) return; saveData(data); savePersistent(data); }, [data, loaded]);
  const upd = fn => setData(prev => ({ ...fn(prev) }));

  if (!loaded) return <div style={S.loading}>Loading...</div>;
  return (
    <div style={S.shell}><div style={S.app}>
      {view === "dashboard" && <Dashboard data={data} db={db} setView={setView} />}
      {view === "log" && <LogProc data={data} db={db} cptMap={cptMap} categories={categories} upd={upd} setView={setView} />}
      {view === "import" && <Import data={data} cptMap={cptMap} upd={upd} setView={setView} />}
      {view === "history" && <History data={data} upd={upd} setView={setView} />}
      {view === "settings" && <Settings data={data} db={db} cptMap={cptMap} categories={categories} upd={upd} setView={setView} />}
      <Nav view={view} setView={setView} />
    </div></div>
  );
}

function Nav({ view, setView }) {
  const tabs = [{ id: "dashboard", icon: "\u25C9", label: "Dashboard" }, { id: "log", icon: "\uFF0B", label: "Log" }, { id: "import", icon: "\u2913", label: "Import" }, { id: "history", icon: "\u2630", label: "History" }, { id: "settings", icon: "\u2699", label: "Settings" }];
  return (<div style={S.nav}>{tabs.map(t => (<button key={t.id} onClick={() => setView(t.id)} style={{ ...S.navBtn, color: view === t.id ? "#0ea5e9" : "#94a3b8" }}><span style={{ fontSize: t.id === "log" || t.id === "import" ? 22 : 17 }}>{t.icon}</span><span style={{ fontSize: 9, marginTop: 2, letterSpacing: 0.4 }}>{t.label}</span></button>))}</div>);
}

// ═══════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════
function Dashboard({ data, db, setView }) {
  const { entries, settings } = data;
  const now = new Date(); const ys = new Date(settings.yearStart);
  const ye = entries.filter(e => new Date(e.date) >= ys);
  const tRVU = ye.reduce((s, e) => s + e.adjustedRVU, 0);
  const tComp = tRVU * settings.ratePerRVU;
  const gPct = settings.annualGoal > 0 ? Math.min((tRVU / settings.annualGoal) * 100, 100) : 0;
  const dp = Math.max(1, Math.floor((now - ys) / 86400000));
  const ePct = (dp / 365) * 100;
  const pace = gPct >= ePct ? "ahead" : "behind";
  const pDiff = Math.abs(tRVU - (settings.annualGoal * dp / 365));
  const months = []; for (let i = 5; i >= 0; i--) { const d = new Date(now.getFullYear(), now.getMonth() - i, 1); const me = entries.filter(e => { const ed = new Date(e.date); return ed.getMonth() === d.getMonth() && ed.getFullYear() === d.getFullYear(); }); months.push({ label: d.toLocaleDateString("en-US", { month: "short" }), rvu: me.reduce((s, e) => s + e.adjustedRVU, 0) }); }
  const maxM = Math.max(...months.map(m => m.rvu), 1);
  const ws = new Date(now); ws.setDate(now.getDate() - now.getDay()); ws.setHours(0,0,0,0);
  const wRVU = entries.filter(e => new Date(e.date) >= ws).reduce((s, e) => s + e.adjustedRVU, 0);
  const todayRVU = entries.filter(e => e.date === now.toISOString().slice(0,10)).reduce((s, e) => s + e.adjustedRVU, 0);

  return (<div style={S.page}>
    <div style={S.header}><h1 style={S.title}>RVU Tracker</h1><p style={S.subtitle}>{now.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" })}</p></div>
    <div style={S.cardMain}><div style={{ display: "flex", alignItems: "center", gap: 24 }}>
      <svg width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="#1e293b" strokeWidth="8" /><circle cx="50" cy="50" r="42" fill="none" stroke={pace === "ahead" ? "#10b981" : "#f59e0b"} strokeWidth="8" strokeLinecap="round" strokeDasharray={`${gPct * 2.639} 263.9`} transform="rotate(-90 50 50)" style={{ transition: "stroke-dasharray 0.8s ease" }} /><text x="50" y="46" textAnchor="middle" fill="#f8fafc" fontSize="18" fontFamily="JetBrains Mono" fontWeight="600">{gPct.toFixed(0)}%</text><text x="50" y="62" textAnchor="middle" fill="#94a3b8" fontSize="9" fontFamily="DM Sans">of goal</text></svg>
      <div><div style={S.metricBig}>{tRVU.toFixed(1)}</div><div style={S.metricLabel}>wRVUs YTD</div><div style={{ ...S.paceTag, background: pace === "ahead" ? "rgba(16,185,129,0.15)" : "rgba(245,158,11,0.15)", color: pace === "ahead" ? "#34d399" : "#fbbf24" }}>{pace === "ahead" ? "▲" : "▼"} {pDiff.toFixed(1)} wRVUs {pace}</div></div>
    </div></div>
    <div style={S.statsRow}>
      <div style={S.statCard}><div style={S.statValue}>{todayRVU.toFixed(1)}</div><div style={S.statLabel}>Today</div></div>
      <div style={S.statCard}><div style={S.statValue}>{wRVU.toFixed(1)}</div><div style={S.statLabel}>This Week</div></div>
      <div style={S.statCard}><div style={{ ...S.statValue, color: "#10b981" }}>${tComp.toLocaleString()}</div><div style={S.statLabel}>Compensation</div></div>
    </div>
    <div style={S.card}><div style={S.cardLabel}>Monthly wRVUs</div><div style={{ display: "flex", alignItems: "flex-end", gap: 8, height: 100, marginTop: 12 }}>{months.map((m, i) => (<div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}><span style={{ fontSize: 11, fontFamily: "JetBrains Mono", color: "#cbd5e1", fontWeight: 500 }}>{m.rvu > 0 ? m.rvu.toFixed(0) : ""}</span><div style={{ width: "100%", height: Math.max(4, (m.rvu / maxM) * 70), background: i === months.length - 1 ? "linear-gradient(to top, #0ea5e9, #38bdf8)" : "linear-gradient(to top, #334155, #475569)", borderRadius: 4 }} /><span style={{ fontSize: 10, color: "#94a3b8" }}>{m.label}</span></div>))}</div></div>
    {entries.length > 0 && <div style={S.card}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}><div style={S.cardLabel}>Recent Procedures</div><button onClick={() => setView("history")} style={S.linkBtn}>View All →</button></div><div style={{ marginTop: 8 }}>{entries.slice(-3).reverse().map((e, i) => (<div key={i} style={S.recentItem}><div><div style={S.recentCode}>{e.cptCode}</div><div style={S.recentDesc}>{e.description}</div></div><div style={{ textAlign: "right" }}><div style={S.recentRVU}>{e.adjustedRVU.toFixed(2)}</div><div style={S.recentDate}>{fmtShort(e.date)}</div></div></div>))}</div></div>}
    <div style={{ ...S.card, background: "#0f172a", border: "1px solid #1e293b", padding: "10px 16px" }}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}><span style={{ fontSize: 11, color: "#475569" }}>Data: CMS {DATA_YEAR} PFS</span><span style={{ fontSize: 10, color: "#334155", fontFamily: "JetBrains Mono" }}>{DATA_VERSION}</span></div></div>
    <button onClick={() => setView("log")} style={S.fabBtn}>+ Log Procedure</button>
  </div>);
}

// ═══════════════════════════════════════
// LOG PROCEDURE
// ═══════════════════════════════════════
function LogProc({ data, db, cptMap, categories, upd, setView }) {
  const [search, setSearch] = useState(""); const [cat, setCat] = useState("All"); const [sel, setSel] = useState(null); const [mods, setMods] = useState([]); const [date, setDate] = useState(new Date().toISOString().slice(0, 10)); const [notes, setNotes] = useState(""); const [saved, setSaved] = useState(false);
  const filtered = useMemo(() => { let items = db; if (cat !== "All") items = items.filter(c => c.category === cat); if (search.trim()) { const q = search.toLowerCase().trim(); items = items.filter(c => c.code.includes(q) || c.desc.toLowerCase().includes(q) || c.category.toLowerCase().includes(q)); } return items; }, [search, cat, db]);
  const rv = () => sel ? calcAdj(sel.wRVU, mods) : 0;
  const save = () => { if (!sel) return; upd(prev => ({ ...prev, entries: [...prev.entries, { id: Date.now().toString(), date, cptCode: sel.code, description: sel.desc, category: sel.category, baseRVU: sel.wRVU, modifiers: [...mods], adjustedRVU: rv(), notes }] })); setSaved(true); setTimeout(() => { setSaved(false); setSel(null); setMods([]); setNotes(""); setSearch(""); }, 1200); };
  const togMod = c => setMods(p => p.includes(c) ? p.filter(m => m !== c) : [...p, c]);

  return (<div style={S.page}>
    <div style={S.header}><h1 style={S.title}>Log Procedure</h1></div>
    {saved && <div style={S.successBanner}>✓ Logged — {rv().toFixed(2)} wRVUs</div>}
    <div style={S.fieldGroup}><label style={S.fieldLabel}>Date</label><input type="date" value={date} onChange={e => setDate(e.target.value)} style={S.dateInput} /></div>
    <div style={S.fieldGroup}><label style={S.fieldLabel}>Search CPT Code or Procedure</label><input type="text" value={search} onChange={e => { setSearch(e.target.value); setSel(null); }} placeholder="e.g. 47562, cholecystectomy, hernia..." style={S.searchInput} /></div>
    <div style={S.catRow}><button onClick={() => setCat("All")} style={cat === "All" ? S.catBtnActive : S.catBtn}>All</button>{categories.map(c => <button key={c} onClick={() => setCat(c)} style={cat === c ? S.catBtnActive : S.catBtn}>{c}</button>)}</div>
    {!sel && <div style={S.resultsList}>{filtered.slice(0, 20).map(cpt => (<button key={cpt.code} onClick={() => { setSel(cpt); setSearch(cpt.code + " - " + cpt.desc); }} style={S.resultItem}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}><span style={S.resultCode}>{cpt.code}</span><span style={S.resultRVU}>{cpt.wRVU} wRVU</span></div><div style={S.resultDesc}>{cpt.desc}</div><div style={S.resultCat}>{cpt.category}</div></button>))}{filtered.length === 0 && search && <div style={{ padding: 20, textAlign: "center", color: "#64748b" }}>No matching CPT codes found</div>}</div>}
    {sel && <><div style={S.selectedCard}><div style={{ display: "flex", justifyContent: "space-between" }}><span style={S.selectedCode}>{sel.code}</span><button onClick={() => { setSel(null); setSearch(""); setMods([]); }} style={S.clearBtn}>✕</button></div><div style={S.selectedDesc}>{sel.desc}</div><div style={{ display: "flex", gap: 16, marginTop: 8 }}><div><div style={{ fontSize: 11, color: "#64748b" }}>Base wRVU</div><div style={{ fontSize: 18, fontFamily: "JetBrains Mono", color: "#e2e8f0", fontWeight: 600 }}>{sel.wRVU}</div></div>{mods.length > 0 && <div><div style={{ fontSize: 11, color: "#64748b" }}>Adjusted</div><div style={{ fontSize: 18, fontFamily: "JetBrains Mono", color: "#0ea5e9", fontWeight: 600 }}>{rv().toFixed(2)}</div></div>}<div><div style={{ fontSize: 11, color: "#64748b" }}>Compensation</div><div style={{ fontSize: 18, fontFamily: "JetBrains Mono", color: "#10b981", fontWeight: 600 }}>${(rv() * data.settings.ratePerRVU).toFixed(0)}</div></div></div></div>
    <div style={S.fieldGroup}><label style={S.fieldLabel}>Modifiers</label><div style={S.modGrid}>{MODIFIERS.map(m => <button key={m.code} onClick={() => togMod(m.code)} style={mods.includes(m.code) ? S.modBtnActive : S.modBtn}><span style={S.modCode}>{m.code}</span><span style={S.modLabel}>{m.label}</span><span style={S.modFactor}>{m.desc}</span></button>)}</div></div>
    <div style={S.fieldGroup}><label style={S.fieldLabel}>Notes (optional)</label><textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="Patient details, complexity, etc." style={S.notesInput} rows={2} /></div>
    <button onClick={save} style={S.saveBtn}>Log Procedure — {rv().toFixed(2)} wRVUs</button></>}
  </div>);
}

// ─── CMS PFS File Parser ───


// ═══════════════════════════════════════
// IMPORT
// ═══════════════════════════════════════
function Import({ data, cptMap, upd, setView }) {
  const [mode, setMode] = useState("choose"); const [raw, setRaw] = useState(""); const [parsed, setParsed] = useState(null); const [status, setStatus] = useState(null); const [page, setPage] = useState(0); const fRef = useRef(null);
  
  const doParse = t => { setParsed(parseImport(t, cptMap)); setPage(0); setMode("preview"); };
  const onFile = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = ev => { setRaw(ev.target.result); doParse(ev.target.result); }; r.readAsText(f); };
  const doImport = () => { if (!parsed || !parsed.entries || !parsed.entries.length) return; upd(prev => ({ ...prev, entries: [...prev.entries, ...parsed.entries] })); setStatus('ok'); setTimeout(() => { setStatus(null); setView("dashboard"); }, 2000); };
  const PS = 20; const pEntries = parsed ? parsed.entries.slice(page * PS, (page + 1) * PS) : []; const tPages = parsed ? Math.ceil(parsed.entries.length / PS) : 0;

  if (mode === "choose") return (<div style={S.page}><div style={S.header}><h1 style={S.title}>Import Data</h1><p style={S.subtitle}>Import your procedure history</p></div>
    <div style={{ ...S.card, border: "1px solid #334155", cursor: "pointer" }} onClick={() => fRef.current && fRef.current.click()}><input ref={fRef} type="file" accept=".csv,.tsv,.txt" style={{ display: "none" }} onChange={onFile} /><div style={{ textAlign: "center", padding: "24px 0" }}><div style={{ fontSize: 40, marginBottom: 8 }}>📄</div><div style={{ fontSize: 16, fontWeight: 600, color: "#e2e8f0" }}>Upload CSV / Spreadsheet</div><div style={{ fontSize: 13, color: "#64748b", marginTop: 4 }}>Export from RVU Wallet and upload</div></div></div>
    <div style={{ textAlign: "center", color: "#475569", fontSize: 13, margin: "14px 0" }}>— or —</div>
    <div style={{ ...S.card, border: "1px solid #334155", cursor: "pointer" }} onClick={() => setMode("paste")}><div style={{ textAlign: "center", padding: "24px 0" }}><div style={{ fontSize: 40, marginBottom: 8 }}>📋</div><div style={{ fontSize: 16, fontWeight: 600, color: "#e2e8f0" }}>Paste Data</div><div style={{ fontSize: 13, color: "#64748b", marginTop: 4 }}>Copy rows from a spreadsheet and paste</div></div></div>
    <div style={{ ...S.card, marginTop: 16, background: "#0f172a", border: "1px solid #1e293b" }}><div style={{ ...S.cardLabel, marginBottom: 8 }}>Complete CMS Database</div><div style={{ fontSize: 12, color: "#94a3b8", lineHeight: 1.6 }}>{Object.keys(cptMap).length} preloaded codes · {DATA_VERSION}</div></div>
  </div>);

  if (mode === "paste") return (<div style={S.page}><div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}><button onClick={() => setMode("choose")} style={S.backBtn}>←</button><h1 style={{ ...S.title, marginBottom: 0 }}>Paste Data</h1></div>
    <textarea value={raw} onChange={e => setRaw(e.target.value)} placeholder={"Date,CPT,Description,wRVU,Modifier\n01/15/2025,47562,Lap cholecystectomy,10.21,"} style={{ ...S.notesInput, minHeight: 200, fontSize: 12, fontFamily: "'JetBrains Mono', monospace", lineHeight: 1.6 }} />
    <div style={{ display: "flex", gap: 8, marginTop: 12 }}><button onClick={() => setMode("choose")} style={S.secondaryBtn}>Cancel</button><button onClick={() => doParse(raw)} disabled={!raw.trim()} style={{ ...S.saveBtn, flex: 1, opacity: raw.trim() ? 1 : 0.4 }}>Parse Data →</button></div>
  </div>);

  if (mode === "preview" && parsed) {
    const matched = parsed.entries.filter(e => cptMap[e.cptCode]); const tRVU = parsed.entries.reduce((s, e) => s + e.adjustedRVU, 0);
    return (<div style={S.page}><div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}><button onClick={() => { setMode(raw ? "paste" : "choose"); setParsed(null); }} style={S.backBtn}>←</button><h1 style={{ ...S.title, marginBottom: 0 }}>Import Preview</h1></div>
      {status === 'ok' && <div style={S.successBanner}>✓ Imported {parsed.entries.length} procedures!</div>}
      <div style={{ ...S.card, background: "linear-gradient(135deg, #1e293b, #0f172a)", border: "1px solid #334155" }}><div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>{[[parsed.entries.length, "Procedures", "#f8fafc"], [tRVU.toFixed(0), "Total wRVUs", "#0ea5e9"], [matched.length, "Matched", "#10b981"]].map(([v, l, c]) => (<div key={l} style={{ textAlign: "center" }}><div style={{ fontSize: 26, fontFamily: "JetBrains Mono", fontWeight: 700, color: c }}>{v}</div><div style={{ fontSize: 10, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.5 }}>{l}</div></div>))}</div></div>
      {parsed.errors.length > 0 && <div style={{ background: "rgba(251,191,36,0.1)", border: "1px solid rgba(251,191,36,0.25)", borderRadius: 10, padding: 12, marginBottom: 12 }}><div style={{ fontSize: 12, fontWeight: 600, color: "#fbbf24", marginBottom: 4 }}>⚠ Warnings</div>{parsed.errors.slice(0, 5).map((e, i) => <div key={i} style={{ fontSize: 11, color: "#fcd34d", padding: "2px 0" }}>{e}</div>)}</div>}
      <div style={S.card}><div style={S.cardLabel}>Preview ({parsed.entries.length} rows)</div><div style={{ marginTop: 8, maxHeight: 280, overflowY: "auto", scrollbarWidth: "thin" }}>{pEntries.map((e, i) => (<div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid rgba(51,65,85,0.5)" }}><div style={{ flex: 1, minWidth: 0 }}><span style={{ fontSize: 12, fontFamily: "JetBrains Mono", color: cptMap[e.cptCode] ? "#0ea5e9" : "#fbbf24", fontWeight: 600 }}>{e.cptCode}</span> <span style={{ fontSize: 10, color: "#64748b" }}>{fmtShort(e.date)}</span><div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{e.description}</div></div><div style={{ fontSize: 13, fontFamily: "JetBrains Mono", color: "#e2e8f0", fontWeight: 600, marginLeft: 8 }}>{e.adjustedRVU.toFixed(2)}</div></div>))}</div>{tPages > 1 && <div style={{ display: "flex", justifyContent: "center", gap: 8, marginTop: 8 }}><button onClick={() => setPage(p => Math.max(0, p-1))} disabled={page === 0} style={{ ...S.pgBtn, opacity: page === 0 ? 0.3 : 1 }}>‹</button><span style={{ fontSize: 11, color: "#64748b", fontFamily: "JetBrains Mono" }}>{page+1}/{tPages}</span><button onClick={() => setPage(p => Math.min(tPages-1, p+1))} disabled={page === tPages-1} style={{ ...S.pgBtn, opacity: page === tPages-1 ? 0.3 : 1 }}>›</button></div>}</div>
      <div style={{ display: "flex", gap: 8, marginTop: 8 }}><button onClick={() => { setParsed(null); setMode("choose"); setRaw(""); }} style={S.secondaryBtn}>Cancel</button><button onClick={doImport} disabled={!parsed.entries.length} style={{ ...S.saveBtn, flex: 2, background: "linear-gradient(135deg, #10b981, #059669)" }}>Import {parsed.entries.length} Procedures</button></div>
    </div>);
  }
  return null;
}

// ═══════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════
function History({ data, upd, setView }) {
  const [filter, setFilter] = useState(""); const [sortBy, setSortBy] = useState("date"); const [groupBy, setGroupBy] = useState("date");
  const { entries, settings } = data;
  const filtered = useMemo(() => { let items = [...entries]; if (filter.trim()) { const q = filter.toLowerCase(); items = items.filter(e => e.cptCode.includes(q) || e.description.toLowerCase().includes(q) || e.category.toLowerCase().includes(q) || (e.notes && e.notes.toLowerCase().includes(q))); } items.sort((a, b) => { if (sortBy === "rvu") return b.adjustedRVU - a.adjustedRVU; if (sortBy === "code") return a.cptCode.localeCompare(b.cptCode); return new Date(b.date) - new Date(a.date); }); return items; }, [entries, filter, sortBy]);
  const grouped = useMemo(() => { if (groupBy === "none") return { "All": filtered }; const g = {}; filtered.forEach(e => { const k = groupBy === "date" ? e.date : e.category; if (!g[k]) g[k] = []; g[k].push(e); }); return g; }, [filtered, groupBy]);
  const del = id => upd(prev => ({ ...prev, entries: prev.entries.filter(e => e.id !== id) }));
  const tF = filtered.reduce((s, e) => s + e.adjustedRVU, 0);

  return (<div style={S.page}>
    <div style={S.header}><h1 style={S.title}>History</h1><p style={S.subtitle}>{entries.length} procedures · {tF.toFixed(1)} wRVUs</p></div>
    <input type="text" value={filter} onChange={e => setFilter(e.target.value)} placeholder="Search history..." style={S.searchInput} />
    <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>{["date","rvu","code"].map(s => <button key={s} onClick={() => setSortBy(s)} style={sortBy === s ? S.catBtnActive : S.catBtn}>Sort: {s === "rvu" ? "wRVU" : s}</button>)}<div style={{ width: 8 }} />{["date","category","none"].map(g => <button key={g} onClick={() => setGroupBy(g)} style={groupBy === g ? S.catBtnActive : S.catBtn}>Group: {g}</button>)}</div>
    <div style={{ marginTop: 12 }}>
      {Object.keys(grouped).length === 0 && <div style={{ textAlign: "center", color: "#64748b", padding: 40 }}>No procedures logged yet</div>}
      {Object.entries(grouped).map(([group, items]) => (<div key={group} style={{ marginBottom: 16 }}>
        <div style={S.groupHeader}>{groupBy === "date" ? fmt(group) : group}<span style={{ color: "#64748b", fontWeight: 400 }}> · {items.reduce((s, e) => s + e.adjustedRVU, 0).toFixed(1)} wRVU</span></div>
        {items.map(e => (<div key={e.id} style={S.historyItem}><div style={{ flex: 1 }}><div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}><span style={S.histCode}>{e.cptCode}</span>{e.modifiers.map(m => <span key={m} style={S.histMod}>{m}</span>)}{e.imported && <span style={{ fontSize: 9, color: "#64748b", background: "rgba(100,116,139,0.15)", padding: "1px 5px", borderRadius: 3 }}>imported</span>}</div><div style={S.histDesc}>{e.description}</div>{groupBy !== "date" && <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>{fmtShort(e.date)}</div>}{e.notes && <div style={S.histNotes}>📝 {e.notes}</div>}</div><div style={{ textAlign: "right", flexShrink: 0 }}><div style={S.histRVU}>{e.adjustedRVU.toFixed(2)}</div><div style={{ fontSize: 11, color: "#10b981", fontFamily: "JetBrains Mono" }}>${(e.adjustedRVU * settings.ratePerRVU).toFixed(0)}</div><button onClick={() => del(e.id)} style={S.deleteBtn}>✕</button></div></div>))}
      </div>))}
    </div>
  </div>);
}

// ═══════════════════════════════════════
// SETTINGS (with wRVU Editor)
// ═══════════════════════════════════════
function Settings({ data, db, cptMap, categories, upd, setView }) {
  const { settings } = data;
  const [editSearch, setEditSearch] = useState("");
  const [editCat, setEditCat] = useState("All");
  const [showEditor, setShowEditor] = useState(false);

  const set = (k, v) => upd(prev => ({ ...prev, settings: { ...prev.settings, [k]: v } }));
  const setOverride = (code, val) => upd(prev => {
    const o = { ...prev.rvuOverrides };
    const orig = CPT_DATABASE_DEFAULT.find(c => c.code === code);
    if (orig && Math.abs(val - orig.wRVU) < 0.001) { delete o[code]; } else { o[code] = val; }
    return { ...prev, rvuOverrides: o };
  });
  const resetOverrides = () => { if (confirm("Reset all wRVU values to CMS defaults?")) upd(prev => ({ ...prev, rvuOverrides: {} })); };

  const editFiltered = useMemo(() => {
    let items = db;
    if (editCat !== "All") items = items.filter(c => c.category === editCat);
    if (editSearch.trim()) { const q = editSearch.toLowerCase(); items = items.filter(c => c.code.includes(q) || c.desc.toLowerCase().includes(q)); }
    return items;
  }, [db, editCat, editSearch]);

  const expCSV = () => { const h = ["Date","CPT","Description","Category","Base wRVU","Modifiers","Adjusted wRVU","Compensation","Notes"]; const rows = data.entries.map(e => [e.date, e.cptCode, `"${e.description}"`, e.category, e.baseRVU, e.modifiers.join(';'), e.adjustedRVU.toFixed(2), (e.adjustedRVU * settings.ratePerRVU).toFixed(2), `"${e.notes || ''}"`]); const csv = [h.join(','), ...rows.map(r => r.join(','))].join('\n'); const b = new Blob([csv], { type: "text/csv" }); const u = URL.createObjectURL(b); const a = document.createElement("a"); a.href = u; a.download = `rvu-export-${new Date().toISOString().slice(0,10)}.csv`; a.click(); URL.revokeObjectURL(u); };
  const expJSON = () => { const b = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" }); const u = URL.createObjectURL(b); const a = document.createElement("a"); a.href = u; a.download = `rvu-export-${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(u); };
  const clear = () => { if (confirm("Delete all logged procedures? This cannot be undone.")) upd(prev => ({ ...prev, entries: [] })); };
  const tRVU = data.entries.reduce((s, e) => s + e.adjustedRVU, 0);
  const avg = data.entries.length > 0 ? tRVU / data.entries.length : 0;
  const overrideCount = Object.keys(data.rvuOverrides).length;

  return (<div style={S.page}>
    <div style={S.header}><h1 style={S.title}>Settings</h1></div>
    <div style={S.card}><div style={S.cardLabel}>Compensation Rate</div><div style={S.fieldGroup}><label style={S.fieldLabel}>$ per wRVU</label><input type="text" inputMode="decimal" value={settings.ratePerRVU === 0 ? "" : String(settings.ratePerRVU)} onChange={e => { const v = e.target.value.replace(/[^0-9.]/g, ''); set("ratePerRVU", v === "" ? 0 : parseFloat(v) || 0); }} placeholder="0" style={S.numberInput} /></div></div>
    <div style={S.card}><div style={S.cardLabel}>Annual Goal</div><div style={S.fieldGroup}><label style={S.fieldLabel}>Target wRVUs per year</label><input type="text" inputMode="decimal" value={settings.annualGoal === 0 ? "" : String(settings.annualGoal)} onChange={e => { const v = e.target.value.replace(/[^0-9.]/g, ''); set("annualGoal", v === "" ? 0 : parseFloat(v) || 0); }} placeholder="0" style={S.numberInput} /></div><div style={S.fieldGroup}><label style={S.fieldLabel}>Year Start Date</label><input type="date" value={settings.yearStart} onChange={e => set("yearStart", e.target.value)} style={S.dateInput} /></div></div>

    {/* wRVU Editor */}
    <div style={S.card}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={S.cardLabel}>wRVU Values Editor</div>
        <button onClick={() => setShowEditor(!showEditor)} style={S.linkBtn}>{showEditor ? "Hide" : "Edit Values"}</button>
      </div>
      <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 4 }}>
        Data: CMS CY{DATA_YEAR} PFS · {db.length} codes · {overrideCount > 0 ? `${overrideCount} custom override(s)` : "No overrides"}
      </div>
      {showEditor && <>
        <input type="text" value={editSearch} onChange={e => setEditSearch(e.target.value)} placeholder="Search codes to edit..." style={{ ...S.searchInput, marginTop: 10, fontSize: 13 }} />
        <div style={{ ...S.catRow, marginTop: 6 }}><button onClick={() => setEditCat("All")} style={editCat === "All" ? S.catBtnActive : S.catBtn}>All</button>{categories.map(c => <button key={c} onClick={() => setEditCat(c)} style={editCat === c ? S.catBtnActive : S.catBtn}>{c}</button>)}</div>
        <div style={{ maxHeight: 300, overflowY: "auto", marginTop: 8, scrollbarWidth: "thin", scrollbarColor: "#334155 transparent" }}>
          {editFiltered.slice(0, 30).map(cpt => {
            const orig = CPT_DATABASE_DEFAULT.find(c => c.code === cpt.code);
            const isOverridden = data.rvuOverrides[cpt.code] !== undefined;
            return (<div key={cpt.code} style={{ display: "flex", alignItems: "center", padding: "8px 0", borderBottom: "1px solid rgba(51,65,85,0.4)", gap: 8 }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                  <span style={{ fontSize: 12, fontFamily: "JetBrains Mono", color: isOverridden ? "#fbbf24" : "#0ea5e9", fontWeight: 600 }}>{cpt.code}</span>
                  {isOverridden && <span style={{ fontSize: 9, color: "#fbbf24", background: "rgba(251,191,36,0.1)", padding: "1px 5px", borderRadius: 3 }}>custom</span>}
                </div>
                <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{cpt.desc}</div>
              </div>
              <input type="text" inputMode="decimal" value={cpt.wRVU} onChange={e => { const v = parseFloat(e.target.value); if (!isNaN(v) && v >= 0) setOverride(cpt.code, v); }} style={{ width: 65, padding: "4px 6px", background: isOverridden ? "rgba(251,191,36,0.1)" : "#0f172a", border: `1px solid ${isOverridden ? "rgba(251,191,36,0.3)" : "#334155"}`, borderRadius: 6, color: "#f8fafc", fontSize: 13, fontFamily: "JetBrains Mono", fontWeight: 600, textAlign: "right", outline: "none" }} />
            </div>);
          })}
          {editFiltered.length > 30 && <div style={{ fontSize: 11, color: "#475569", padding: 8, textAlign: "center" }}>Showing 30 of {editFiltered.length} — narrow your search</div>}
        </div>
        {overrideCount > 0 && <button onClick={resetOverrides} style={{ ...S.dangerBtn, width: "100%", marginTop: 8, fontSize: 12, padding: "8px 12px" }}>Reset All to CMS Defaults</button>}
      </>}
    </div>

    <div style={S.card}><div style={S.cardLabel}>Summary Stats</div><div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginTop: 8 }}>{[["Total Cases", data.entries.length, "#e2e8f0"], ["Total wRVUs", tRVU.toFixed(1), "#e2e8f0"], ["Avg wRVU/Case", avg.toFixed(2), "#0ea5e9"], ["Total Comp", "$" + (tRVU * settings.ratePerRVU).toLocaleString(), "#10b981"]].map(([l, v, c]) => (<div key={l}><div style={{ fontSize: 11, color: "#64748b" }}>{l}</div><div style={{ fontSize: 20, fontFamily: "JetBrains Mono", color: c, fontWeight: 600 }}>{v}</div></div>))}</div></div>
    <div style={{ display: "flex", gap: 8, marginTop: 8 }}><button onClick={expCSV} style={S.secondaryBtn}>Export CSV</button><button onClick={expJSON} style={S.secondaryBtn}>Export JSON</button></div>
    <div style={{ marginTop: 8 }}><button onClick={clear} style={{ ...S.dangerBtn, width: "100%" }}>Clear All Data</button></div>
  </div>);
}

  resultsList: { maxHeight: 360, overflowY: "auto", marginTop: 8, scrollbarWidth: "thin", scrollbarColor: "#334155 transparent" },
  resultItem: { width: "100%", textAlign: "left", background: "#1e293b", border: "1px solid #334155", borderRadius: 10, padding: "10px 14px", marginBottom: 6, cursor: "pointer", display: "block", transition: "border-color 0.15s" },
